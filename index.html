<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="300">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Banhos Químicos - JGS | WEG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --weg-blue: #00458F;
      --weg-blue-dark: #002A55;
      --weg-blue-light: #E8F0F8;
      --weg-gray-50: #FAFAFA;
      --weg-gray-100: #F5F5F5;
      --weg-gray-200: #E8E8E8;
      --weg-gray-400: #999999;
      --weg-gray-700: #333333;
      --weg-gray-900: #1A1A1A;
      --status-ok: #2E7D32;
      --status-warn: #F57C00;
      --status-crit: #1A1A1A; /* Cor neutra preta/cinza para crítico */
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--weg-gray-50);
      color: var(--weg-gray-900);
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: white;
      border-bottom: 3px solid var(--weg-blue);
      padding: 12px 30px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .header-logo { justify-self: start; }

    .logo-weg {
      height: 50px;
      width: auto;
      object-fit: contain;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--weg-gray-900);
      text-align: center;
      justify-self: center;
    }

    header h1 span {
      color: var(--weg-blue);
      font-weight: 900;
    }

    .header-clock {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    #relogio, #data {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--weg-blue-dark);
      font-family: 'Courier New', monospace;
    }

    /* Layout Principal */
    main {
      flex: 1;
      padding: 30px 30px;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .secao-titulo {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--weg-blue-dark);
      text-transform: uppercase;
      margin-bottom: 20px;
      padding: 12px 20px;
      background: var(--weg-blue-light);
      border-radius: var(--radius-sm);
      text-align: center;
      width: 100%;
      letter-spacing: 0.5px;
    }

    /* Carousel */
    .carousel-container {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
    }

    .carousel-track {
      display: flex;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .carousel-slide {
      min-width: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
      padding: 15px;
    }

    /* Card */
    .card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--weg-gray-200);
    }

    .card-header {
      padding: 14px 18px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      background: var(--weg-blue);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
    }

    .card-body {
      display: flex;
      flex-direction: column;
      padding: 18px;
      gap: 15px;
      flex: 1;
    }

    /* Gráfico */
    .graph-container {
      width: 100%;
      height: 300px;
      background: var(--weg-gray-100);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .graph-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      z-index: 2;
    }

    .graph-placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--weg-gray-400);
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* Tabela */
    .measurements-container {
      background: white;
      border-radius: var(--radius-sm);
      border: 1px solid var(--weg-gray-200);
      padding: 15px;
      flex-shrink: 0;
    }

    .table-title {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--weg-blue-dark);
      margin-bottom: 12px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .analise-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 4px;
      table-layout: fixed;
    }

    .analise-table th {
      background: var(--weg-blue-light);
      color: var(--weg-blue-dark);
      font-weight: 700;
      font-size: 0.8rem;
      padding: 8px 4px;
      border-radius: 4px;
      text-align: center;
      white-space: nowrap;
    }

    .analise-table td {
      background: var(--weg-gray-100);
      color: var(--weg-gray-900);
      font-weight: 600;
      font-size: 0.85rem;
      padding: 8px 4px;
      text-align: center;
      border-radius: 4px;
      border: 1px solid var(--weg-gray-200);
    }

    /* Status Colors - Neutras */
    .val-ok { background: #E8F5E9 !important; color: var(--status-ok) !important; }
    .val-warn { background: #FFF3E0 !important; color: var(--status-warn) !important; }
    .val-crit { background: #ECEFF1 !important; color: var(--status-crit) !important; }
    .val-nodata { background: #F5F5F5 !important; color: #999999 !important; }

    /* Footer */
    footer {
      background: white;
      padding: 15px 30px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--weg-gray-400);
      border-top: 1px solid var(--weg-gray-200);
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    footer span { color: var(--weg-blue); font-weight: 700; }

    /* Navegação */
    .carousel-nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    .nav-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--weg-gray-300);
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid white;
      box-shadow: var(--shadow);
    }

    .nav-dot.active {
      background: var(--weg-blue);
      transform: scale(1.3);
    }

    /* Loader */
    .loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.5s ease;
    }

    .loader-overlay.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--weg-gray-200);
      border-top-color: var(--weg-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 1200px) {
      .carousel-slide { grid-template-columns: 1fr; }
      header { padding: 10px 20px; grid-template-columns: 1fr; gap: 10px; }
      .header-logo, .header-clock { justify-self: center; }
      .logo-weg { height: 40px; }
      header h1 { font-size: 1.5rem; }
      #relogio, #data { font-size: 1.3rem; }
      main { padding: 20px 20px; }
    }
  </style>
</head>
<body>

<div class="loader-overlay" id="loader">
  <div class="spinner"></div>
  <div style="font-weight: 700; color: var(--weg-blue-dark)">Carregando Dashboard...</div>
</div>

<header>
  <div class="header-logo">
    <img src="logo-weg.png" alt="WEG" class="logo-weg">
  </div>
  <h1>Controle de Banhos Químicos <span>JGS</span></h1>
  <div class="header-clock">
    <div id="relogio">--:--:--</div>
    <div id="data">--/--/----</div>
  </div>
</header>

<main>
  <div class="carousel-container">
    <div class="carousel-track" id="track-main"></div>
  </div>
  <div class="carousel-nav" id="nav-main"></div>
</main>

<footer>
  JGS - Controle de Qualidade & Processos | <span>WEG S.A.</span> | Última Sincronização: <span id="ultima">--:--</span>
</footer>

<script>
  const CONFIG = {
    rotateInterval: 20000,
    refreshInterval: 60000,
    itemsPerSlide: 2
  };

  // LISTA DE ARQUIVOS BASEADA NAS SUAS SCREENSHOTS
  // Se um novo gráfico for adicionado, basta incluir o nome (sem .json) na lista correspondente
  const processosConfig = {
    'estanhagem-eletrolitica': {
      nome: 'Estanhagem Eletrolítica',
      graficos: [
        { file: 'des', nome: 'Desengraxante Químico', ref: 26.0, tol: 3.9 },
        { file: 'ativacao-tanque-5', nome: 'Ativação — Tanque 5', ref: 8.5, tol: 1.28 },
        { file: 'ativacao-tanque-6', nome: 'Ativação — Tanque 6', ref: 8.5, tol: 1.28 },
        { file: 'niquel-watt', nome: 'Níquel WATT', ref: 45.0, tol: 6.75 },
        { file: 'niquel-watt-1', nome: 'Níquel WATT (2)', ref: 45.0, tol: 6.75 },
        { file: 'niquel-watt-2', nome: 'Níquel WATT (3)', ref: 45.0, tol: 6.75 },
        { file: 'niquel-watt-3', nome: 'Níquel WATT (4)', ref: 45.0, tol: 6.75 },
        { file: 'niquel-watt-4', nome: 'Níquel WATT (5)', ref: 45.0, tol: 6.75 },
        { file: 'estanhagem-a', nome: 'Estanhagem A', ref: 32.0, tol: 4.8 },
        { file: 'estanhagem-a-1', nome: 'Estanhagem A (2)', ref: 32.0, tol: 4.8 },
        { file: 'estanhagem-a-2', nome: 'Estanhagem A (3)', ref: 32.0, tol: 4.8 },
        { file: 'estanhagem-b', nome: 'Estanhagem B', ref: 31.5, tol: 4.73 },
        { file: 'estanhagem-b-1', nome: 'Estanhagem B (2)', ref: 31.5, tol: 4.73 },
        { file: 'estanhagem-b-2', nome: 'Estanhagem B (3)', ref: 31.5, tol: 4.73 },
        { file: 'selante', nome: 'Selante Protetivo', ref: 18.0, tol: 2.7 }
      ]
    },
    'nanoceramico': {
      nome: 'Processo Nanocerâmico',
      graficos: [
        { file: 'des1', nome: '1º Desengraxante', ref: 29.0, tol: 4.35 },
        { file: 'des2', nome: '2º Desengraxante', ref: 28.5, tol: 4.28 },
        { file: 'dec1', nome: 'Decapante 1', ref: 12.0, tol: 1.8 },
        { file: 'dec2', nome: 'Decapante 2', ref: 11.5, tol: 1.73 },
        { file: 'nano', nome: 'Nanocerâmico — Conc.', ref: 35.0, tol: 5.25 },
        { file: 'abso-nano', nome: 'Nanocerâmico — Abs.', ref: 1.2, tol: 0.18 },
        { file: 'ph-nano', nome: 'Nanocerâmico — pH', ref: 4.5, tol: 0.68 },
        { file: 'neu', nome: 'Neutralizador', ref: 7.0, tol: 1.05 },
        { file: 'sel-1', nome: 'Selante Final', ref: 22.0, tol: 3.3 }
      ]
    }
  };

  let dadosCache = {};

  // 1. CORREÇÃO CRÍTICA: Limpa espaços em chaves e valores do JSON
  // Isso resolve o problema de "charts " e "#N/D "
  function sanitizeJson(obj) {
    if (typeof obj !== 'object' || obj === null) return obj;
    const newObj = {};
    for (const key in obj) {
      const cleanKey = key.trim();
      const val = obj[key];
      if (typeof val === 'string') newObj[cleanKey] = val.trim();
      else if (Array.isArray(val)) newObj[cleanKey] = val.map(v => typeof v === 'string' ? v.trim() : v);
      else if (typeof val === 'object') newObj[cleanKey] = sanitizeJson(val);
      else newObj[cleanKey] = val;
    }
    return newObj;
  }

  // Formatar data para dia/mês
  function formatarData(dataStr) {
    if (!dataStr || dataStr === '#N/D' || dataStr.trim() === '') return '--/--';
    let dataObj = null;
    if (dataStr.includes('/')) {
      const p = dataStr.split('/');
      if (p.length === 3) {
        const dia = parseInt(p[0]);
        const mes = parseInt(p[1]) - 1;
        let ano = parseInt(p[2]);
        if (ano < 100) ano += 2000;
        dataObj = new Date(ano, mes, dia);
      }
    }
    if (!dataObj || isNaN(dataObj.getTime())) dataObj = new Date(dataStr);
    if (isNaN(dataObj.getTime())) return dataStr;
    const d = dataObj.getDate().toString().padStart(2, '0');
    const m = (dataObj.getMonth() + 1).toString().padStart(2, '0');
    return `${d}/${m}`;
  }

  // Carregar JSON com sanitização
  async function carregarDadosJSON(fileName) {
    try {
      const res = await fetch(`dados/graf-${fileName}.json?t=${Date.now()}`);
      if (!res.ok) return null;
      const raw = await res.json();
      return sanitizeJson(raw); // Aplica a limpeza
    } catch (e) {
      console.warn(`Falha ao carregar: graf-${fileName}.json`, e);
      return null;
    }
  }

  // Extrair medições e preparar para a tabela
  async function getMedicoesReal(fileName) {
    const dados = await carregarDadosJSON(fileName);
    // Verificação segura após sanitização
    if (!dados?.charts?.[0]) return [];

    const chart = dados.charts[0];
    const labels = chart.labels || [];
    const series1 = chart.series1 || [];
    
    const medicoes = [];
    const start = Math.max(0, labels.length - 24); // Pega apenas as últimas 24
    
    for (let i = start; i < labels.length; i++) {
      const label = labels[i];
      const valStr = series1[i] || '0';
      let valor = 0, hasData = true;
      
      // Verifica se o dado é válido ou #N/D
      if (valStr === '#N/D' || valStr === '#N/A' || valStr === '') {
        hasData = false; valor = NaN;
      } else {
        valor = parseFloat(valStr.replace(',', '.'));
        if (isNaN(valor)) hasData = false;
      }
      
      medicoes.push({ 
        label, 
        dataFormatada: formatarData(label), 
        valor, 
        hasData 
      });
    }
    return medicoes;
  }

  function getStatusClass(valor, ref, tol, hasData) {
    if (!hasData || isNaN(valor)) return 'val-nodata';
    const diff = Math.abs(valor - ref);
    if (diff <= tol * 0.5) return 'val-ok';
    if (diff <= tol) return 'val-warn';
    return 'val-crit';
  }

  // Renderizar a tabela das últimas 24 análises
  async function renderTabela(cfg) {
    if (!dadosCache[cfg.file]) dadosCache[cfg.file] = await getMedicoesReal(cfg.file);
    const medicoes = dadosCache[cfg.file];
    const cols = 12; // 12 colunas por linha para caber 24 itens em 2 linhas
    let html = '<table class="analise-table">';
    
    for (let r = 0; r < 2; r++) {
      const chunk = medicoes.slice(r * cols, r * cols + cols);
      if (!chunk.length) continue;
      
      // Linha de Datas
      html += '<tr>' + chunk.map(m => `<th>${m.dataFormatada}</th>`).join('') + '</tr>';
      
      // Linha de Valores
      html += '<tr>' + chunk.map(m => {
        const cls = getStatusClass(m.valor, cfg.ref, cfg.tol, m.hasData);
        return `<td class="${cls}">${m.hasData ? m.valor.toFixed(2) : '---'}</td>`;
      }).join('') + '</tr>';
    }
    return html + '</table>';
  }

  // Carregar imagem com múltiplas tentativas (graf-nome.png, graf-nome-1.png, etc)
  function loadGraphImage(imgEl, fileName) {
    let attempts = 0;
    const maxAttempts = 6; 
    
    function tryNext() {
      if (attempts >= maxAttempts) {
        imgEl.style.display = 'none';
        return;
      }
      const suffix = attempts === 0 ? '' : `-${attempts}`;
      imgEl.src = `graficos/graf-${fileName}${suffix}.png?t=${Date.now()}`;
      imgEl.onerror = function() {
        attempts++;
        tryNext();
      };
    }
    tryNext();
  }

  async function criarCard(cfg, processoNome) {
    const tabela = await renderTabela(cfg);
    return `
      <div class="card" data-processo="${processoNome}">
        <div class="card-header">${cfg.nome}</div>
        <div class="card-body">
          <div class="graph-container">
            <div class="graph-placeholder">📊 Carregando gráfico...</div>
            <img src="" 
                 onload="this.previousElementSibling.style.display='none'"
                 onerror="this.style.display='none'">
          </div>
          <div class="measurements-container">
            <div class="table-title">Últimas 24 Medições</div>
            ${tabela}
          </div>
        </div>
      </div>`;
  }

  async function initCarousel() {
    const track = document.getElementById('track-main');
    const nav = document.getElementById('nav-main');
    
    let allSlides = [], slideIndex = 0;

    for (const pKey in processosConfig) {
      const proc = processosConfig[pKey];
      const slidesCount = Math.ceil(proc.graficos.length / CONFIG.itemsPerSlide);

      for (let i = 0; i < slidesCount; i++) {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        
        // Título do processo em TODOS os slides
        slide.innerHTML = `<div style="grid-column:1/-1;margin-bottom:5px"><div class="secao-titulo">${proc.nome}</div></div>`;
        
        const chunk = proc.graficos.slice(i * CONFIG.itemsPerSlide, i * CONFIG.itemsPerSlide + CONFIG.itemsPerSlide);
        for (const cfg of chunk) {
          const cardHtml = await criarCard(cfg, proc.nome);
          const temp = document.createElement('div');
          temp.innerHTML = cardHtml;
          const card = temp.firstElementChild;
          
          // Configurar imagem com busca inteligente
          const img = card.querySelector('img');
          loadGraphImage(img, cfg.file);
          
          slide.appendChild(card);
        }
        track.appendChild(slide);
        allSlides.push(slide);
        
        const dot = document.createElement('div');
        dot.className = `nav-dot ${slideIndex === 0 ? 'active' : ''}`;
        dot.onclick = () => goToSlide(slideIndex);
        nav.appendChild(dot);
        slideIndex++;
      }
    }

    let current = 0;
    setInterval(() => {
      current = (current + 1) % allSlides.length;
      goToSlide(current);
    }, CONFIG.rotateInterval);

    setInterval(async () => {
      dadosCache = {};
      await refreshAllCards();
    }, CONFIG.refreshInterval);
  }

  async function refreshAllCards() {
    document.querySelectorAll('.card').forEach(card => {
      const header = card.querySelector('.card-header').innerText;
      // Tentar encontrar o nome do arquivo correspondente baseado no título
      let fileName = header.toLowerCase().replace(/\s/g, '-').replace('—', '-');
      // Ajustes específicos para corresponder aos nomes dos arquivos
      if (fileName.includes('tanque-5')) fileName = 'ativacao-tanque-5';
      if (fileName.includes('tanque-6')) fileName = 'ativacao-tanque-6';
      if (fileName.includes('quimico')) fileName = 'des';
      if (fileName.includes('protetivo')) fileName = 'selante';
      if (fileName.includes('conc')) fileName = 'nano';
      if (fileName.includes('abs')) fileName = 'abso-nano';
      if (fileName.includes('ph')) fileName = 'ph-nano';
      if (fileName.includes('final')) fileName = 'sel-1';
      if (fileName.includes('neutralizador')) fileName = 'neu';

      // Encontrar a config correspondente para pegar ref e tol
      let cfg = null;
      for (const p in processosConfig) {
        cfg = processosConfig[p].graficos.find(g => g.file === fileName || fileName.includes(g.file));
        if (cfg) break;
      }

      if (cfg) {
        dadosCache[cfg.file] = null; // Força reload
        renderTabela(cfg).then(html => {
          card.querySelector('.measurements-container').innerHTML = `<div class="table-title">Últimas 24 Medições</div>${html}`;
        });
      }
    });
    document.getElementById('ultima').innerText = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  }

  function goToSlide(idx) {
    document.getElementById('track-main').style.transform = `translateX(-${idx*100}%)`;
    document.querySelectorAll('.nav-dot').forEach((d,i) => d.classList.toggle('active', i===idx));
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('relogio').innerText = now.toLocaleTimeString('pt-BR');
    document.getElementById('data').innerText = now.toLocaleDateString('pt-BR');
    document.getElementById('ultima').innerText = now.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  }

  async function init() {
    await initCarousel();
    updateClock();
    setInterval(updateClock, 1000);
    setTimeout(() => document.getElementById('loader').classList.add('hidden'), 1500);
  }

  window.onload = init;
</script>

</body>
</html>
