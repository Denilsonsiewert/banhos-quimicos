<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Químico | WEG Banhos Industriais</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --weg-blue: #004B8D;
            --weg-dark: #1a1a1a;
            --bg-color: #f4f6f9;
            --text-primary: #333333;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        header {
            background-color: var(--weg-blue);
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 10;
            height: 100px;
        }

        .brand {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            flex: 1;
        }

        .brand-main {
            font-size: 2.5rem; 
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .brand-sub {
            font-size: 1.2rem;
            font-weight: 400;
            opacity: 0.9;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .clock-container {
            display: flex;
            align-items: center;
            gap: 30px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            flex-shrink: 0;
        }

        .clock-item {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .clock-label {
            font-weight: 700;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .clock-value {
            font-weight: 400;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }
        
        .date-value { 
            color: #e0e0e0;
        }

        /* MAIN CONTENT - FULLSCREEN IMAGE DISPLAY */
        main {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .section-title {
            font-size: 2.5rem;
            color: var(--weg-blue);
            font-weight: 800;
            margin-bottom: 20px;
            border-left: 8px solid var(--weg-blue);
            padding-left: 20px;
            text-transform: uppercase;
            width: 100%;
            max-width: 1200px;
        }

        .image-container {
            width: 100%;
            max-width: 1400px;
            height: calc(100vh - 250px);
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .chart-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.5s ease-in-out;
        }

        .loading-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 1.5rem;
            gap: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--weg-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* NAVIGATION DOTS */
        .nav-dots {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ccc;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: var(--weg-blue);
            transform: scale(1.2);
        }

        .dot:hover {
            background: var(--weg-blue);
        }

        /* FOOTER */
        footer {
            background: var(--weg-dark);
            color: #ccc;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pulse {
            width: 12px;
            height: 12px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(40, 167, 69, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(40, 167, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
        }

        /* RESPONSIVE */
        @media (min-width: 1920px) {
            .brand-main { font-size: 3rem; }
            .brand-sub { font-size: 1.4rem; }
            .clock-container { font-size: 2.2rem; }
            .section-title { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <div class="brand-main">WEG INDUSTRIAL</div>
            <div class="brand-sub">CONTROLE ANALÍTICO DOS BANHOS QUÍMICOS</div>
        </div>
        
        <div class="clock-container">
            <div class="clock-item">
                <span class="clock-label">DATA:</span>
                <span class="clock-value date-value" id="clock-date">--/--/----</span>
            </div>
            
            <div class="clock-item">
                <span class="clock-label">HORA:</span>
                <span class="clock-value" id="clock-time">--:--:--</span>
            </div>
        </div>
    </header>

    <main>
        <div class="section-title" id="current-section">
            <i class="fa-solid fa-microchip"></i> Estanhagem
        </div>
        
        <div class="image-container">
            <div class="loading-placeholder" id="loading">
                <div class="spinner"></div>
                <div>Carregando gráfico...</div>
            </div>
            <img src="" alt="Gráfico" class="chart-image" id="chart-image" style="display: none;">
        </div>

        <div class="nav-dots" id="nav-dots">
            <!-- Dots serão gerados dinamicamente -->
        </div>
    </main>

    <footer>
        <div class="sync-status">
            <div class="pulse"></div>
            <span>Dados SCADA em tempo real | WEG Qualidade</span>
        </div>
        <div>
            Última sincronização: <span id="last-sync">Agora</span>
        </div>
    </footer>

    <script>
        // Configuração das abas para rotação
        const tabsConfig = [
            {
                section: "Estanhagem",
                icon: "fa-microchip",
                images: [
                    { name: "Desengraxante", file: "graf-des.png" },
                    { name: "Ativação — Tanque 5", file: "graf-ativacao-tanque-5.png" },
                    { name: "Ativação — Tanque 6", file: "graf-ativacao-tanque-6.png" },
                    { name: "Níquel WATT", file: "graf-niquel-watt.png" },
                    { name: "Estanhagem A", file: "graf-estanhagem-a.png" },
                    { name: "Selante", file: "graf-selante.png" },
                    { name: "Estanhagem B", file: "graf-estanhagem-b.png" }
                ]
            },
            {
                section: "Nanocerâmico",
                icon: "fa-layer-group",
                images: [
                    { name: "1º Desengraxante", file: "graf-des1.png" },
                    { name: "2º Desengraxante", file: "graf-des2.png" },
                    { name: "Decapante 1", file: "graf-dec1.png" },
                    { name: "Decapante 2", file: "graf-dec2.png" },
                    { name: "Nanocerâmico — Conc.", file: "graf-nano.png" },
                    { name: "Nanocerâmico — Abs.", file: "graf-abso-nano.png" },
                    { name: "Nanocerâmico — pH", file: "graf-ph-nano.png" },
                    { name: "Neutralizador", file: "graf-neu.png" },
                    { name: "Selante", file: "graf-sel.png" }
                ]
            }
        ];

        let currentTab = 0;
        let currentImage = 0;
        let rotationInterval;
        const ROTATION_TIME = 8000; // 8 segundos por imagem

        // Elementos DOM
        const chartImage = document.getElementById('chart-image');
        const loading = document.getElementById('loading');
        const currentSection = document.getElementById('current-section');
        const navDots = document.getElementById('nav-dots');

        // Função para criar os dots de navegação
        function createNavDots() {
            navDots.innerHTML = '';
            const totalImages = tabsConfig[currentTab].images.length;
            
            for (let i = 0; i < totalImages; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                if (i === currentImage) dot.classList.add('active');
                
                dot.addEventListener('click', () => {
                    currentImage = i;
                    updateDisplay();
                    resetRotation();
                });
                
                navDots.appendChild(dot);
            }
        }

        // Função para atualizar a exibição
        function updateDisplay() {
            const tab = tabsConfig[currentTab];
            const image = tab.images[currentImage];
            
            // Atualiza título da seção
            currentSection.innerHTML = `<i class="fa-solid ${tab.icon}"></i> ${tab.section}`;
            
            // Mostra loading
            loading.style.display = 'flex';
            chartImage.style.display = 'none';
            
            // Carrega nova imagem
            const img = new Image();
            img.onload = function() {
                chartImage.src = image.file;
                loading.style.display = 'none';
                chartImage.style.display = 'block';
                
                // Atualiza dots
                const dots = navDots.querySelectorAll('.dot');
                dots.forEach((dot, index) => {
                    dot.classList.toggle('active', index === currentImage);
                });
            };
            
            img.onerror = function() {
                loading.innerHTML = '<div>Imagem não disponível</div>';
                setTimeout(() => {
                    loading.innerHTML = '<div class="spinner"></div><div>Carregando gráfico...</div>';
                    nextImage();
                }, 3000);
            };
            
            img.src = image.file;
        }

        // Função para próxima imagem
        function nextImage() {
            currentImage++;
            if (currentImage >= tabsConfig[currentTab].images.length) {
                currentImage = 0;
                currentTab++;
                if (currentTab >= tabsConfig.length) {
                    currentTab = 0;
                }
                createNavDots();
            }
            updateDisplay();
        }

        // Função para reiniciar rotação
        function resetRotation() {
            clearInterval(rotationInterval);
            rotationInterval = setInterval(nextImage, ROTATION_TIME);
        }

        // Relógio
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('pt-BR');
            const dateString = now.toLocaleDateString('pt-BR');
            
            document.getElementById('clock-date').textContent = dateString;
            document.getElementById('clock-time').textContent = timeString;
        }

        // Inicialização
        function init() {
            updateClock();
            setInterval(updateClock, 1000);
            
            createNavDots();
            updateDisplay();
            resetRotation();
            
            // Atualização automática a cada 60 segundos
            let syncCount = 0;
            setInterval(() => {
                syncCount++;
                document.getElementById('last-sync').textContent = `Há ${syncCount} min`;
                updateDisplay(); // Recarrega imagens para pegar atualizações
            }, 60000);
        }

        // Inicia quando a página carregar
        window.addEventListener('load', init);
    </script>
</body>
</html>
