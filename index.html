<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Analytics Químico | WEG Banhos Industriais</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg1: #0a1a2f;
  --bg2: #0c2a3e;
  --accent: #00a8e8;
  --accent2: #2f86eb;
  --accent3: #00d4ff;
  --text: #ffffff;
  --muted: #b0c4de;
  --shadow: rgba(0,0,0,0.35);
  --success: #2ecc71;
  --warning: #f1c40f;
  --danger: #e74c3c;
  --card-bg: rgba(18, 30, 46, 0.85);
  --glass-border: 1px solid rgba(0, 168, 232, 0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at 20% 30%, #0b1e2e, #05121c);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
  backdrop-filter: blur(2px);
}

/* Efeito grade sutil */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(rgba(0,168,232,0.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,168,232,0.04) 1px, transparent 1px);
  background-size: 35px 35px;
  pointer-events: none;
  z-index: 0;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 40px;
  background: rgba(8, 22, 36, 0.85);
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  height: 110px;
  border-bottom: 2px solid var(--accent);
  position: relative;
  z-index: 10;
}

.logo-weg { 
  height: 70px;
  filter: drop-shadow(0 2px 12px rgba(0,0,0,0.4));
  transition: transform 0.2s ease;
}
.logo-weg:hover { transform: scale(1.02); }

.title-block {
  text-align: center;
  flex: 1;
}

.title {
  font-size: clamp(2.5rem, 5vw, 4.2rem);
  font-weight: 900;
  background: linear-gradient(135deg, #ffffff, var(--accent));
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  letter-spacing: -0.5px;
  text-shadow: 0 2px 10px rgba(0,168,232,0.3);
}

.subtitle {
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 1px;
}

.info-pill {
  display: flex;
  gap: 24px;
  background: rgba(0, 30, 50, 0.7);
  backdrop-filter: blur(8px);
  padding: 12px 28px;
  border-radius: 60px;
  font-size: 1.25rem;
  font-weight: 800;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  border: 1px solid rgba(0,168,232,0.4);
  font-family: monospace;
  letter-spacing: 1px;
}

main {
  padding: 20px 30px 15px 30px;
  height: calc(100vh - 180px);
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 2;
}

.section-title {
  font-size: 2.5rem;
  font-weight: 800;
  margin-bottom: 20px;
  padding: 12px 28px;
  background: linear-gradient(90deg, rgba(0,168,232,0.2), rgba(0,40,60,0.6));
  border-left: 6px solid var(--accent);
  border-radius: 18px;
  backdrop-filter: blur(8px);
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  letter-spacing: -0.3px;
  color: white;
}

#dashboard-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding-right: 6px;
  scrollbar-width: thin;
  scrollbar-color: var(--accent) #1f3a4b;
}

#dashboard-content::-webkit-scrollbar {
  width: 8px;
}
#dashboard-content::-webkit-scrollbar-track {
  background: #1f3a4b;
  border-radius: 10px;
}
#dashboard-content::-webkit-scrollbar-thumb {
  background: var(--accent);
  border-radius: 10px;
}

.card {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  padding: 28px;
  border-radius: 32px;
  box-shadow: 0 25px 45px -12px rgba(0,0,0,0.4);
  border: var(--glass-border);
  transition: all 0.2s ease;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 2px solid rgba(0,168,232,0.5);
  flex-wrap: wrap;
  gap: 15px;
}

.card-title {
  font-size: 2.7rem;
  font-weight: 800;
  background: linear-gradient(145deg, #ffffff, var(--accent2));
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  letter-spacing: -0.5px;
}

.card-yaxis {
  font-size: 1.4rem;
  color: #b8e1ff;
  font-weight: 600;
  margin-top: 6px;
  background: rgba(0,0,0,0.3);
  display: inline-block;
  padding: 4px 14px;
  border-radius: 40px;
}

.status-badge {
  padding: 12px 24px;
  border-radius: 40px;
  font-weight: 800;
  font-size: 1.1rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  backdrop-filter: blur(4px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.status-ok { background: rgba(46, 204, 113, 0.2); color: #a3e4c7; border-left: 4px solid var(--success); }
.status-warn { background: rgba(241, 196, 15, 0.2); color: #ffe484; border-left: 4px solid var(--warning); }
.status-crit { background: rgba(231, 76, 60, 0.25); color: #ffb3a7; border-left: 4px solid var(--danger); }

.multi-chart-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(800px, 1fr));
  gap: 32px;
}

.chart-column {
  background: rgba(10, 25, 40, 0.6);
  backdrop-filter: blur(8px);
  border-radius: 28px;
  padding: 24px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.25);
  border: 1px solid rgba(0,168,232,0.25);
  transition: transform 0.2s;
}

.chart-column:hover {
  transform: translateY(-3px);
  border-color: rgba(0,168,232,0.6);
}

.chart-column.single {
  grid-column: 1 / -1;
}

.chart-column-title {
  text-align: center;
  font-size: 1.9rem;
  font-weight: 800;
  color: var(--accent);
  margin-bottom: 20px;
  background: linear-gradient(135deg, #fff, var(--accent));
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
}

.chart-img {
  width: 100%;
  max-height: 650px;
  min-height: 480px;
  object-fit: contain;
  border-radius: 20px;
  background: #07141f;
  border: 1px solid #2c5270;
  box-shadow: 0 6px 14px rgba(0,0,0,0.3);
  transition: all 0.2s;
}

.custom-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  border-radius: 20px;
  overflow: hidden;
  font-family: 'Inter', monospace;
}

.custom-table th,
.custom-table td {
  border: 1px solid #2b4f6e;
  padding: 16px 8px;
  text-align: center;
  font-size: 1.3rem;
  font-weight: 700;
  background-color: rgba(0, 20, 30, 0.7);
  color: #eef4ff;
}

.custom-table th {
  background: linear-gradient(90deg, #005a9e, #0077be);
  color: white;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.table-main-title {
  font-size: 1.5rem !important;
  padding: 18px !important;
  background: #003366 !important;
  text-align: center;
}

.custom-table tr:nth-child(even) td {
  background: rgba(15, 55, 80, 0.6);
}

.custom-table tr:hover td {
  background: rgba(0, 168, 232, 0.15);
}

.nav-dots {
  display: flex;
  justify-content: center;
  gap: 18px;
  margin-top: 28px;
  padding: 12px;
  background: rgba(0,0,0,0.3);
  border-radius: 60px;
  backdrop-filter: blur(10px);
  width: fit-content;
  align-self: center;
}

.dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #5f7f9e;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

.dot.active {
  background: var(--accent);
  transform: scale(1.4);
  box-shadow: 0 0 10px var(--accent);
}

footer {
  height: 72px;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(12px);
  color: #cbd5e6;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 40px;
  font-size: 1rem;
  border-top: 1px solid rgba(0,168,232,0.3);
  font-weight: 500;
}

.pulse {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--success);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(46,204,113,0.7); }
  70% { box-shadow: 0 0 0 12px rgba(46,204,113,0); }
  100% { box-shadow: 0 0 0 0 rgba(46,204,113,0); }
}

.loader-shimmer {
  background: linear-gradient(110deg, #1f3f55 8%, #2a506e 18%, #1f3f55 33%);
  border-radius: 28px;
  background-size: 200% 100%;
  animation: shimmer 1.2s linear infinite;
}

@keyframes shimmer {
  to { background-position-x: -200%; }
}

@media (max-width: 1000px) {
  .card-title { font-size: 2rem; }
  .custom-table th, .custom-table td { font-size: 1rem; padding: 10px 4px; }
  .chart-img { min-height: 350px; }
  .info-pill { gap: 12px; font-size: 0.9rem; padding: 8px 18px; }
  .section-title { font-size: 1.8rem; }
}
</style>
</head>
<body>

<header>
  <img src="https://seeklogo.com/images/W/weg-logo-3044563950-seeklogo.com.png" class="logo-weg" alt="WEG Logo">
  <div class="title-block">
    <div class="title">CONTROLE ANALÍTICO</div>
    <div class="subtitle">WEG BANHOS INDUSTRIAIS • MONITORAMENTO QUÍMICO</div>
  </div>
  <div class="info-pill">
    <span id="clock-date">DATA: --/--/----</span>
    <span id="clock-time">HORA: --:--:--</span>
  </div>
</header>

<main>
  <div class="section-title" id="current-section">Carregando...</div>
  <div id="dashboard-content"></div>
  <div class="nav-dots" id="nav-dots"></div>
</main>

<footer>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="pulse"></div>
    <span>🔬 Dados em tempo real | WEG Qualidade Premium</span>
  </div>
  <div>🔄 Última sincronia: <span id="last-sync">Agora</span></div>
</footer>

<script>
// CONFIGURAÇÃO DE TELAS – TODOS OS BANHOS E ITENS (SEM REMOÇÃO DE FUNÇÕES)
const tabsConfig = [
    {
        section: "⚡ ESTANHAGEM • LINHA ALTA PERFORMANCE",
        items: [
            { title: "🧼 Desengraxante Químico", fileBase: "graf-des", status: "OK" },
            { title: "⚡ Ativação — Tanque 5", fileBase: "graf-ativacao-tanque-5", status: "Verificar" },
            { title: "⚙️ Ativação — Tanque 6", fileBase: "graf-ativacao-tanque-6", status: "OK" },
            { title: "🔩 Níquel WATT", fileBase: "graf-niquel-watt", status: "Estável" },
            { title: "🎯 Estanhagem A", fileBase: "graf-estanhagem-a", status: "Vencido" },
            { title: "🛡️ Selante Protetivo", fileBase: "graf-selante", status: "OK" },
            { title: "🏭 Estanhagem B", fileBase: "graf-estanhagem-b", status: "OK" }
        ]
    },
    {
        section: "🧪 NANOCERÂMICO • REVOLUÇÃO ANTICORROSÃO",
        items: [
            { title: "💧 1º Desengraxante", fileBase: "graf-des1", status: "OK" },
            { title: "💧 2º Desengraxante", fileBase: "graf-des2", status: "OK" },
            { title: "⚠️ Decapante 1", fileBase: "graf-dec1", status: "Atenção" },
            { title: "✅ Decapante 2", fileBase: "graf-dec2", status: "OK" },
            { title: "🧴 Nanocerâmico — Concentração", fileBase: "graf-nano", status: "Crítico" },
            { title: "📊 Nanocerâmico — Absorbância", fileBase: "graf-abso-nano", status: "OK" },
            { title: "⚗️ Nanocerâmico — pH", fileBase: "graf-ph-nano", status: "OK" },
            { title: "🧪 Neutralizador", fileBase: "graf-neu", status: "OK" },
            { title: "🛡️ Selante Final", fileBase: "graf-sel", status: "OK" }
        ]
    }
];

const COLS_POR_BLOCO = 16;
let currentTabIdx = 0;
let currentItemIdx = 0;
let rotationTimer;

// Helper: classe visual do status
function getStatusClass(status) {
    if (["OK", "Estável", "Em Conformidade"].includes(status)) return "ok";
    if (["Atenção", "Verificar", "Vencido"].includes(status)) return "warn";
    return "crit";
}

// Geração da tabela com blocos + fallback completo
function generateTableHTML(labels, series1, series2) {
    if (!labels || labels.length === 0) return '';
    let html = '';
    const totalBlocos = Math.ceil(labels.length / COLS_POR_BLOCO);

    for (let b = 0; b < totalBlocos; b++) {
        const inicio = b * COLS_POR_BLOCO;
        const fim = Math.min(inicio + COLS_POR_BLOCO, labels.length);
        const l = labels.slice(inicio, fim);
        const s1 = series1.slice(inicio, fim);
        const s2 = series2 ? series2.slice(inicio, fim) : null;

        html += `<table class="custom-table">`;
        if (b === 0) {
            html += `<thead><tr><th class="table-main-title" colspan="${l.length}">📋 REGISTRO DAS ÚLTIMAS 24 ANÁLISES (valores reais)</th></tr></thead>`;
        }
        html += `<tbody>`;
        html += `<tr>${l.map(x => `<th>${x}</th>`).join('')}</tr>`;
        html += `<tr>${s1.map(x => `<td><strong>${x ?? '—'}</strong></td>`).join('')}</tr>`;
        if (s2) {
            html += `<tr style="background:rgba(0,130,200,0.15);">${s2.map(x => `<td><span style="font-weight:600;">${x ?? '—'}</span></td>`).join('')}</tr>`;
        }
        html += `</tbody></table>`;
        if (b < totalBlocos - 1) html += `<div style="height: 14px;"></div>`;
    }
    return html;
}

// Carrega dados e gráfico + tabelas inteligentes
function loadCardData(fileBase) {
    const wrapperElem = document.getElementById('grid-wrapper');
    if (!wrapperElem) return;
    wrapperElem.innerHTML = `<div class="loader-shimmer" style="padding:60px;text-align:center;border-radius:32px;font-weight:bold;">⏳ Carregando parâmetros do banho... Aguarde</div>`;
    
    fetch(`dados/${fileBase}.json?t=${Date.now()}`)
        .then(r => {
            if (!r.ok) throw new Error('HTTP error');
            return r.json();
        })
        .then(data => {
            const yLabel = document.getElementById('y-axis-label');
            if (data.yAxisLabel && yLabel) yLabel.textContent = `📈 ${data.yAxisLabel}`;
            if (!wrapperElem) return;
            wrapperElem.innerHTML = '';

            // Suporta múltiplos gráficos ou único
            if (data.charts && Array.isArray(data.charts) && data.charts.length > 0) {
                data.charts.forEach((chartData, idx) => {
                    const columnDiv = document.createElement('div');
                    columnDiv.className = 'chart-column';
                    const chartTitleHtml = chartData.title ? `<div class="chart-column-title">🔍 ${chartData.title}</div>` : '';
                    const imgSrc = `graficos/${fileBase}-${idx+1}.png?t=${Date.now()}`;
                    const tableHtml = generateTableHTML(chartData.labels, chartData.series1, chartData.series2);
                    columnDiv.innerHTML = `${chartTitleHtml}<img src="${imgSrc}" class="chart-img" alt="Gráfico ${idx+1}" onerror="this.style.opacity='0.5';this.alt='Gráfico indisponível';">${tableHtml}`;
                    wrapperElem.appendChild(columnDiv);
                });
            } else if (data.labels && data.series1) {
                // Formato legado único
                const columnDiv = document.createElement('div');
                columnDiv.className = 'chart-column single';
                const imgSrc = `graficos/${fileBase}-1.png?t=${Date.now()}`;
                const tableHtml = generateTableHTML(data.labels, data.series1, data.series2);
                columnDiv.innerHTML = `<img src="${imgSrc}" class="chart-img" alt="Gráfico analítico" onerror="this.src='https://placehold.co/800x400/1a3a5a/white?text=Gráfico+Aguardando';">${tableHtml}`;
                wrapperElem.appendChild(columnDiv);
            } else {
                throw new Error("Formato inesperado");
            }
        })
        .catch(err => {
            console.warn(`Erro ao carregar ${fileBase}:`, err);
            if (wrapperElem) {
                wrapperElem.innerHTML = `<div style="padding:50px;text-align:center;background:rgba(0,0,0,0.6);border-radius:32px;">
                    <span style="font-size:2rem;">⚠️</span><br>
                    <strong style="font-size:1.4rem;">Dados não disponíveis momentaneamente</strong><br>
                    <span style="color:#bbccff;">Verifique a origem: ${fileBase}.json</span>
                </div>`;
            }
        });
}

// Renderiza card principal e estrutura de tabelas/dados
function renderCard(item) {
    const dashboard = document.getElementById('dashboard-content');
    if (!dashboard) return;
    dashboard.innerHTML = `
        <div class="card">
            <div class="card-header">
                <div>
                    <div class="card-title">🧪 ${item.title}</div>
                    <div class="card-yaxis" id="y-axis-label">🔬 Parâmetros de controle</div>
                </div>
                <div class="status-badge status-${getStatusClass(item.status)}">${item.status}</div>
            </div>
            <div class="multi-chart-grid" id="grid-wrapper">
                <div style="padding:60px;text-align:center;background:rgba(0,0,0,0.4);border-radius:28px;">📡 Inicializando leitura de sensores...</div>
            </div>
        </div>`;
    loadCardData(item.fileBase);
}

// Atualiza tela inteira com base nos índices atuais
function updateDisplay() {
    const tab = tabsConfig[currentTabIdx];
    const item = tab.items[currentItemIdx];
    document.getElementById('current-section').innerHTML = `📌 ${tab.section}`;
    renderCard(item);
    
    // Gera dots (indicadores de item no mesmo grupo)
    const dotsContainer = document.getElementById('nav-dots');
    if (dotsContainer) {
        dotsContainer.innerHTML = '';
        tab.items.forEach((it, idx) => {
            const dot = document.createElement('div');
            dot.className = `dot ${idx === currentItemIdx ? 'active' : ''}`;
            dot.setAttribute('aria-label', it.title);
            dot.onclick = (e) => {
                e.stopPropagation();
                currentItemIdx = idx;
                resetRotation();
                updateDisplay();
            };
            dotsContainer.appendChild(dot);
        });
        // Adiciona um pequeno contador de contexto
        const totalCount = tab.items.length;
        const infoSpan = document.createElement('div');
        infoSpan.style.marginLeft = '16px';
        infoSpan.style.fontSize = '0.85rem';
        infoSpan.style.fontWeight = '600';
        infoSpan.style.background = 'rgba(0,0,0,0.5)';
        infoSpan.style.padding = '6px 14px';
        infoSpan.style.borderRadius = '40px';
        infoSpan.innerText = `${currentItemIdx+1}/${totalCount}`;
        dotsContainer.appendChild(infoSpan);
    }
}

// Avança para próximo item (rotação cíclica entre abas e itens)
function nextItem() {
    const tab = tabsConfig[currentTabIdx];
    if (!tab) return;
    if (currentItemIdx + 1 < tab.items.length) {
        currentItemIdx++;
    } else {
        // Muda para próxima aba, reinicia items
        currentItemIdx = 0;
        currentTabIdx = (currentTabIdx + 1) % tabsConfig.length;
    }
    updateDisplay();
}

// Reseta timer de rotação (usado quando usuario clica)
function resetRotation() {
    if (rotationTimer) clearInterval(rotationTimer);
    rotationTimer = setInterval(() => {
        nextItem();
    }, 12000); // 12 segundos para leitura confortável em TV
}

// Relógio e data em tempo real estilo industrial
function initClock() {
    function tick() {
        const now = new Date();
        const optionsDate = { year: 'numeric', month: '2-digit', day: '2-digit' };
        document.getElementById('clock-date').textContent = `📅 DATA: ${now.toLocaleDateString('pt-BR', optionsDate)}`;
        document.getElementById('clock-time').textContent = `⏱️ HORA: ${now.toLocaleTimeString('pt-BR')}`;
    }
    tick();
    setInterval(tick, 1000);
}

// Sincronização periódica (atualiza dados sem perder posição)
function startPeriodicSync() {
    setInterval(() => {
        const lastSyncSpan = document.getElementById('last-sync');
        if (lastSyncSpan) {
            const now = new Date();
            lastSyncSpan.textContent = `${now.toLocaleTimeString('pt-BR')}`;
        }
        // Recarrega apenas os dados do card atual, mantendo o layout bonito, sem perder tab/item
        const tab = tabsConfig[currentTabIdx];
        if (tab && tab.items[currentItemIdx]) {
            const currentItem = tab.items[currentItemIdx];
            const fileBase = currentItem.fileBase;
            const gridWrap = document.getElementById('grid-wrapper');
            if (gridWrap) {
                gridWrap.innerHTML = `<div class="loader-shimmer" style="padding:50px;border-radius:32px;">🔄 Atualizando indicadores...</div>`;
                loadCardData(fileBase);
            }
        }
        // Atualiza classe dos status badges sem necessidade de reload total (opcional mas mantem sincronia)
        const badgeElem = document.querySelector('.status-badge');
        if (badgeElem && tab && tab.items[currentItemIdx]) {
            const newStatus = tab.items[currentItemIdx].status;
            const newClass = `status-badge status-${getStatusClass(newStatus)}`;
            badgeElem.className = newClass;
            badgeElem.innerHTML = newStatus;
        }
    }, 55000); // a cada 55 segundos
}

// Inicialização global com prevenção de carregamento duplicado
window.onload = () => {
    initClock();
    updateDisplay();      // primeira carga
    resetRotation();      // inicia rotação automática
    startPeriodicSync();  // mantém sincronia sem perder posição
    // Adiciona toque / clique mouse para manter modernidade (já incluso nos dots)
    // CSS já garante visual TV imersivo.
};
</script>
</body>
</html>
