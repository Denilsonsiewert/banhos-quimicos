<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Químico | WEG Banhos Industriais</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg1: #f8f9fa;
  --bg2: #dfe8f2;
  --accent: #0052a3;
  --accent2: #1a73e8;
  --accent3: #00a8e8;
  --text: #1a1a1a;
  --muted: #555;
  --shadow: rgba(0,0,0,0.14);
  --success: #22c55e;
  --warning: #facc15;
  --danger: #ef4444;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(120deg, var(--bg1), var(--bg2));
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: #fff;
  box-shadow: 0 5px 20px var(--shadow);
  height: 110px;
}

.logo-weg { height: 75px; }

.title-block {
  text-align: center;
  flex: 1;
}

.title {
  font-size: clamp(2.4rem, 4vw, 4rem);
  font-weight: 900;
  color: var(--accent);
}

.subtitle {
  font-size: 1.2rem;
  color: var(--muted);
  font-weight: 700;
}

.info-pill {
  display: flex;
  gap: 20px;
  background: linear-gradient(135deg, #fff, #f1f4f7);
  padding: 14px 24px;
  border-radius: 30px;
  font-size: 1.2rem;
  font-weight: 800;
  box-shadow: 0 4px 14px var(--shadow);
}

main {
  padding: 25px;
  height: calc(100vh - 180px);
  display: flex;
  flex-direction: column;
}

.section-title {
  font-size: 2.5rem;
  font-weight: 900;
  color: var(--accent);
  margin-bottom: 20px;
  padding: 15px 25px;
  background: rgba(255,255,255,0.8);
  border-left: 8px solid var(--accent);
  border-radius: 16px;
}

#dashboard-content {
  flex: 1;
  overflow-y: auto;
}

.card {
  background: linear-gradient(135deg, #fff, #f1f4f7);
  padding: 28px;
  border-radius: 22px;
  box-shadow: 0 10px 25px var(--shadow);
  border: 1px solid #e5e5e5;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
  padding-bottom: 15px;
  border-bottom: 2px solid #d9e2ec;
}

.card-title {
  font-size: 2.2rem;
  font-weight: 800;
  color: var(--accent2);
}

.card-yaxis {
  font-size: 1.1rem;
  color: var(--muted);
  font-weight: 700;
  margin-top: 5px;
}

.status-badge {
  padding: 12px 20px;
  border-radius: 12px;
  font-weight: 900;
  font-size: 1rem;
  text-transform: uppercase;
}

.status-ok { background: rgba(34,197,94,0.18); color: #15803d; }
.status-warn { background: rgba(250,204,21,0.22); color: #a16207; }
.status-crit { background: rgba(239,68,68,0.18); color: #b91c1c; }

.multi-chart-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(650px, 1fr));
  gap: 25px;
}

.chart-column {
  background: #fff;
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.chart-column.single {
  grid-column: 1 / -1;
}

.chart-column-title {
  text-align: center;
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--accent);
  margin-bottom: 15px;
}

.chart-img {
  width: 100%;
  max-height: 480px;
  object-fit: contain;
  border-radius: 14px;
  background: white;
  border: 1px solid #ddd;
}

.custom-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 14px;
  table-layout: fixed;
}

.custom-table th,
.custom-table td {
  border: 1px solid #d9d9d9;
  padding: 10px 5px;
  text-align: center;
  font-size: 1rem;
  font-weight: 700;
}

.custom-table th {
  background: linear-gradient(90deg, var(--accent), var(--accent3));
  color: white;
}

.table-main-title {
  font-size: 1.15rem !important;
}

.custom-table tr:nth-child(even) td {
  background: #f8fbff;
}

.nav-dots {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-top: 20px;
}

.dot {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #cbd5e1;
  cursor: pointer;
}

.dot.active {
  background: var(--accent);
  transform: scale(1.3);
}

footer {
  height: 70px;
  background: #111827;
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 35px;
  font-size: 1rem;
}

.pulse {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--success);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.7); }
  70% { box-shadow: 0 0 0 14px rgba(34,197,94,0); }
  100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
}
</style>
</head>
<body>

<header>
  <img src="https://seeklogo.com/images/W/weg-logo-3044563950-seeklogo.com.png" class="logo-weg">
  <div class="title-block">
    <div class="title">CONTROLE ANALÍTICO</div>
    <div class="subtitle">WEG BANHOS INDUSTRIAIS</div>
  </div>
  <div class="info-pill">
    <span id="clock-date">DATA: --/--/----</span>
    <span id="clock-time">HORA: --:--:--</span>
  </div>
</header>

<main>
  <div class="section-title" id="current-section">Carregando...</div>
  <div id="dashboard-content"></div>
  <div class="nav-dots" id="nav-dots"></div>
</main>

<footer>
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="pulse"></div>
    <span>Dados em tempo real | WEG Qualidade</span>
  </div>
  <div>Atualização: <span id="last-sync">Agora</span></div>
</footer>

<script>
const tabsConfig = [
    {
        section: "Estanhagem",
        items: [
            { title: "Desengraxante", fileBase: "graf-des", status: "OK" },
            { title: "Ativação — Tanque 5", fileBase: "graf-ativacao-tanque-5", status: "Verificar" },
            { title: "Ativação — Tanque 6", fileBase: "graf-ativacao-tanque-6", status: "OK" },
            { title: "Níquel WATT", fileBase: "graf-niquel-watt", status: "Estável" },
            { title: "Estanhagem A", fileBase: "graf-estanhagem-a", status: "Vencido" },
            { title: "Selante", fileBase: "graf-selante", status: "OK" },
            { title: "Estanhagem B", fileBase: "graf-estanhagem-b", status: "OK" }
        ]
    },
    {
        section: "Nanocerâmico",
        items: [
            { title: "1º Desengraxante", fileBase: "graf-des1", status: "OK" },
            { title: "2º Desengraxante", fileBase: "graf-des2", status: "OK" },
            { title: "Decapante 1", fileBase: "graf-dec1", status: "Atenção" },
            { title: "Decapante 2", fileBase: "graf-dec2", status: "OK" },
            { title: "Nanocerâmico — Conc.", fileBase: "graf-nano", status: "Crítico" },
            { title: "Nanocerâmico — Abs.", fileBase: "graf-abso-nano", status: "OK" },
            { title: "Nanocerâmico — pH", fileBase: "graf-ph-nano", status: "OK" },
            { title: "Neutralizador", fileBase: "graf-neu", status: "OK" },
            { title: "Selante", fileBase: "graf-sel", status: "OK" }
        ]
    }
];

const COLS_POR_BLOCO = 16;
let currentTabIdx = 0;
let currentItemIdx = 0;
let rotationTimer;

function getStatusClass(status) {
    if (["OK", "Estável", "Em Conformidade"].includes(status)) return "ok";
    if (["Atenção", "Verificar"].includes(status)) return "warn";
    return "crit";
}

function renderCard(item) {
    document.getElementById('dashboard-content').innerHTML = `
        <div class="card">
            <div class="card-header">
                <div>
                    <div class="card-title">${item.title}</div>
                    <div class="card-yaxis" id="y-axis-label"></div>
                </div>
                <div class="status-badge status-${getStatusClass(item.status)}">${item.status}</div>
            </div>
            <div class="multi-chart-grid" id="grid-wrapper">
                <div style="padding:40px;text-align:center;color:#666;width:100%;">Carregando dados...</div>
            </div>
        </div>`;
    loadCardData(item.fileBase);
}

function loadCardData(fileBase) {
    fetch(`dados/${fileBase}.json?t=${Date.now()}`)
        .then(r => r.json())
        .then(data => {
            const yLabel = document.getElementById('y-axis-label');
            if (data.yAxisLabel) yLabel.textContent = data.yAxisLabel;
            const wrapper = document.getElementById('grid-wrapper');
            wrapper.innerHTML = '';

            if (data.charts && Array.isArray(data.charts)) {
                data.charts.forEach((chartData, index) => {
                    const col = document.createElement('div');
                    col.className = 'chart-column';
                    col.innerHTML = `
                        ${chartData.title ? `<div class="chart-column-title">${chartData.title}</div>` : ''}
                        <img src="graficos/${fileBase}-${index+1}.png?t=${Date.now()}" class="chart-img">
                        ${generateTableHTML(chartData.labels, chartData.series1, chartData.series2)}`;
                    wrapper.appendChild(col);
                });
            } else {
                const col = document.createElement('div');
                col.className = 'chart-column single';
                col.innerHTML = `
                    <img src="graficos/${fileBase}-1.png?t=${Date.now()}" class="chart-img">
                    ${generateTableHTML(data.labels, data.series1, data.series2)}`;
                wrapper.appendChild(col);
            }
        })
        .catch(() => {
            document.getElementById('grid-wrapper').innerHTML = '<div style="padding:40px;text-align:center;">Erro ao carregar dados.</div>';
        });
}

function generateTableHTML(labels, series1, series2) {
    if (!labels) return '';
    let html = '';
    const totalBlocos = Math.ceil(labels.length / COLS_POR_BLOCO);

    for (let b = 0; b < totalBlocos; b++) {
        const inicio = b * COLS_POR_BLOCO;
        const fim = Math.min(inicio + COLS_POR_BLOCO, labels.length);
        const l = labels.slice(inicio, fim);
        const s1 = series1.slice(inicio, fim);
        const s2 = series2 ? series2.slice(inicio, fim) : null;

        html += `<table class="custom-table">`;
        if (b === 0) html += `<tr><th class="table-main-title" colspan="${l.length}">ÚLTIMAS 24 MEDIÇÕES</th></tr>`;
        html += `<tr>${l.map(x => `<th>${x}</th>`).join('')}</tr>`;
        html += `<tr>${s1.map(x => `<td>${x ?? ''}</td>`).join('')}</tr>`;
        if (s2) html += `<tr>${s2.map(x => `<td>${x ?? ''}</td>`).join('')}</tr>`;
        html += `</table>`;
    }
    return html;
}

function nextItem() {
    const tab = tabsConfig[currentTabIdx];
    currentItemIdx++;
    if (currentItemIdx >= tab.items.length) {
        currentItemIdx = 0;
        currentTabIdx = (currentTabIdx + 1) % tabsConfig.length;
    }
    updateDisplay();
}

function updateDisplay() {
    const tab = tabsConfig[currentTabIdx];
    const item = tab.items[currentItemIdx];
    document.getElementById('current-section').textContent = tab.section;
    renderCard(item);

    const dots = document.getElementById('nav-dots');
    dots.innerHTML = '';
    tab.items.forEach((_, idx) => {
        const dot = document.createElement('div');
        dot.className = `dot ${idx === currentItemIdx ? 'active' : ''}`;
        dot.onclick = () => {
            currentItemIdx = idx;
            resetRotation();
            updateDisplay();
        };
        dots.appendChild(dot);
    });
}

function resetRotation() {
    clearInterval(rotationTimer);
    rotationTimer = setInterval(nextItem, 10000);
}

function initClock() {
    function tick() {
        const now = new Date();
        document.getElementById('clock-date').textContent = `DATA: ${now.toLocaleDateString('pt-BR')}`;
        document.getElementById('clock-time').textContent = `HORA: ${now.toLocaleTimeString('pt-BR')}`;
    }
    tick();
    setInterval(tick, 1000);
}

window.onload = () => {
    initClock();
    updateDisplay();
    resetRotation();
    setInterval(() => {
        document.getElementById('last-sync').textContent = new Date().toLocaleTimeString('pt-BR');
        updateDisplay();
    }, 60000);
};
</script>

</body>
</html>
