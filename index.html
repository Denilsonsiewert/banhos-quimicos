<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="1800">
  <title>Controle de Banhos Químicos - JGS | WEG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --weg-blue: #00458F;
      --weg-blue-dark: #002A55;
      --weg-blue-light: #E8F0F8;
      --weg-gray-50: #FAFAFA;
      --weg-gray-100: #F5F5F5;
      --weg-gray-200: #E8E8E8;
      --weg-gray-400: #999999;
      --weg-gray-700: #333333;
      --weg-gray-900: #1A1A1A;
      --status-ok: #2E7D32;
      --status-warn: #F57C00;
      --status-crit: #C62828;
      --shadow: 0 4px 12px rgba(0,0,0,0.1);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--weg-gray-50);
      color: var(--weg-gray-900);
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ========== HEADER ========== */
    header {
      background: white;
      border-bottom: 4px solid var(--weg-blue);
      padding: 10px 24px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 20px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-weg { height: 48px; width: auto; }
    
    header h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--weg-gray-900);
      text-align: center;
    }
    header h1 span { color: var(--weg-blue); }

    .header-clock {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    #relogio {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--weg-blue-dark);
      font-family: 'Courier New', monospace;
    }
    #data {
      font-size: 1rem;
      font-weight: 600;
      color: var(--weg-gray-700);
    }

    /* ========== MAIN ========== */
    main {
      flex: 1;
      padding: 20px 24px;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: var(--weg-blue-light);
      border-radius: var(--radius-sm);
      margin-bottom: 20px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--weg-blue-dark);
    }
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--status-ok);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ========== CAROUSEL ========== */
    .carousel-wrapper {
      position: relative;
      border-radius: var(--radius);
      background: white;
      box-shadow: var(--shadow);
      overflow: hidden;
      min-height: 550px;
    }

    .carousel-track {
      display: flex;
      transition: transform 0.5s ease;
    }

    .carousel-slide {
      min-width: 100%;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      align-content: start;
    }

    .section-header {
      grid-column: 1 / -1;
      padding: 14px 20px;
      background: linear-gradient(135deg, var(--weg-blue), var(--weg-blue-dark));
      color: white;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: var(--radius-sm);
      text-align: center;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ========== CARD ========== */
    .card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--weg-gray-200);
      transition: all 0.3s ease;
      height: 100%;
    }
    .card:hover {
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      transform: translateY(-2px);
    }
    .card.new {
      animation: highlight 2s ease;
      border: 2px solid var(--weg-blue);
    }
    @keyframes highlight {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0, 69, 143, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(0, 69, 143, 0); }
    }

    .card-header {
      padding: 14px 18px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      background: var(--weg-blue);
      text-align: center;
      line-height: 1.4;
    }
    .card-header small {
      display: block;
      font-size: 0.85em;
      font-weight: 400;
      opacity: 0.9;
      margin-top: 3px;
    }

    .card-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    /* ========== GRAPH ========== */
    .graph-container {
      width: 100%;
      height: 280px;
      background: var(--weg-gray-100);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      border: 1px dashed var(--weg-gray-200);
    }
    .graph-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .graph-placeholder {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--weg-gray-400);
      font-size: 0.9rem;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--weg-gray-200);
      border-top-color: var(--weg-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========== TABLE ========== */
    .measurements-container {
      background: white;
      border-radius: var(--radius-sm);
      border: 1px solid var(--weg-gray-200);
      padding: 12px;
    }
    .table-title {
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--weg-blue-dark);
      margin-bottom: 10px;
      text-align: center;
      text-transform: uppercase;
    }

    .analise-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 3px;
      table-layout: fixed;
    }
    .analise-table th {
      background: var(--weg-blue-light);
      color: var(--weg-blue-dark);
      font-weight: 700;
      font-size: 0.75rem;
      padding: 7px 3px;
      border-radius: 5px;
      text-align: center;
    }
    .analise-table td {
      background: var(--weg-gray-100);
      color: var(--weg-gray-900);
      font-weight: 600;
      font-size: 0.85rem;
      padding: 7px 3px;
      text-align: center;
      border-radius: 5px;
      border: 1px solid var(--weg-gray-200);
      font-family: 'Courier New', monospace;
    }

    .val-ok { background: #E8F5E9 !important; color: var(--status-ok) !important; }
    .val-warn { background: #FFF3E0 !important; color: var(--status-warn) !important; }
    .val-crit { background: #FFEBEE !important; color: var(--status-crit) !important; }
    .val-nodata { background: #F5F5F5 !important; color: #BDBDBD !important; }

    /* ========== NAV ========== */
    .carousel-nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      background: white;
      border-top: 1px solid var(--weg-gray-200);
    }
    .nav-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--weg-gray-300);
      cursor: pointer;
      transition: all 0.3s;
    }
    .nav-dot.active {
      background: var(--weg-blue);
      transform: scale(1.3);
    }

    /* ========== FOOTER ========== */
    footer {
      background: white;
      padding: 12px 24px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--weg-gray-400);
      border-top: 1px solid var(--weg-gray-200);
      margin-top: auto;
    }
    footer span { color: var(--weg-blue); font-weight: 700; }

    /* ========== LOADER ========== */
    .loader {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: white;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.4s;
    }
    .loader.hidden { opacity: 0; pointer-events: none; }
    .loader-text {
      font-weight: 600;
      color: var(--weg-blue-dark);
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 1200px) {
      .carousel-slide { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      header { grid-template-columns: 1fr; text-align: center; }
      .logo-weg, .header-clock { justify-self: center; }
      header h1 { font-size: 1.4rem; }
      .graph-container { height: 220px; }
    }
  </style>
</head>
<body>

<div class="loader" id="loader">
  <div class="spinner"></div>
  <div class="loader-text">Carregando Dashboard...</div>
</div>

<header>
  <img src="logo-weg.png" alt="WEG" class="logo-weg" onerror="this.style.display='none'">
  <h1>Controle de Banhos Químicos <span>JGS</span></h1>
  <div class="header-clock">
    <div id="relogio">--:--:--</div>
    <div id="data">--/--/----</div>
  </div>
</header>

<main>
  <div class="status-bar">
    <div class="status-indicator">
      <span class="status-dot"></span>
      <span>Gráficos Detectados: <strong id="total-graficos">0</strong></span>
    </div>
    <div>Última Atualização: <span id="ultima-sync">--:--</span></div>
  </div>

  <div class="carousel-wrapper">
    <div class="carousel-track" id="track"></div>
  </div>
  <div class="carousel-nav" id="nav"></div>
</main>

<footer>
  JGS - Controle de Qualidade | <span>WEG S.A.</span> | 
  Atualização: <span id="ultima">--:--</span>
</footer>

<script>
  // ===========================================================
  //  CONFIGURAÇÕES
  // ===========================================================
  const CONFIG = {
    // GitHub Repository
    repoOwner: 'Denilsonsiewert',
    repoName: 'banhos-quimicos',
    branch: 'main',
    
    // Pastas
    graficosFolder: 'graficos',
    dadosFolder: 'dados',
    
    // Intervalos (ms)
    scanInterval: 120000,        // Verifica novos arquivos a cada 2 min
    dataRefreshInterval: 90000,  // Atualiza dados a cada 1.5 min
    rotateInterval: 25000,       // Rotação do carousel
    
    // Layout
    itemsPerSlide: 2,
    maxMeasurements: 24
  };

  // Estado global
  const state = {
    graficos: [],           // Lista de gráficos detectados
    dadosCache: {},
    currentSlide: 0,
    totalSlides: 0,
    timers: {}
  };

  // ===========================================================
  //  API GITHUB - Listar Arquivos da Pasta
  // ===========================================================
  
  async function listarArquivosPasta(pasta) {
    const url = `https://api.github.com/repos/${CONFIG.repoOwner}/${CONFIG.repoName}/contents/${pasta}?ref=${CONFIG.branch}`;
    
    try {
      const response = await fetch(url, {
        headers: {
          'Accept': 'application/vnd.github.v3+json'
        }
      });
      
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      
      const files = await response.json();
      
      // Filtra apenas PNGs e extrai informações
      return files
        .filter(f => f.type === 'file' && f.name.endsWith('.png'))
        .map(f => {
          // Extrai ID do nome do arquivo
          // Ex: "graf-des-1.png" → { id: "des", numero: 1, nomeArquivo: "graf-des-1.png" }
          const match = f.name.match(/graf-(.+?)(?:-(\d+))?\.png/i);
          const id = match ? match[1] : f.name.replace('.png', '');
          const numero = match && match[2] ? parseInt(match[2]) : 1;
          
          return {
            id: id.toLowerCase(),
            numero: numero,
            nomeArquivo: f.name,
            path: f.path,
            downloadUrl: f.download_url,
            updated: f.sha // Usamos SHA como indicador de versão
          };
        });
    } catch (error) {
      console.error('❌ Erro ao listar pasta:', error);
      return [];
    }
  }

  // ===========================================================
  //  CARREGAR DADOS JSON
  // ===========================================================
  
  async function carregarJSON(graficoId) {
    const cacheKey = `${graficoId}_${Math.floor(Date.now() / 60000)}`;
    
    if (state.dadosCache[cacheKey]) {
      return state.dadosCache[cacheKey];
    }
    
    // Tenta carregar JSON correspondente
    const jsonPath = `${CONFIG.dadosFolder}/graf-${graficoId}.json`;
    const url = `https://raw.githubusercontent.com/${CONFIG.repoOwner}/${CONFIG.repoName}/${CONFIG.branch}/${jsonPath}?t=${Date.now()}`;
    
    try {
      const response = await fetch(url);
      if (!response.ok) return null;
      
      const data = await response.json();
      state.dadosCache[cacheKey] = data;
      return data;
    } catch {
      return null;
    }
  }

  function extrairMedicoes(dados) {
    if (!dados) return [];
    
    const charts = dados.charts || dados['charts '] || [];
    if (!charts || !charts[0]) return [];
    
    const chart = charts[0];
    const labels = chart.labels || chart['labels '] || [];
    const series1 = chart.series1 || chart['series1 '] || [];
    
    const medicoes = [];
    const start = Math.max(0, labels.length - CONFIG.maxMeasurements);
    
    for (let i = start; i < labels.length; i++) {
      let valorStr = String(series1[i] || '').trim();
      let valor = null;
      let hasData = false;
      
      if (valorStr && valorStr !== '#N/D' && valorStr !== 'null') {
        valor = parseFloat(valorStr.replace(',', '.'));
        hasData = !isNaN(valor);
      }
      
      medicoes.push({
        label: labels[i] || '',
        dataFormatada: formatarData(labels[i]),
        valor: valor,
        hasData: hasData
      });
    }
    
    return medicoes;
  }

  // ===========================================================
  //  UTILITÁRIOS
  // ===========================================================
  
  function formatarData(dataStr) {
    if (!dataStr) return '--/--';
    const s = String(dataStr).trim();
    if (s.includes('/')) {
      const [d, m] = s.split('/');
      return `${d.padStart(2,'0')}/${m.padStart(2,'0')}`;
    }
    try {
      const date = new Date(s);
      return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
    } catch {
      return s.substring(0, 5);
    }
  }

  function getStatusClass(valor, ref, tol, hasData) {
    if (!hasData || valor === null) return 'val-nodata';
    const diff = Math.abs(valor - ref);
    if (diff <= tol * 0.5) return 'val-ok';
    if (diff <= tol) return 'val-warn';
    return 'val-crit';
  }

  function getReferencias(id) {
    // Tenta extrair referências do ID ou usa defaults
    const refs = {
      'des': { ref: 26.0, tol: 3.9, nome: 'Desengraxante', sub: 'CONCENTRAÇÃO (ML/L)' },
      'ativacao': { ref: 8.5, tol: 1.28, nome: 'Ativação', sub: 'pH DO BANHO' },
      'estanhagem': { ref: 32.0, tol: 4.8, nome: 'Estanhagem', sub: 'Sn° (g/L)' },
      'nano': { ref: 35.0, tol: 5.25, nome: 'Nanocerâmico', sub: 'Concentração' },
      'dec': { ref: 12.0, tol: 1.8, nome: 'Decapante', sub: 'Concentração' },
      'sel': { ref: 18.0, tol: 2.7, nome: 'Selante', sub: 'Concentração' },
      'neu': { ref: 7.0, tol: 1.05, nome: 'Neutralizador', sub: 'pH' }
    };
    
    // Busca correspondência parcial
    for (const [key, config] of Object.entries(refs)) {
      if (id.toLowerCase().includes(key)) {
        return config;
      }
    }
    
    // Default
    return { ref: 0, tol: 1, nome: id.toUpperCase(), sub: '' };
  }

  // ===========================================================
  //  RENDERIZAÇÃO
  // ===========================================================
  
  function renderTabela(medicoes, ref, tol) {
    if (!medicoes || medicoes.length === 0) {
      return '<div style="text-align:center;padding:20px;color:#999">Sem dados</div>';
    }
    
    let html = '<table class="analise-table">';
    const cols = 12;
    
    for (let row = 0; row < 2; row++) {
      const start = row * cols;
      const chunk = medicoes.slice(start, start + cols);
      if (chunk.length === 0) continue;
      
      // Datas
      html += '<tr>';
      chunk.forEach(m => html += `<th>${m.dataFormatada}</th>`);
      html += '</tr>';
      
      // Valores
      html += '<tr>';
      chunk.forEach(m => {
        const cls = getStatusClass(m.valor, ref, tol, m.hasData);
        const val = m.hasData ? m.valor.toFixed(2).replace('.', ',') : '---';
        html += `<td class="${cls}">${val}</td>`;
      });
      html += '</tr>';
    }
    
    html += '</table>';
    return html;
  }

  async function criarCard(grafico) {
    const { id, downloadUrl, numero } = grafico;
    const refs = getReferencias(id);
    
    // Carrega dados JSON
    const dados = await carregarJSON(id);
    const medicoes = extrairMedicoes(dados);
    
    // Cria elemento
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.graficoId = id;
    
    const nomeDisplay = refs.nome + (numero > 1 ? ` ${numero}` : '');
    
    card.innerHTML = `
      <div class="card-header">
        ${nomeDisplay}
        ${refs.sub ? `<small>${refs.sub}</small>` : ''}
      </div>
      <div class="card-body">
        <div class="graph-container">
          <div class="graph-placeholder">
            <div class="spinner"></div>
            <span>Carregando...</span>
          </div>
          <img src="${downloadUrl}?t=${Date.now()}"
               alt="${nomeDisplay}"
               onload="this.previousElementSibling.style.display='none'"
               onerror="this.style.display='none';this.previousElementSibling.innerHTML='<span>📷 Indisponível</span>'">
        </div>
        <div class="measurements-container">
          <div class="table-title">Últimas ${CONFIG.maxMeasurements} Medições</div>
          ${renderTabela(medicoes, refs.ref, refs.tol)}
        </div>
      </div>
    `;
    
    return card;
  }

  function agruparPorProcesso(graficos) {
    // Agrupa gráficos por tipo de processo
    const grupos = {};
    
    graficos.forEach(g => {
      const refs = getReferencias(g.id);
      const processo = refs.nome.split(' ')[0].toLowerCase();
      
      if (!grupos[processo]) {
        grupos[processo] = {
          nome: refs.nome.split(' ')[0],
          graficos: []
        };
      }
      grupos[processo].graficos.push(g);
    });
    
    return grupos;
  }

  async function renderizarDashboard() {
    const track = document.getElementById('track');
    const nav = document.getElementById('nav');
    
    track.innerHTML = '';
    nav.innerHTML = '';
    
    // Agrupa por processo
    const grupos = agruparPorProcesso(state.graficos);
    
    let slides = [];
    
    // Cria slides para cada grupo
    for (const [processoKey, grupo] of Object.entries(grupos)) {
      // Cria cards
      const cardsPromises = grupo.graficos.map(g => criarCard(g));
      const cards = await Promise.all(cardsPromises);
      
      // Agrupa em slides de N itens
      for (let i = 0; i < cards.length; i += CONFIG.itemsPerSlide) {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        
        // Header do processo
        const header = document.createElement('div');
        header.className = 'section-header';
        header.textContent = grupo.nome;
        slide.appendChild(header);
        
        // Cards
        const slice = cards.slice(i, i + CONFIG.itemsPerSlide);
        slice.forEach(card => slide.appendChild(card));
        
        slides.push(slide);
      }
    }
    
    // Adiciona slides
    slides.forEach(s => track.appendChild(s));
    
    // Navegação
    state.totalSlides = slides.length;
    for (let i = 0; i < state.totalSlides; i++) {
      const dot = document.createElement('div');
      dot.className = `nav-dot${i === 0 ? ' active' : ''}`;
      dot.onclick = () => goToSlide(i);
      nav.appendChild(dot);
    }
    
    // Atualiza contador
    document.getElementById('total-graficos').textContent = state.graficos.length;
    
    console.log(`✅ Dashboard: ${slides.length} slides, ${state.graficos.length} gráficos`);
  }

  function goToSlide(index) {
    const track = document.getElementById('track');
    track.style.transform = `translateX(-${index * 100}%)`;
    
    document.querySelectorAll('.nav-dot').forEach((d, i) => {
      d.classList.toggle('active', i === index);
    });
    
    state.currentSlide = index;
  }

  function iniciarRotacao() {
    if (state.timers.rotation) clearInterval(state.timers.rotation);
    
    if (state.totalSlides > 1) {
      state.timers.rotation = setInterval(() => {
        const next = (state.currentSlide + 1) % state.totalSlides;
        goToSlide(next);
      }, CONFIG.rotateInterval);
    }
  }

  // ===========================================================
  //  SCAN E ATUALIZAÇÃO
  // ===========================================================
  
  async function scanGraficos() {
    console.log('🔍 Escaneando pasta graficos...');
    
    const arquivos = await listarArquivosPasta(CONFIG.graficosFolder);
    
    if (arquivos.length === 0) {
      console.warn('⚠️ Nenhum gráfico encontrado');
      return;
    }
    
    // Verifica se há novos gráficos
    const idsAtuais = state.graficos.map(g => `${g.id}-${g.numero}`).sort().join(',');
    const idsNovos = arquivos.map(g => `${g.id}-${g.numero}`).sort().join(',');
    
    const temMudanca = idsAtuais !== idsNovos;
    
    state.graficos = arquivos;
    
    if (temMudanca) {
      console.log(`🆕 Mudança detectada! ${arquivos.length} gráficos encontrados`);
      await renderizarDashboard();
      iniciarRotacao();
      
      // Efeito "novo"
      document.querySelectorAll('.card').forEach((c, i) => {
        setTimeout(() => {
          c.classList.add('new');
          setTimeout(() => c.classList.remove('new'), 2000);
        }, i * 100);
      });
    }
    
    atualizarTimestamp();
  }

  async function atualizarDados() {
    console.log('🔄 Atualizando dados...');
    state.dadosCache = {}; // Limpa cache
    
    // Re-renderiza mantendo mesma estrutura
    await renderizarDashboard();
    atualizarTimestamp();
  }

  function atualizarTimestamp() {
    const agora = new Date().toLocaleTimeString('pt-BR', { 
      hour: '2-digit', 
      minute: '2-digit' 
    });
    document.getElementById('ultima-sync').textContent = agora;
    document.getElementById('ultima').textContent = agora;
  }

  function iniciarRelogio() {
    function update() {
      const now = new Date();
      document.getElementById('relogio').textContent = now.toLocaleTimeString('pt-BR');
      document.getElementById('data').textContent = now.toLocaleDateString('pt-BR');
    }
    update();
    setInterval(update, 1000);
  }

  function iniciarTimers() {
    // Scan de novos arquivos
    state.timers.scan = setInterval(scanGraficos, CONFIG.scanInterval);
    
    // Atualização de dados
    state.timers.data = setInterval(atualizarDados, CONFIG.dataRefreshInterval);
  }

  // ===========================================================
  //  INICIALIZAÇÃO
  // ===========================================================
  
  async function init() {
    try {
      console.log('🚀 Iniciando dashboard...');
      
      iniciarRelogio();
      await scanGraficos();
      iniciarTimers();
      
      // Esconde loader
      setTimeout(() => {
        document.getElementById('loader').classList.add('hidden');
      }, 1000);
      
    } catch (error) {
      console.error('❌ Erro fatal:', error);
      document.getElementById('loader').innerHTML = `
        <div style="color:#C62828;text-align:center;padding:20px">
          <h3>⚠️ Erro ao carregar</h3>
          <p>${error.message}</p>
          <p style="margin-top:10px;font-size:0.9rem">Recarregue a página (F5)</p>
        </div>
      `;
    }
  }

  // Inicia
  window.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
