
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Químico | WEG Banhos Industriais</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --weg-blue: #005bac;
            --weg-blue-dark: #003d73;
            --weg-light: #00a8e8;
            --weg-bg: linear-gradient(135deg, #eef3f8 0%, #d9e7f5 100%);
            --card-bg: rgba(255,255,255,0.96);
            --card-border: rgba(255,255,255,0.5);
            --text-primary: #1c2b36;
            --text-secondary: #5a6b7b;
            --success: #22c55e;
            --warning: #facc15;
            --danger: #ef4444;
            --shadow: 0 20px 50px rgba(0,0,0,0.12);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--weg-bg);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at top right, rgba(0,91,172,0.12), transparent 35%),
                radial-gradient(circle at bottom left, rgba(0,168,232,0.10), transparent 30%);
            pointer-events: none;
        }

        header {
            height: 120px;
            background: linear-gradient(90deg, var(--weg-blue-dark), var(--weg-blue));
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
            z-index: 10;
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .brand-main {
            font-size: clamp(2.8rem, 4vw, 4.5rem);
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .brand-sub {
            font-size: clamp(1rem, 1.5vw, 1.6rem);
            font-weight: 600;
            opacity: 0.92;
            letter-spacing: 2px;
        }

        .clock-container {
            display: flex;
            gap: 40px;
            font-weight: 700;
        }

        .clock-item {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            min-width: 180px;
        }

        .clock-label {
            font-size: 1rem;
            opacity: 0.85;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .clock-value {
            font-size: 2rem;
        }

        main {
            flex: 1;
            padding: 28px 36px 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .section-title {
            font-size: clamp(2.5rem, 4vw, 4rem);
            font-weight: 900;
            color: var(--weg-blue-dark);
            padding: 18px 30px;
            margin-bottom: 24px;
            background: rgba(255,255,255,0.72);
            border-left: 10px solid var(--weg-blue);
            border-radius: 18px;
            box-shadow: var(--shadow);
            text-transform: uppercase;
            letter-spacing: 2px;
            backdrop-filter: blur(8px);
        }

        .dashboard-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(14px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 26px;
            min-height: calc(100vh - 330px);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid rgba(0,91,172,0.12);
            padding-bottom: 18px;
            gap: 20px;
        }

        .card-title {
            font-size: clamp(2rem, 3vw, 3.5rem);
            font-weight: 800;
            color: var(--weg-blue-dark);
        }

        .card-yaxis {
            margin-top: 8px;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-badge {
            padding: 14px 26px;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: inset 0 -3px rgba(0,0,0,0.08);
            white-space: nowrap;
        }

        .status-ok { background: rgba(34,197,94,0.18); color: #15803d; }
        .status-warn { background: rgba(250,204,21,0.22); color: #a16207; }
        .status-crit { background: rgba(239,68,68,0.18); color: #b91c1c; }

        .multi-chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(700px, 1fr));
            gap: 28px;
            width: 100%;
            align-items: start;
        }

        .chart-column {
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(244,248,252,0.98));
            border-radius: 22px;
            padding: 22px;
            border: 1px solid rgba(0,91,172,0.08);
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
            min-height: 100%;
        }

        .chart-column.single {
            grid-column: 1 / -1;
        }

        .chart-column-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--weg-blue-dark);
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(0,91,172,0.08);
        }

        .chart-img {
            width: 100%;
            max-height: 520px;
            object-fit: contain;
            border-radius: 16px;
            background: white;
            border: 1px solid rgba(0,0,0,0.08);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.03);
        }

        .custom-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 18px rgba(0,0,0,0.06);
            margin-top: 10px;
        }

        .custom-table th,
        .custom-table td {
            padding: 12px 6px;
            text-align: center;
            font-size: clamp(1rem, 1.1vw, 1.3rem);
            border: 1px solid rgba(0,0,0,0.06);
        }

        .custom-table th {
            background: linear-gradient(90deg, var(--weg-blue), var(--weg-light));
            color: white;
            font-weight: 800;
        }

        .table-main-title {
            font-size: 1.3rem !important;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .custom-table td {
            font-weight: 700;
            background: rgba(255,255,255,0.95);
        }

        .custom-table tr:nth-child(even) td {
            background: rgba(240,247,255,0.9);
        }

        .nav-dots {
            display: flex;
            justify-content: center;
            gap: 14px;
            padding-top: 22px;
        }

        .dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(0,91,172,0.25);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: var(--weg-blue);
            transform: scale(1.35);
            box-shadow: 0 0 18px rgba(0,91,172,0.45);
        }

        footer {
            height: 70px;
            background: linear-gradient(90deg, #111827, #1f2937);
            color: #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            font-size: 1.15rem;
            flex-shrink: 0;
        }

        .pulse {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }
            70% { box-shadow: 0 0 0 16px rgba(34,197,94,0); }
            100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
        }

        @media (max-width: 1600px) {
            .multi-chart-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 1024px) {
            header {
                flex-direction: column;
                height: auto;
                padding: 20px;
                gap: 20px;
            }

            .clock-container {
                justify-content: center;
                width: 100%;
            }

            .card {
                min-height: auto;
            }
        }
    </style>
</head>
