<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WEG Banhos Industriais | TV Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Paleta WEG TV */
            --weg-blue: #003f6f;
            --weg-blue-light: #0066cc;
            --weg-orange: #e67e22;
            --weg-orange-light: #ff8c42;
            --weg-dark: #1a2a3a;
            --weg-dark-light: #2c3e50;
            --weg-gray: #f8f9fa;
            --weg-gray-light: #e9ecef;
            --weg-gray-dark: #6c757d;
            --weg-white: #ffffff;
            --weg-shadow: 0 12px 40px rgba(0, 63, 111, 0.15);
            --weg-glow: 0 0 30px rgba(230, 126, 34, 0.4);
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100vh;
            overflow: hidden;
            font-feature-settings: "pnum" 1, "tnum" 1;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: var(--weg-white);
            display: flex;
            flex-direction: column;
            animation: ambient 20s ease-in-out infinite alternate;
        }

        @keyframes ambient {
            0% { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }
            50% { background: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 50%, #34495e 100%); }
            100% { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }
        }

        /* Header */
        header {
            background: rgba(26, 42, 58, 0.95);
            backdrop-filter: blur(20px);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--weg-shadow);
            border-bottom: 4px solid var(--weg-orange);
            position: sticky;
            top: 0;
            z-index: 100;
            height: 90px;
        }

        .logo {
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--weg-orange), var(--weg-orange-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i { font-size: 2.2rem; }

        .title-block h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .info-pill {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 30px;
            font-family: 'SF Mono', Monaco, monospace;
            font-weight: 600;
            font-size: 1.1rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            min-width: 240px;
            text-align: center;
            line-height: 1.3;
        }

        /* Main */
        main {
            flex: 1;
            padding: 24px 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: hidden;
        }

        .section-badge {
            background: linear-gradient(135deg, var(--weg-blue), var(--weg-blue-light));
            color: var(--weg-white);
            padding: 14px 28px;
            font-weight: 700;
            font-size: 1.3rem;
            width: fit-content;
            border-radius: 16px;
            box-shadow: var(--weg-shadow);
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: badgeFloat 6s ease-in-out infinite;
        }

        @keyframes badgeFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .dashboard-scroll {
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        /* Card */
        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(30px);
            border-radius: 24px;
            box-shadow: var(--weg-shadow);
            height: 100%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: cardEntry 0.8s ease-out;
        }

        @keyframes cardEntry {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 36px;
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(248,249,250,0.9));
            border-bottom: 3px solid var(--weg-blue);
            flex-shrink: 0;
        }

        .card-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--weg-blue);
            letter-spacing: -0.02em;
            max-width: 65%;
            line-height: 1.2;
        }

        .status {
            font-weight: 700;
            font-size: 1.1rem;
            padding: 12px 24px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }

        .status-ok { background: linear-gradient(135deg, #d4edda, #c3e6cb); color: var(--success); }
        .status-warn { background: linear-gradient(135deg, #fff3cd, #ffeaa7); color: #856404; }
        .status-crit { background: linear-gradient(135deg, #f8d7da, #f5c6cb); color: var(--danger); }

        /* 🎯 LAYOUT PROPORCIONAL: 60% gráfico / 40% tabela */
        .content-split {
            display: flex;
            flex-direction: column;
            height: calc(100% - 120px);
            overflow: hidden;
        }

        .charts-area {
            flex: 0 0 58%; /* 58% para gráficos */
            min-height: 0;
            padding: 16px 24px 8px;
            overflow: hidden;
        }

        .table-area {
            flex: 0 0 42%; /* 42% para tabela */
            min-height: 0;
            padding: 8px 24px 20px;
            overflow: hidden;
            border-top: 2px solid var(--weg-gray-light);
            background: rgba(248, 249, 250, 0.6);
        }

        /* Grid de gráficos - adaptável */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(48%, 1fr));
            gap: 12px;
            height: 100%;
        }

        .charts-grid:has(.chart-card:only-child) {
            grid-template-columns: 1fr;
        }

        .chart-card {
            background: white;
            border-radius: 16px;
            border: 1px solid var(--weg-gray-light);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }

        .chart-title {
            background: linear-gradient(135deg, var(--weg-blue), var(--weg-blue-light));
            color: white;
            padding: 10px 16px;
            font-weight: 600;
            font-size: 0.95rem;
            text-align: center;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .chart-container {
            flex: 1;
            min-height: 0;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--weg-gray);
        }

        .chart-img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            transition: opacity 0.3s ease;
        }

        .chart-img.loading { opacity: 0; }
        .chart-img.loaded { opacity: 1; }

        /* Tabela otimizada para TV */
        .table-wrap {
            height: 100%;
            overflow: auto;
            border-radius: 12px;
            background: white;
            border: 1px solid var(--weg-gray-light);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .table-wrap::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .table-wrap::-webkit-scrollbar-track { background: var(--weg-gray-light); border-radius: 4px; }
        .table-wrap::-webkit-scrollbar-thumb { background: var(--weg-blue); border-radius: 4px; }

        .custom-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            table-layout: fixed;
        }

        .custom-table th,
        .custom-table td {
            padding: 8px 4px;
            text-align: center;
            border-right: 1px solid var(--weg-gray-light);
            border-bottom: 1px solid var(--weg-gray-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .custom-table th {
            background: linear-gradient(135deg, var(--weg-blue), var(--weg-blue-light));
            color: white;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .table-main-title {
            font-size: 0.95rem !important;
            padding: 10px !important;
            background: var(--weg-dark) !important;
            text-align: center;
            font-weight: 700;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .custom-table tr:nth-child(even) td { background: var(--weg-gray); }
        .custom-table td { font-weight: 500; color: var(--weg-dark); }
        
        .ref-row td {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9) !important;
            color: var(--success) !important;
            font-weight: 700 !important;
        }

        /* Navigation */
        .nav-dots {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            width: fit-content;
            margin: 0 auto;
            box-shadow: var(--weg-shadow);
            flex-shrink: 0;
        }

        .dot {
            width: 16px;
            height: 16px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            transition: all 0.4s ease;
            cursor: default;
        }

        .dot.active {
            background: var(--weg-orange);
            transform: scale(1.5);
            box-shadow: var(--weg-glow);
        }

        /* Footer */
        footer {
            background: rgba(26, 42, 58, 0.95);
            backdrop-filter: blur(20px);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1rem;
            font-weight: 600;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
            height: 56px;
        }

        .pulse {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
            margin-right: 10px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.4); }
        }

        /* Loader */
        .loader {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            font-size: 1.1rem;
            color: var(--weg-blue);
            background: var(--weg-gray);
            border-radius: 12px;
        }

        .loader i {
            font-size: 2.5rem;
            color: var(--weg-orange);
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Loader para tabela */
        .table-loader {
            padding: 20px;
            text-align: center;
            color: var(--weg-gray-dark);
            font-weight: 500;
        }

        /* Responsive para TVs menores */
        @media screen and (max-height: 900px) {
            .content-split { height: calc(100% - 100px); }
            .charts-area { flex: 0 0 55%; }
            .table-area { flex: 0 0 45%; }
            .card-title { font-size: 1.7rem; }
            .custom-table { font-size: 0.8rem; }
            .custom-table th, .custom-table td { padding: 6px 3px; }
        }

        @media screen and (max-width: 1600px) {
            .charts-grid { grid-template-columns: 1fr; }
            header { padding: 16px 28px; height: 80px; }
            main { padding: 20px 28px; }
            .card-title { font-size: 1.6rem; max-width: 60%; }
        }

        /* Kiosk Mode */
        * { cursor: none !important; }
        [onclick], button { pointer-events: none !important; }

        /* Utilitários de animação */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .slide-up { animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-flask"></i>
            WEG<span style="font-weight:400">BANHOS</span>
        </div>
        <div class="title-block">
            <h1>Monitoramento Analítico</h1>
        </div>
        <div class="info-pill">
            <span id="clock-date"></span><br>
            <span id="clock-time"></span>
        </div>
    </header>

    <main>
        <div class="section-badge" id="current-section">Iniciando...</div>
        
        <div class="dashboard-scroll" id="dashboard-content">
            <!-- Conteúdo dinâmico -->
        </div>
        
        <div class="nav-dots" id="nav-dots"></div>
    </main>

    <footer>
        <div><span class="pulse"></span>SISTEMA ONLINE</div>
        <div>Última sincronia: <span id="last-sync">--:--:--</span></div>
    </footer>

    <script>
        const tabsConfig = [
            {
                section: "ESTANHAGEM ELETROLÍTICA",
                items: [
                    { title: "Desengraxante Químico", fileBase: "graf-des", status: "OK" },
                    { title: "Ativação - Tanque 5", fileBase: "graf-ativacao-tanque-5", status: "Verificar" },
                    { title: "Ativação - Tanque 6", fileBase: "graf-ativacao-tanque-6", status: "OK" },
                    { title: "Níquel WATT", fileBase: "graf-niquel-watt", status: "Estável" },
                    { title: "Estanhagem A", fileBase: "graf-estanhagem-a", status: "Vencido" },
                    { title: "Selante Protetivo", fileBase: "graf-selante", status: "OK" },
                    { title: "Estanhagem B", fileBase: "graf-estanhagem-b", status: "OK" }
                ]
            },
            {
                section: "NANOCERÂMICO",
                items: [
                    { title: "1º Desengraxante", fileBase: "graf-des1", status: "OK" },
                    { title: "2º Desengraxante", fileBase: "graf-des2", status: "OK" },
                    { title: "Decapante 1", fileBase: "graf-dec1", status: "Atenção" },
                    { title: "Decapante 2", fileBase: "graf-dec2", status: "OK" },
                    { title: "Nanocerâmico - Concentração", fileBase: "graf-nano", status: "Crítico" },
                    { title: "Nanocerâmico - Absorbância", fileBase: "graf-abso-nano", status: "OK" },
                    { title: "Nanocerâmico - pH", fileBase: "graf-ph-nano", status: "OK" },
                    { title: "Neutralizador", fileBase: "graf-neu", status: "OK" },
                    { title: "Selante Final", fileBase: "graf-sel", status: "OK" }
                ]
            }
        ];

        const COLS_PER_ROW = 12;
        let currentTabIdx = 0, currentItemIdx = 0, rotationTimer;

        function getStatusClass(status) {
            if (["OK", "Estável", "Em Conformidade"].includes(status)) return "ok";
            if (["Atenção", "Verificar", "Vencido"].includes(status)) return "warn";
            return "crit";
        }

        function generateTableHTML(labels, series1, series2) {
            if (!labels?.length) return '<div class="table-loader"><i class="fas fa-info-circle"></i> Sem dados disponíveis</div>';
            
            const r1L = labels.slice(0, COLS_PER_ROW), r1V = series1.slice(0, COLS_PER_ROW);
            const r2L = labels.slice(COLS_PER_ROW, COLS_PER_ROW*2), r2V = series1.slice(COLS_PER_ROW, COLS_PER_ROW*2);

            let html = `<div class="table-wrap"><table class="custom-table"><thead>
                <tr><th class="table-main-title" colspan="${COLS_PER_ROW}">📊 Últimas 24 Análises (ml/L)</th></tr>
                <tr>${r1L.map(l=>`<th>${l}</th>`).join('')}</tr></thead><tbody>
                <tr class="fade-in">${r1V.map(v=>`<td>${v??'---'}</td>`).join('')}</tr>
                <tr>${r2L.map(l=>`<th>${l}</th>`).join('')}</tr>
                <tr class="fade-in" style="animation-delay:0.1s">${r2V.map(v=>`<td>${v??'---'}</td>`).join('')}</tr>`;

            if (series2?.length) {
                const s1 = series2.slice(0, COLS_PER_ROW), s2 = series2.slice(COLS_PER_ROW, COLS_PER_ROW*2);
                html += `<tr class="ref-row"><th colspan="${COLS_PER_ROW}">📈 Valores de Referência</th></tr>
                    <tr class="ref-row fade-in" style="animation-delay:0.2s">${s1.map(v=>`<td>${v??'---'}</td>`).join('')}</tr>
                    <tr class="ref-row fade-in" style="animation-delay:0.3s">${s2.map(v=>`<td>${v??'---'}</td>`).join('')}</tr>`;
            }
            return html + '</tbody></table></div>';
        }

        function loadCardData(fileBase) {
            const wrap = document.getElementById('charts-area');
            if (!wrap) return;

            wrap.innerHTML = `<div class="charts-grid"><div class="chart-card"><div class="loader"><i class="fas fa-spinner"></i><div>Carregando...</div></div></div></div>`;

            fetch(`dados/${fileBase}.json?t=${Date.now()}`)
                .then(r => r.ok ? r.json() : Promise.reject())
                .then(data => {
                    if (!wrap) return;
                    wrap.innerHTML = '';
                    
                    const charts = data.charts?.length ? data.charts : [{title:null, labels:data.labels, series1:data.series1, series2:data.series2}];
                    const grid = document.createElement('div');
                    grid.className = 'charts-grid';

                    charts.forEach((c, i) => {
                        const card = document.createElement('div');
                        card.className = 'chart-card';
                        const title = c.title ? `<div class="chart-title">${c.title}</div>` : '';
                        const imgSrc = `graficos/${fileBase}-${i+1}.png?t=${Date.now()}`;
                        
                        card.innerHTML = `${title}<div class="chart-container">
                            <img src="${imgSrc}" class="chart-img loading" alt="Gráfico" 
                                onload="this.classList.remove('loading');this.classList.add('loaded')"
                                onerror="this.closest('.chart-container').innerHTML='<div class=\\'loader\\'><i class=\\'fas fa-exclamation-triangle\\' style=\\'color:var(--warning)\\'></i><div>Gráfico indisponível</div></div>'">
                        </div>`;
                        grid.appendChild(card);
                    });
                    wrap.appendChild(grid);

                    // Carrega tabela após gráficos
                    setTimeout(() => {
                        const tableArea = document.getElementById('table-area');
                        if (tableArea && charts[0]) {
                            tableArea.innerHTML = generateTableHTML(charts[0].labels, charts[0].series1, charts[0].series2);
                        }
                    }, 300);
                })
                .catch(() => {
                    if (wrap) {
                        wrap.innerHTML = `<div class="charts-grid"><div class="chart-card">
                            <div class="loader" style="background:#fff3cd;color:#856404">
                                <i class="fas fa-exclamation-triangle"></i>
                                <div>Dados indisponíveis</div>
                            </div>
                        </div></div>`;
                    }
                    const tableArea = document.getElementById('table-area');
                    if (tableArea) tableArea.innerHTML = '<div class="table-loader">⚠ Aguardando sincronização...</div>';
                });
        }

        function renderCard(item) {
            const dash = document.getElementById('dashboard-content');
            if (!dash) return;

            dash.innerHTML = `
                <div class="card slide-up">
                    <div class="card-header">
                        <div class="card-title">${item.title}</div>
                        <div class="status status-${getStatusClass(item.status)}">
                            <i class="fas fa-circle"></i>${item.status.toUpperCase()}
                        </div>
                    </div>
                    <div class="content-split">
                        <div class="charts-area">
                            <div id="charts-area" style="height:100%"></div>
                        </div>
                        <div class="table-area">
                            <div id="table-area" class="fade-in">
                                <div class="table-loader"><i class="fas fa-spinner fa-spin"></i> Carregando análises...</div>
                            </div>
                        </div>
                    </div>
                </div>`;
            loadCardData(item.fileBase);
        }

        function updateDisplay() {
            const tab = tabsConfig[currentTabIdx], item = tab.items[currentItemIdx];
            document.getElementById('current-section').textContent = tab.section;
            renderCard(item);
            
            const dots = document.getElementById('nav-dots');
            if (dots) {
                dots.innerHTML = '';
                tab.items.forEach((_, idx) => {
                    const d = document.createElement('div');
                    d.className = `dot ${idx===currentItemIdx?'active':''}`;
                    dots.appendChild(d);
                });
            }
        }

        function nextItem() {
            const tab = tabsConfig[currentTabIdx];
            currentItemIdx = (currentItemIdx + 1) % tab.items.length;
            if (currentItemIdx === 0) currentTabIdx = (currentTabIdx + 1) % tabsConfig.length;
            updateDisplay();
        }

        function resetRotation() {
            if (rotationTimer) clearInterval(rotationTimer);
            rotationTimer = setInterval(nextItem, 20000);
        }

        function initClock() {
            const upd = () => {
                const n = new Date();
                document.getElementById('clock-date').textContent = n.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
                document.getElementById('clock-time').textContent = n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
            };
            upd(); setInterval(upd, 1000);
        }

        function startSync() {
            setInterval(() => {
                document.getElementById('last-sync').textContent = new Date().toLocaleTimeString('pt-BR');
                const tab = tabsConfig[currentTabIdx];
                if (tab?.items[currentItemIdx]) loadCardData(tab.items[currentItemIdx].fileBase);
            }, 60000);
        }

        window.onload = () => {
            setTimeout(() => {
                initClock(); updateDisplay(); resetRotation(); startSync();
            }, 300);
        };

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) { updateDisplay(); resetRotation(); }
        });

        document.addEventListener('keydown', e => {
            if (['F5','F12','F11'].includes(e.key)) e.preventDefault();
        });
    </script>
</body>
</html>
