<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Controle Analítico | WEG Banhos Industriais</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --weg-blue: #00458F;
  --weg-blue-dark: #003366;
  --weg-gray: #4A5568;
  --weg-light-gray: #718096;
  --bg-primary: #F7F9FC;
  --bg-secondary: #FFFFFF;
  --border-color: #CBD5E0;
  --text-primary: #2D3748;
  --text-secondary: #4A5568;
  --success: #38A169;
  --warning: #D69E2E;
  --danger: #E53E3E;
  --shadow: rgba(0, 0, 0, 0.08);
}

* { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0; 
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow: hidden;
  line-height: 1.5;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 48px;
  background: var(--bg-secondary);
  box-shadow: 0 1px 3px var(--shadow);
  height: 88px;
  border-bottom: 4px solid var(--weg-blue);
}

.logo-weg { 
  height: 52px;
  opacity: 0.95;
}

.title-block {
  text-align: center;
  flex: 1;
}

.title {
  font-size: 2rem;
  font-weight: 700;
  color: var(--weg-blue);
  letter-spacing: -0.5px;
  text-transform: uppercase;
}

.info-pill {
  display: flex;
  gap: 24px;
  background: var(--bg-primary);
  padding: 12px 28px;
  border-radius: 4px;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--weg-blue-dark);
  font-family: 'Inter', monospace;
  border: 1px solid var(--border-color);
}

main {
  padding: 24px 40px;
  height: calc(100vh - 136px);
  display: flex;
  flex-direction: column;
}

.section-title {
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: 20px;
  padding: 12px 24px;
  background: var(--weg-blue);
  color: white;
  border-radius: 2px;
  letter-spacing: 0.3px;
}

#dashboard-content {
  flex: 1;
  overflow-y: auto;
  padding-right: 8px;
}

#dashboard-content::-webkit-scrollbar {
  width: 8px;
}
#dashboard-content::-webkit-scrollbar-track {
  background: var(--bg-primary);
}
#dashboard-content::-webkit-scrollbar-thumb {
  background: var(--weg-blue);
  border-radius: 4px;
}

.card {
  background: var(--bg-secondary);
  padding: 28px;
  border-radius: 4px;
  box-shadow: 0 2px 8px var(--shadow);
  border: 1px solid var(--border-color);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--border-color);
}

.card-title {
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--weg-blue-dark);
  letter-spacing: -0.3px;
}

.card-subtitle {
  font-size: 0.9rem;
  color: var(--weg-light-gray);
  font-weight: 500;
  margin-top: 6px;
}

.status-badge {
  padding: 8px 24px;
  border-radius: 3px;
  font-weight: 600;
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.status-ok { 
  background: #F0FFF4; 
  color: #276749; 
  border: 2px solid var(--success); 
}
.status-warn { 
  background: #FFFBEB; 
  color: #B7791F; 
  border: 2px solid var(--warning); 
}
.status-crit { 
  background: #FFF5F5; 
  color: #C53030; 
  border: 2px solid var(--danger); 
}

.chart-wrapper {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 4px;
  padding: 20px;
  margin-bottom: 24px;
}

.chart-title {
  text-align: center;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--weg-blue);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-color);
}

.chart-img {
  width: 100%;
  height: 400px;
  object-fit: contain;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
}

/* Tabela profissional - 2 linhas de 12 colunas */
.table-container {
  width: 100%;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 4px;
  overflow: hidden;
}

.custom-table {
  width: 100%;
  border-collapse: collapse;
  font-family: 'Inter', sans-serif;
  font-size: 0.875rem;
}

.custom-table th,
.custom-table td {
  border: 1px solid var(--border-color);
  padding: 10px 8px;
  text-align: center;
  font-weight: 500;
  color: var(--text-primary);
}

.custom-table th {
  background: var(--weg-blue);
  color: white;
  font-weight: 600;
  text-transform: uppercase;
  font-size: 0.8rem;
  letter-spacing: 0.3px;
}

.table-main-title {
  font-size: 1rem !important;
  padding: 14px !important;
  background: var(--weg-blue-dark) !important;
  text-align: center;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.custom-table tr:nth-child(even) td {
  background: var(--bg-primary);
}

.nav-dots {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 24px;
  padding: 12px 24px;
  background: var(--bg-secondary);
  border-radius: 4px;
  box-shadow: 0 1px 3px var(--shadow);
  width: fit-content;
  align-self: center;
  border: 1px solid var(--border-color);
}

.dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--weg-light-gray);
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
}

.dot.active {
  background: var(--weg-blue);
  transform: scale(1.1);
  border-color: var(--weg-blue-dark);
}

footer {
  height: 52px;
  background: var(--bg-secondary);
  color: var(--text-secondary);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 40px;
  font-size: 0.875rem;
  border-top: 1px solid var(--border-color);
  font-weight: 500;
}

.pulse {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
  animation: pulse 2s infinite;
  display: inline-block;
  margin-right: 8px;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(56, 161, 105, 0.7); }
  70% { box-shadow: 0 0 0 6px rgba(56, 161, 105, 0); }
  100% { box-shadow: 0 0 0 0 rgba(56, 161, 105, 0); }
}

.loader-shimmer {
  background: linear-gradient(90deg, #E2E8F0 25%, #CBD5E0 50%, #E2E8F0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 4px;
  height: 400px;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

@media (max-width: 1200px) {
  .custom-table th, .custom-table td { 
    font-size: 0.8rem; 
    padding: 8px 6px; 
  }
  .chart-img { 
    height: 350px; 
  }
}
</style>
</head>
<body>

<header>
  <img src="https://seeklogo.com/images/W/weg-logo-3044563950-seeklogo.com.png" class="logo-weg" alt="WEG Logo">
  <div class="title-block">
    <div class="title">CONTROLE ANALÍTICO BANHOS INDUSTRIAIS</div>
  </div>
  <div class="info-pill">
    <span id="clock-date">DATA: --/--/----</span>
    <span id="clock-time">HORA: --:--:--</span>
  </div>
</header>

<main>
  <div class="section-title" id="current-section">Carregando...</div>
  <div id="dashboard-content"></div>
  <div class="nav-dots" id="nav-dots"></div>
</main>

<footer>
  <div><span class="pulse"></span>Dados em tempo real - WEG Qualidade</div>
  <div>Última atualização: <span id="last-sync">Agora</span></div>
</footer>

<script>
const tabsConfig = [
    {
        section: "ESTANHAGEM - LINHA ALTA PERFORMANCE",
        items: [
            { title: "Desengraxante Químico", fileBase: "graf-des", status: "OK" },
            { title: "Ativação - Tanque 5", fileBase: "graf-ativacao-tanque-5", status: "Verificar" },
            { title: "Ativação - Tanque 6", fileBase: "graf-ativacao-tanque-6", status: "OK" },
            { title: "Níquel WATT", fileBase: "graf-niquel-watt", status: "Estável" },
            { title: "Estanhagem A", fileBase: "graf-estanhagem-a", status: "Vencido" },
            { title: "Selante Protetivo", fileBase: "graf-selante", status: "OK" },
            { title: "Estanhagem B", fileBase: "graf-estanhagem-b", status: "OK" }
        ]
    },
    {
        section: "NANOCERÂMICO - REVOLUÇÃO ANTICORROSÃO",
        items: [
            { title: "1º Desengraxante", fileBase: "graf-des1", status: "OK" },
            { title: "2º Desengraxante", fileBase: "graf-des2", status: "OK" },
            { title: "Decapante 1", fileBase: "graf-dec1", status: "Atenção" },
            { title: "Decapante 2", fileBase: "graf-dec2", status: "OK" },
            { title: "Nanocerâmico - Concentração", fileBase: "graf-nano", status: "Crítico" },
            { title: "Nanocerâmico - Absorbância", fileBase: "graf-abso-nano", status: "OK" },
            { title: "Nanocerâmico - pH", fileBase: "graf-ph-nano", status: "OK" },
            { title: "Neutralizador", fileBase: "graf-neu", status: "OK" },
            { title: "Selante Final", fileBase: "graf-sel", status: "OK" }
        ]
    }
];

const COLS_PER_ROW = 12;
let currentTabIdx = 0;
let currentItemIdx = 0;
let rotationTimer;

function getStatusClass(status) {
    if (["OK", "Estável", "Em Conformidade"].includes(status)) return "ok";
    if (["Atenção", "Verificar", "Vencido"].includes(status)) return "warn";
    return "crit";
}

// Gera tabela com 2 linhas: primeira com datas/valores, segunda com datas/valores
function generateTableHTML(labels, series1, series2) {
    if (!labels || labels.length === 0) return '';
    
    // Divide em 2 linhas de 12 colunas
    const row1Labels = labels.slice(0, COLS_PER_ROW);
    const row1Values = series1.slice(0, COLS_PER_ROW);
    const row2Labels = labels.slice(COLS_PER_ROW, COLS_PER_ROW * 2);
    const row2Values = series1.slice(COLS_PER_ROW, COLS_PER_ROW * 2);
    
    let html = `<div class="table-container"><table class="custom-table">`;
    html += `<thead><tr><th class="table-main-title" colspan="${COLS_PER_ROW}">REGISTRO DAS ÚLTIMAS 24 ANÁLISES - VALORES REAIS</th></tr>`;
    
    // Linha 1: Datas
    html += `<tr>${row1Labels.map(label => `<th>${label}</th>`).join('')}</tr>`;
    // Linha 2: Análises
    html += `<tr>${row1Values.map(val => `<td><strong>${val !== null && val !== undefined ? val : '---'}</strong></td>`).join('')}</tr>`;
    
    // Linha 3: Datas
    html += `<tr>${row2Labels.map(label => `<th>${label}</th>`).join('')}</tr>`;
    // Linha 4: Análises
    html += `<tr>${row2Values.map(val => `<td><strong>${val !== null && val !== undefined ? val : '---'}</strong></td>`).join('')}</tr>`;
    
    html += `</tbody></table></div>`;
    return html;
}

function loadCardData(fileBase) {
    const wrapperElem = document.getElementById('chart-wrapper');
    if (!wrapperElem) return;
    wrapperElem.innerHTML = `<div class="loader-shimmer"></div>`;
    
    fetch(`dados/${fileBase}.json?t=${Date.now()}`)
        .then(r => {
            if (!r.ok) throw new Error('HTTP error');
            return r.json();
        })
        .then(data => {
            if (!wrapperElem) return;
            wrapperElem.innerHTML = '';

            if (data.charts && Array.isArray(data.charts) && data.charts.length > 0) {
                data.charts.forEach((chartData, idx) => {
                    const chartDiv = document.createElement('div');
                    chartDiv.className = 'chart-wrapper';
                    const titleHtml = chartData.title ? `<div class="chart-title">${chartData.title}</div>` : '';
                    const imgSrc = `graficos/${fileBase}-${idx+1}.png?t=${Date.now()}`;
                    const tableHtml = generateTableHTML(chartData.labels, chartData.series1, chartData.series2);
                    chartDiv.innerHTML = `${titleHtml}<img src="${imgSrc}" class="chart-img" alt="Gráfico" onerror="this.style.display='none'">${tableHtml}`;
                    wrapperElem.appendChild(chartDiv);
                });
            } else if (data.labels && data.series1) {
                const chartDiv = document.createElement('div');
                chartDiv.className = 'chart-wrapper';
                const imgSrc = `graficos/${fileBase}-1.png?t=${Date.now()}`;
                const tableHtml = generateTableHTML(data.labels, data.series1, data.series2);
                chartDiv.innerHTML = `<img src="${imgSrc}" class="chart-img" alt="Gráfico" onerror="this.style.display='none'">${tableHtml}`;
                wrapperElem.appendChild(chartDiv);
            }
        })
        .catch(err => {
            console.warn(`Erro ao carregar ${fileBase}:`, err);
            if (wrapperElem) {
                wrapperElem.innerHTML = `<div style="padding:60px;text-align:center;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:4px;">
                    <div style="color:var(--text-secondary);font-size:1.1rem;">Dados não disponíveis</div>
                    <div style="color:var(--weg-light-gray);font-size:0.9rem;margin-top:8px;">${fileBase}.json</div>
                </div>`;
            }
        });
}

function renderCard(item) {
    const dashboard = document.getElementById('dashboard-content');
    if (!dashboard) return;
    dashboard.innerHTML = `
        <div class="card">
            <div class="card-header">
                <div>
                    <div class="card-title">${item.title}</div>
                    <div class="card-subtitle">Parâmetros de controle</div>
                </div>
                <div class="status-badge status-${getStatusClass(item.status)}">${item.status}</div>
            </div>
            <div id="chart-wrapper">
                <div style="padding:60px;text-align:center;color:var(--weg-light-gray);">Inicializando...</div>
            </div>
        </div>`;
    loadCardData(item.fileBase);
}

function updateDisplay() {
    const tab = tabsConfig[currentTabIdx];
    const item = tab.items[currentItemIdx];
    document.getElementById('current-section').textContent = tab.section;
    renderCard(item);
    
    const dotsContainer = document.getElementById('nav-dots');
    if (dotsContainer) {
        dotsContainer.innerHTML = '';
        tab.items.forEach((it, idx) => {
            const dot = document.createElement('div');
            dot.className = `dot ${idx === currentItemIdx ? 'active' : ''}`;
            dot.onclick = (e) => {
                e.stopPropagation();
                currentItemIdx = idx;
                resetRotation();
                updateDisplay();
            };
            dotsContainer.appendChild(dot);
        });
    }
}

function nextItem() {
    const tab = tabsConfig[currentTabIdx];
    if (!tab) return;
    if (currentItemIdx + 1 < tab.items.length) {
        currentItemIdx++;
    } else {
        currentItemIdx = 0;
        currentTabIdx = (currentTabIdx + 1) % tabsConfig.length;
    }
    updateDisplay();
}

function resetRotation() {
    if (rotationTimer) clearInterval(rotationTimer);
    rotationTimer = setInterval(nextItem, 15000);
}

function initClock() {
    function tick() {
        const now = new Date();
        const optionsDate = { year: 'numeric', month: '2-digit', day: '2-digit' };
        document.getElementById('clock-date').textContent = `DATA: ${now.toLocaleDateString('pt-BR', optionsDate)}`;
        document.getElementById('clock-time').textContent = `HORA: ${now.toLocaleTimeString('pt-BR')}`;
    }
    tick();
    setInterval(tick, 1000);
}

function startPeriodicSync() {
    setInterval(() => {
        const lastSyncSpan = document.getElementById('last-sync');
        if (lastSyncSpan) {
            lastSyncSpan.textContent = new Date().toLocaleTimeString('pt-BR');
        }
        const tab = tabsConfig[currentTabIdx];
        if (tab && tab.items[currentItemIdx]) {
            loadCardData(tab.items[currentItemIdx].fileBase);
        }
    }, 60000);
}

window.onload = () => {
    initClock();
    updateDisplay();
    resetRotation();
    startPeriodicSync();
};
</script>
</body>
</html>
