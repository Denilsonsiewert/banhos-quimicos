<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="300">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Banhos Químicos - JGS | WEG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --weg-blue: #00458F;
      --weg-blue-dark: #002A55;
      --weg-blue-light: #E8F0F8;
      --weg-gray-50: #FAFAFA;
      --weg-gray-100: #F5F5F5;
      --weg-gray-200: #E8E8E8;
      --weg-gray-400: #999999;
      --weg-gray-700: #333333;
      --weg-gray-900: #1A1A1A;
      --status-ok: #2E7D32;
      --status-warn: #F57C00;
      --status-crit: #C62828;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--weg-gray-50);
      color: var(--weg-gray-900);
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: white;
      border-bottom: 3px solid var(--weg-blue);
      padding: 12px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-badge {
      background: var(--weg-blue);
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: 1px;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--weg-gray-900);
    }

    header h1 span {
      color: var(--weg-blue);
      font-weight: 800;
    }

    .clock-block {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #relogio {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--weg-blue-dark);
      font-family: 'Courier New', monospace;
    }

    #data {
      font-size: 0.9rem;
      color: var(--weg-gray-400);
      font-weight: 600;
    }

    /* Layout Principal */
    main {
      flex: 1;
      padding: 20px 30px;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .secao-titulo {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--weg-blue-dark);
      text-transform: uppercase;
      margin-bottom: 15px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--weg-blue-light);
    }

    /* Carousel */
    .carousel-container {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
    }

    .carousel-track {
      display: flex;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .carousel-slide {
      min-width: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 10px;
    }

    /* Card */
    .card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--weg-gray-200);
    }

    .card-header {
      padding: 12px 16px;
      font-weight: 700;
      font-size: 0.95rem;
      color: white;
      background: var(--weg-blue);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-body {
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      flex: 1;
    }

    /* Gráfico - Maior Destaque */
    .graph-container {
      width: 100%;
      height: 280px;
      background: var(--weg-gray-100);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .graph-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      z-index: 2;
    }

    .graph-placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--weg-gray-400);
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* Tabela de Medições - Menor Destaque */
    .measurements-container {
      background: white;
      border-radius: var(--radius-sm);
      border: 1px solid var(--weg-gray-200);
      padding: 12px;
      flex-shrink: 0;
      overflow-x: auto;
    }

    .table-title {
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--weg-blue-dark);
      margin-bottom: 8px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .analise-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 3px;
      table-layout: fixed;
      min-width: 100%;
    }

    .analise-table th {
      background: var(--weg-blue-light);
      color: var(--weg-blue-dark);
      font-weight: 700;
      font-size: 0.75rem;
      padding: 4px 2px;
      border-radius: 3px;
      text-align: center;
    }

    .analise-table td {
      background: var(--weg-gray-100);
      color: var(--weg-gray-900);
      font-weight: 600;
      font-size: 0.8rem;
      padding: 4px 2px;
      text-align: center;
      border-radius: 3px;
      border: 1px solid var(--weg-gray-200);
    }

    /* Status Colors - Sóbrio */
    .val-ok {
      background: #E8F5E9 !important;
      color: var(--status-ok) !important;
    }

    .val-warn {
      background: #FFF3E0 !important;
      color: var(--status-warn) !important;
    }

    .val-crit {
      background: #FFEBEE !important;
      color: var(--status-crit) !important;
    }

    /* Footer */
    footer {
      background: white;
      padding: 12px 30px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--weg-gray-400);
      border-top: 1px solid var(--weg-gray-200);
    }

    footer span {
      color: var(--weg-blue);
      font-weight: 700;
    }

    /* Navegação */
    .carousel-nav {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 15px;
    }

    .nav-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--weg-gray-300);
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid white;
      box-shadow: var(--shadow);
    }

    .nav-dot.active {
      background: var(--weg-blue);
      transform: scale(1.2);
    }

    /* Loader */
    .loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.5s ease;
    }

    .loader-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--weg-gray-200);
      border-top-color: var(--weg-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Responsividade */
    @media (max-width: 1200px) {
      .carousel-slide {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="loader-overlay" id="loader">
  <div class="spinner"></div>
  <div style="font-weight: 700; color: var(--weg-blue-dark)">Carregando Dashboard...</div>
</div>

<header>
  <div class="header-brand">
    <div class="logo-badge">WEG</div>
    <h1>Controle de Banhos Químicos &nbsp;<span>JGS</span></h1>
  </div>
  <div class="clock-block">
    <div id="relogio">--:--:--</div>
    <div id="data">--/--/----</div>
  </div>
</header>

<main>
  <div class="carousel-container">
    <div class="carousel-track" id="track-main"></div>
  </div>
  <div class="carousel-nav" id="nav-main"></div>
</main>

<footer>
  JGS - Controle de Qualidade & Processos | <span>WEG S.A.</span> | Última Sincronização: <span id="ultima">--:--</span>
</footer>

<script>
  const CONFIG = {
    rotateInterval: 20000, // 20 segundos por slide
    refreshInterval: 60000,
    itemsPerSlide: 2
  };

  // Configuração dos processos e mapeamento dos gráficos
  // ATENÇÃO: Ajuste os nomes dos arquivos ('file') e índices ('chartIndex') conforme seus arquivos reais no GitHub
  const processos = [
    {
      nome: 'Estanhagem Eletrolítica',
      items: [
        // Exemplo: Se o arquivo 'estanhagem-a.json' tem 4 gráficos no array charts
        { id: 'estaA_1', nome: 'Estanhagem A - Gráfico 1', file: 'estanhagem-a', chartIndex: 0, ref: 32.0, tol: 4.8 },
        { id: 'estaA_2', nome: 'Estanhagem A - Gráfico 2', file: 'estanhagem-a', chartIndex: 1, ref: 32.0, tol: 4.8 },
        { id: 'estaA_3', nome: 'Estanhagem A - Gráfico 3', file: 'estanhagem-a', chartIndex: 2, ref: 32.0, tol: 4.8 },
        { id: 'estaA_4', nome: 'Estanhagem A - Gráfico 4', file: 'estanhagem-a', chartIndex: 3, ref: 32.0, tol: 4.8 }
      ]
    },
    {
      nome: 'Processo Nanocerâmico',
      items: [
        // Exemplo genérico: Ajuste 'file' para o nome real do seu arquivo JSON (ex: 'graf-abso-nano')
        { id: 'nano_1', nome: 'Nanocerâmico - Conc.', file: 'nano-dados', chartIndex: 0, ref: 35.0, tol: 5.25 },
        { id: 'nano_2', nome: 'Nanocerâmico - Abs.', file: 'graf-abso-nano', chartIndex: 0, ref: 1.2, tol: 0.18 }, // Usando o arquivo de exemplo
        { id: 'nano_3', nome: 'Nanocerâmico - pH', file: 'nano-dados', chartIndex: 2, ref: 4.5, tol: 0.68 },
        { id: 'nano_4', nome: 'Nanocerâmico - Temp', file: 'nano-dados', chartIndex: 3, ref: 25.0, tol: 2.0 }
      ]
    }
  ];

  // Cache para dados carregados
  let dataCache = {};

  // Carregar dados do arquivo JSON e limpar chaves com espaços (bug da macro Excel)
  async function carregarDados(fileName) {
    if (dataCache[fileName]) {
      return dataCache[fileName];
    }

    try {
      const response = await fetch(`dados/${fileName}.json?t=${Date.now()}`);
      if (!response.ok) throw new Error(`Arquivo não encontrado: ${fileName}.json`);
      
      let rawData = await response.json();
      
      // CORREÇÃO: Remover espaços em branco das chaves principais (ex: "charts " -> "charts")
      const cleanData = {};
      for (const key in rawData) {
        const cleanKey = key.trim(); 
        cleanData[cleanKey] = rawData[key];
      }

      // Limpar também dentro do array de charts se necessário (títulos, labels, series)
      if (cleanData.charts && Array.isArray(cleanData.charts)) {
        cleanData.charts = cleanData.charts.map(chart => {
          const cleanChart = {};
          for (const k in chart) {
            cleanChart[k.trim()] = chart[k];
          }
          return cleanChart;
        });
      }

      dataCache[fileName] = cleanData;
      return cleanData;
    } catch (error) {
      console.error(`Erro ao carregar dados/${fileName}.json:`, error);
      return null;
    }
  }

  // Extrair últimas 24 medições tratando valores "#N/D" e chaves limpas
  function extrairMedicoes(jsonData, chartIndex) {
    if (!jsonData || !jsonData.charts || jsonData.charts.length <= chartIndex) {
      console.warn(`Gráfico no índice ${chartIndex} não encontrado ou JSON vazio.`);
      return [];
    }

    const chart = jsonData.charts[chartIndex];
    const labels = chart.labels || [];
    const series = chart.series1 || [];

    const medicoes = [];
    const count = Math.min(labels.length, series.length);
    
    // Pega os últimos 24 itens
    const startIndex = Math.max(0, count - 24);

    for (let i = startIndex; i < count; i++) {
      let rawLabel = String(labels[i]).trim();
      let rawValue = String(series[i]).trim();

      // Tratamento para "#N/D" ou valores vazios
      let valorNum = null;
      if (rawValue !== "#N/D" && rawValue !== "" && !isNaN(parseFloat(rawValue.replace(',', '.')))) {
        valorNum = parseFloat(rawValue.replace(',', '.'));
      }

      // Só adiciona se a data for válida (não for #N/D)
      if (rawLabel !== "#N/D") {
        medicoes.push({
          data: rawLabel,
          valor: valorNum
        });
      }
    }

    return medicoes;
  }

  // Classificar status
  function getStatusClass(valor, ref, tol) {
    if (valor === null) return 'val-warn';
    const diff = Math.abs(valor - ref);
    if (diff <= tol * 0.5) return 'val-ok'; 
    if (diff <= tol) return 'val-warn'; 
    return 'val-crit'; 
  }

  // Renderizar tabela de medições
  function renderTabela(medicoes, ref, tol) {
    if (medicoes.length === 0) return '<div style="text-align:center; padding:10px; color:#999;">Sem dados recentes</div>';

    const colsPerRow = 12;
    let html = '<table class="analise-table">';

    const totalRows = Math.ceil(medicoes.length / colsPerRow);
    
    for (let row = 0; row < totalRows; row++) {
      const start = row * colsPerRow;
      const end = start + colsPerRow;
      const chunk = medicoes.slice(start, end);

      // Linha de Datas
      html += '<tr>';
      chunk.forEach(m => html += `<th>${m.data}</th>`);
      html += '</tr>';

      // Linha de Valores
      html += '<tr>';
      chunk.forEach(m => {
        const cls = getStatusClass(m.valor, ref, tol);
        const displayValue = m.valor !== null ? m.valor.toFixed(1).replace('.', ',') : '---';
        html += `<td class="${cls}">${displayValue}</td>`;
      });
      html += '</tr>';
    }

    html += '</table>';
    return html;
  }

  // Criar card individual
  async function criarCard(itemConfig) {
    const { file, chartIndex, nome, ref, tol } = itemConfig;
    
    // Carregar dados reais
    const jsonData = await carregarDados(file);
    const medicoes = extrairMedicoes(jsonData, chartIndex);
    const tabelaHtml = renderTabela(medicoes, ref, tol);

    // Nome do arquivo da imagem do gráfico
    const imgName = `graf-${file}.png`; 

    return `
      <div class="card">
        <div class="card-header">${nome}</div>
        <div class="card-body">
          <div class="graph-container">
            <div class="graph-placeholder">📊 Carregando Gráfico...</div>
            <img src="graficos/${imgName}?t=${Date.now()}"
                 alt="Gráfico ${nome}"
                 onerror="this.style.display='none'"
                 onload="this.previousElementSibling.style.display='none'">
          </div>
          <div class="measurements-container">
            <div class="table-title">Últimas 24 Medições</div>
            ${tabelaHtml}
          </div>
        </div>
      </div>
    `;
  }

  // Inicializar carrossel unificado
  async function initCarousel() {
    const track = document.getElementById('track-main');
    const nav = document.getElementById('nav-main');

    let allSlides = [];
    let slideIndex = 0;

    // Coletar todos os items expandidos de todos os processos
    let allItems = [];
    
    for (const processo of processos) {
      processo.items.forEach(item => {
        allItems.push({ ...item, processoNome: processo.nome });
      });
    }

    if (allItems.length === 0) {
      track.innerHTML = '<div style="padding:20px; text-align:center;">Nenhum dado configurado para exibição.</div>';
      return;
    }

    const slidesCount = Math.ceil(allItems.length / CONFIG.itemsPerSlide);

    for (let i = 0; i < slidesCount; i++) {
      const slide = document.createElement('div');
      slide.className = 'carousel-slide';

      const startItem = allItems[i * CONFIG.itemsPerSlide];
      
      const titleDiv = document.createElement('div');
      titleDiv.style.gridColumn = '1 / -1';
      titleDiv.style.marginBottom = '5px';
      titleDiv.innerHTML = `<div class="secao-titulo">${startItem.processoNome}</div>`;
      slide.appendChild(titleDiv);

      const end = (i + 1) * CONFIG.itemsPerSlide;
      const slideItems = allItems.slice(i * CONFIG.itemsPerSlide, end);

      for (const item of slideItems) {
        const cardHtml = await criarCard(item);
        const cardDiv = document.createElement('div');
        cardDiv.innerHTML = cardHtml;
        slide.appendChild(cardDiv.firstElementChild);
      }

      track.appendChild(slide);
      allSlides.push(slide);

      const dot = document.createElement('div');
      dot.className = `nav-dot ${slideIndex === 0 ? 'active' : ''}`;
      dot.onclick = () => goToSlide(slideIndex);
      nav.appendChild(dot);

      slideIndex++;
    }

    // Rotação automática
    let currentSlide = 0;
    setInterval(() => {
      currentSlide = (currentSlide + 1) % allSlides.length;
      goToSlide(currentSlide);
    }, CONFIG.rotateInterval);
  }

  // Navegar para slide
  function goToSlide(index) {
    const track = document.getElementById('track-main');
    const dots = document.querySelectorAll('#nav-main .nav-dot');
    if(track && dots.length > 0) {
        track.style.transform = `translateX(-${index * 100}%)`;
        dots.forEach((d, i) => d.classList.toggle('active', i === index));
    }
  }

  // Atualizar relógio e data
  function updateClock() {
    const agora = new Date();
    document.getElementById('relogio').innerText = agora.toLocaleTimeString('pt-BR');
    document.getElementById('data').innerText = agora.toLocaleDateString('pt-BR');
    document.getElementById('ultima').innerText = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  // Inicializar
  async function init() {
    await initCarousel();
    updateClock();
    setInterval(updateClock, 1000);

    setTimeout(() => {
      document.getElementById('loader').classList.add('hidden');
    }, 1500);
  }

  window.onload = init;
</script>

</body>
</html>
