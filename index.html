<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="300">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Banhos Químicos - JGS | WEG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --weg-blue: #00458F;
      --weg-blue-dark: #002A55;
      --weg-blue-light: #E8F0F8;
      --weg-gray-50: #FAFAFA;
      --weg-gray-100: #F5F5F5;
      --weg-gray-200: #E8E8E8;
      --weg-gray-400: #999999;
      --weg-gray-700: #333333;
      --weg-gray-900: #1A1A1A;
      --status-ok: #2E7D32;
      --status-warn: #F57C00;
      --status-crit: #1A1A1A;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--weg-gray-50);
      color: var(--weg-gray-900);
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: white;
      border-bottom: 3px solid var(--weg-blue);
      padding: 12px 30px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .header-logo { justify-self: start; }
    .logo-weg { height: 50px; width: auto; object-fit: contain; }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--weg-gray-900);
      text-align: center;
      justify-self: center;
    }
    header h1 span { color: var(--weg-blue); font-weight: 900; }

    .header-clock {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    #relogio, #data {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--weg-blue-dark);
      font-family: 'Courier New', monospace;
    }

    /* Layout Principal */
    main {
      flex: 1;
      padding: 30px 30px;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .secao-titulo {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--weg-blue-dark);
      text-transform: uppercase;
      margin-bottom: 20px;
      padding: 12px 20px;
      background: var(--weg-blue-light);
      border-radius: var(--radius-sm);
      text-align: center;
      width: 100%;
      letter-spacing: 0.5px;
    }

    /* Carousel */
    .carousel-container {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      min-height: 400px; /* Evita colapso se vazio inicialmente */
    }

    .carousel-track {
      display: flex;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .carousel-slide {
      min-width: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* 2 Cards por linha */
      gap: 25px;
      padding: 15px;
      align-content: start;
    }

    /* Card */
    .card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--weg-gray-200);
      height: 100%;
    }

    .card-header {
      padding: 14px 18px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      background: var(--weg-blue);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
      line-height: 1.4;
    }

    .card-body {
      display: flex;
      flex-direction: column;
      padding: 18px;
      gap: 15px;
      flex: 1;
    }

    /* Gráfico */
    .graph-container {
      width: 100%;
      height: 300px;
      background: var(--weg-gray-100);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .graph-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      z-index: 2;
    }

    .graph-placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--weg-gray-400);
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* Tabela */
    .measurements-container {
      background: white;
      border-radius: var(--radius-sm);
      border: 1px solid var(--weg-gray-200);
      padding: 15px;
      flex-shrink: 0;
    }

    .table-title {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--weg-blue-dark);
      margin-bottom: 12px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .analise-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 4px;
      table-layout: fixed;
    }

    .analise-table th {
      background: var(--weg-blue-light);
      color: var(--weg-blue-dark);
      font-weight: 700;
      font-size: 0.8rem;
      padding: 8px 4px;
      border-radius: 4px;
      text-align: center;
      white-space: nowrap;
    }

    .analise-table td {
      background: var(--weg-gray-100);
      color: var(--weg-gray-900);
      font-weight: 600;
      font-size: 0.85rem;
      padding: 8px 4px;
      text-align: center;
      border-radius: 4px;
      border: 1px solid var(--weg-gray-200);
    }

    /* Status Colors */
    .val-ok { background: #E8F5E9 !important; color: var(--status-ok) !important; }
    .val-warn { background: #FFF3E0 !important; color: var(--status-warn) !important; }
    .val-crit { background: #ECEFF1 !important; color: var(--status-crit) !important; }
    .val-nodata { background: #F5F5F5 !important; color: #999999 !important; }

    /* Footer */
    footer {
      background: white;
      padding: 15px 30px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--weg-gray-400);
      border-top: 1px solid var(--weg-gray-200);
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }
    footer span { color: var(--weg-blue); font-weight: 700; }

    /* Navegação */
    .carousel-nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }
    .nav-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--weg-gray-300);
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid white;
      box-shadow: var(--shadow);
    }
    .nav-dot.active { background: var(--weg-blue); transform: scale(1.3); }

    /* Loader */
    .loader-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: white;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.5s ease;
    }
    .loader-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid var(--weg-gray-200);
      border-top-color: var(--weg-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsividade */
    @media (max-width: 1200px) {
      .carousel-slide { grid-template-columns: 1fr; }
      header { padding: 10px 20px; grid-template-columns: 1fr; gap: 10px; }
      .header-logo, .header-clock { justify-self: center; }
      .logo-weg { height: 40px; }
      header h1 { font-size: 1.5rem; }
      #relogio, #data { font-size: 1.3rem; }
      main { padding: 20px 20px; }
    }
  </style>
</head>
<body>

<div class="loader-overlay" id="loader">
  <div class="spinner"></div>
  <div style="font-weight: 700; color: var(--weg-blue-dark)">Carregando Dashboard...</div>
</div>

<header>
  <div class="header-logo">
    <img src="logo-weg.png" alt="WEG" class="logo-weg">
  </div>
  <h1>Controle de Banhos Químicos <span>JGS</span></h1>
  <div class="header-clock">
    <div id="relogio">--:--:--</div>
    <div id="data">--/--/----</div>
  </div>
</header>

<main>
  <div class="carousel-container">
    <div class="carousel-track" id="track-main"></div>
  </div>
  <div class="carousel-nav" id="nav-main"></div>
</main>

<footer>
  JGS - Controle de Qualidade & Processos | <span>WEG S.A.</span> | Última Sincronização: <span id="ultima">--:--</span>
</footer>

<script>
  const CONFIG = {
    rotateInterval: 20000, // Tempo para trocar de aba (slide)
    refreshInterval: 60000, // Tempo para atualizar dados
    itemsPerSlide: 2 // Quantos cards cabem na tela ao mesmo tempo (Grid de 2 colunas)
  };

  // Configuração dos processos
  // AQUI VOCÊ DEFINE QUAIS CARDS DEVEM APARECER. 
  // Se o arquivo JSON não existir ou falhar, o card simplesmente não será criado.
  const processosConfig = {
    'estanhagem-eletrolitica': {
      nome: 'Estanhagem Eletrolítica',
      graficos: [
        { file: 'des', nome: 'Desengraxante Químico<br><span style="font-size:0.8em; font-weight:400;">CONCENTRAÇÃO DO BANHO EM ML/L</span>', ref: 26.0, tol: 3.9 },
        
        { file: 'ativacao-tanque-5', nome: 'Ativação — Tanque 5<br><span style="font-size:0.8em; font-weight:400;">pH DO BANHO</span>', ref: 8.5, tol: 1.28 },
        
        { file: 'ativacao-tanque-6', nome: 'Ativação — Tanque 6<br><span style="font-size:0.8em; font-weight:400;">CONCENTRAÇÃO DO BANHO EM ML/L</span>', ref: 8.5, tol: 1.28 },
        
        { file: 'niquel-watt', nome: 'Níquel WATT', ref: 45.0, tol: 6.75 },
        { file: 'niquel-watt-1', nome: 'Níquel WATT (2)', ref: 45.0, tol: 6.75 },
        { file: 'niquel-watt-2', nome: 'Níquel WATT (3)', ref: 45.0, tol: 6.75 },
        { file: 'niquel-watt-3', nome: 'Níquel WATT (4)', ref: 45.0, tol: 6.75 },
        { file: 'niquel-watt-4', nome: 'Níquel WATT (5)', ref: 45.0, tol: 6.75 },
        
        // Estanhagem A - Sn°
        { file: 'estanhagem-a', nome: 'Estanhagem A<br><span style="font-size:0.8em; font-weight:400;">CONCENTRAÇÃO DE Sn° (g/L)</span>', ref: 32.0, tol: 4.8 },
        
        // Estanhagem A - H2SO4
        { file: 'estanhagem-a-1', nome: 'Estanhagem A (2)<br><span style="font-size:0.8em; font-weight:400;">CONCENTRAÇÃO DE H2SO4 (mL/L)</span>', ref: 90.0, tol: 13.5 },
        
        { file: 'estanhagem-a-2', nome: 'Estanhagem A (3)', ref: 32.0, tol: 4.8 },
        
        // Estanhagem B - Sn°
        { file: 'estanhagem-b', nome: 'Estanhagem B<br><span style="font-size:0.8em; font-weight:400;">CONCENTRAÇÃO DE Sn° (g/L)</span>', ref: 31.5, tol: 4.73 },
        
        // Estanhagem B - H2SO4
        { file: 'estanhagem-b-1', nome: 'Estanhagem B (2)<br><span style="font-size:0.8em; font-weight:400;">CONCENTRAÇÃO DE H2SO4 (mL/L)</span>', ref: 90.0, tol: 13.5 },
        
        { file: 'estanhagem-b-2', nome: 'Estanhagem B (3)', ref: 31.5, tol: 4.73 },
        { file: 'selante', nome: 'Selante Protetivo', ref: 18.0, tol: 2.7 }
      ]
    },
    'nanoceramico': {
      nome: 'Processo Nanocerâmico',
      graficos: [
        { file: 'des1', nome: '1º Desengraxante', ref: 29.0, tol: 4.35 },
        { file: 'des2', nome: '2º Desengraxante', ref: 28.5, tol: 4.28 },
        { file: 'dec1', nome: 'Decapante 1', ref: 12.0, tol: 1.8 },
        { file: 'dec2', nome: 'Decapante 2', ref: 11.5, tol: 1.73 },
        { file: 'nano', nome: 'Nanocerâmico — Conc.', ref: 35.0, tol: 5.25 },
        { file: 'abso-nano', nome: 'Nanocerâmico — Abs.', ref: 1.2, tol: 0.18 },
        { file: 'ph-nano', nome: 'Nanocerâmico — pH', ref: 4.5, tol: 0.68 },
        { file: 'neu', nome: 'Neutralizador', ref: 7.0, tol: 1.05 },
        { file: 'sel', nome: 'Selante Final', ref: 22.0, tol: 3.3 }
      ]
    }
  };

  let dadosCache = {};

  function formatarData(dataStr) {
    if (!dataStr || dataStr.trim() === '' || dataStr.trim() === '#N/D') return '--/--';
    const cleanStr = dataStr.trim();
    let dataObj = null;
    
    if (cleanStr.includes('/')) {
      const partes = cleanStr.split('/');
      if (partes.length === 3) {
        const dia = parseInt(partes[0]);
        const mes = parseInt(partes[1]) - 1;
        let ano = parseInt(partes[2]);
        if (ano < 100) ano += 2000;
        dataObj = new Date(ano, mes, dia);
      }
    }
    
    if (!dataObj || isNaN(dataObj.getTime())) {
      dataObj = new Date(cleanStr);
    }
    
    if (isNaN(dataObj.getTime())) return cleanStr;
    
    const dia = dataObj.getDate().toString().padStart(2, '0');
    const mes = (dataObj.getMonth() + 1).toString().padStart(2, '0');
    return `${dia}/${mes}`;
  }

  async function carregarDadosJSON(fileName) {
    try {
      const response = await fetch(`dados/graf-${fileName}.json?t=${Date.now()}`);
      if (!response.ok) return null;
      const data = await response.json();
      return data;
    } catch (error) {
      return null;
    }
  }

  async function getMedicoesReal(fileName) {
    const dados = await carregarDadosJSON(fileName);
    if (!dados) return null; // Retorna null se falhar

    const rawCharts = dados["charts"] || dados["charts "] || dados["charts  "];
    if (!rawCharts || !rawCharts[0]) return null;

    const chart = rawCharts[0];
    const labels = chart["labels"] || chart["labels "] || [];
    const series1 = chart["series1"] || chart["series1 "] || [];
    
    const medicoes = [];
    // Pegar as últimas 24 medições
    const startIndex = Math.max(0, labels.length - 24);
    
    for (let i = startIndex; i < labels.length; i++) {
      const label = labels[i];
      let valorStr = series1[i] || '0';
      valorStr = valorStr.trim();
      
      let valor = 0;
      let hasData = true;
      
      if (valorStr === '#N/D' || valorStr === '#N/A' || valorStr === '' || valorStr === null) {
        hasData = false;
        valor = NaN;
      } else {
        valor = parseFloat(valorStr.replace(',', '.'));
        if (isNaN(valor)) hasData = false;
      }
      
      medicoes.push({
        label,
        dataFormatada: formatarData(label),
        valor: valor,
        hasData: hasData
      });
    }
    
    return medicoes;
  }

  function getStatusClass(valor, ref, tol, hasData) {
    if (!hasData || isNaN(valor)) return 'val-nodata';
    const diff = Math.abs(valor - ref);
    if (diff <= tol * 0.5) return 'val-ok';
    if (diff <= tol) return 'val-warn';
    return 'val-crit';
  }

  async function renderTabela(graficoConfig) {
    let medicoes = dadosCache[graficoConfig.file];
    
    // Se não tem em cache, busca
    if (!medicoes) {
      medicoes = await getMedicoesReal(graficoConfig.file);
      // Se ainda assim for null (falha no fetch ou dados vazios), retorna null para indicar erro
      if (!medicoes) return null;
      dadosCache[graficoConfig.file] = medicoes;
    }
    
    const colsPerRow = 12;
    let html = '<table class="analise-table">';

    for (let row = 0; row < 2; row++) {
      const start = row * colsPerRow;
      const end = start + colsPerRow;
      const chunk = medicoes.slice(start, end);

      if (chunk.length === 0) continue;

      html += '<tr>';
      chunk.forEach(m => html += `<th>${m.dataFormatada}</th>`);
      html += '</tr>';

      html += '<tr>';
      chunk.forEach(m => {
        const cls = getStatusClass(m.valor, graficoConfig.ref, graficoConfig.tol, m.hasData);
        const displayValue = m.hasData ? m.valor.toFixed(2) : '---';
        html += `<td class="${cls}">${displayValue}</td>`;
      });
      html += '</tr>';
    }
    html += '</table>';
    return html;
  }

  // Cria o HTML do card. Retorna null se os dados falharem.
  async function criarCard(graficoConfig) {
    // Tenta renderizar a tabela (isso força o check de existência dos dados)
    const tabelaHtml = await renderTabela(graficoConfig);
    
    // SE A TABELA FALHOU (null), NÃO CRIA O CARD
    if (tabelaHtml === null) {
      return null;
    }

    const displayName = graficoConfig.nome;
    const fileName = graficoConfig.file;

    return `
      <div class="card">
        <div class="card-header">${displayName}</div>
        <div class="card-body">
          <div class="graph-container">
            <div class="graph-placeholder">📊 Gráfico: ${fileName}</div>
            <img src="graficos/graf-${fileName}-1.png?t=${Date.now()}"
                 onerror="this.style.display='none'"
                 onload="this.previousElementSibling.style.display='none'">
          </div>
          <div class="measurements-container">
            <div class="table-title">Últimas 24 Medições</div>
            ${tabelaHtml}
          </div>
        </div>
      </div>
    `;
  }

  async function initCarousel() {
    const track = document.getElementById('track-main');
    const nav = document.getElementById('nav-main');
    
    // Limpa tudo antes de começar
    track.innerHTML = '';
    nav.innerHTML = '';

    let allValidCards = []; // Lista plana de todos os cards válidos
    let currentProcessoName = '';

    // 1. Coletar todos os cards válidos de todos os processos
    for (const processoKey in processosConfig) {
      const processo = processosConfig[processoKey];
      const processoNome = processo.nome;
      const graficos = processo.graficos;

      // Adiciona um marcador de novo processo na lista de cards
      // Usamos um objeto especial para representar o título da seção
      allValidCards.push({ type: 'header', name: processoNome });

      for (const graficoConfig of graficos) {
        const cardHtml = await criarCard(graficoConfig);
        
        // SÓ ADICIONA SE O CARD FOI CRIADO COM SUCESSO (não é null)
        if (cardHtml) {
          allValidCards.push({ type: 'card', html: cardHtml });
        }
      }
    }

    // 2. Distribuir os cards válidos em Slides
    // Cada slide comporta CONFIG.itemsPerSlide (2) cards.
    // Se encontrar um 'header', ele ocupa a largura total e conta como parte do slide.
    
    let slideContent = [];
    let slideCount = 0;
    
    // Função auxiliar para fechar o slide atual e criar o DOM
    const closeCurrentSlide = () => {
      if (slideContent.length > 0) {
        const slideDiv = document.createElement('div');
        slideDiv.className = 'carousel-slide';
        
        // Define o grid do slide. Se tiver header, ajusta.
        // Mas o CSS já trata grid-template-columns: repeat(2, 1fr).
        // O header terá style="grid-column: 1 / -1"
        
        slideContent.forEach(item => slideDiv.appendChild(item));
        track.appendChild(slideDiv);

        // Criar bolinha de navegação
        const dot = document.createElement('div');
        dot.className = `nav-dot ${slideCount === 0 ? 'active' : ''}`;
        dot.onclick = () => goToSlide(slideCount);
        nav.appendChild(dot);
        
        slideCount++;
        slideContent = [];
      }
    };

    // Itera sobre a lista plana de cards válidos
    // Precisamos agrupar em pares (ou pares + header)
    
    // Vamos simplificar: Vamos encher os slides com 2 items cada.
    // Se um item for HEADER, ele vai sozinho no topo do slide? 
    // Melhor estratégia: O Header é um item do grid que ocupa 100%.
    // Então, se temos Header + Card 1, isso preenche um slide?
    // Não, o Grid é 2 colunas. Header ocupa as 2. Card 1 ocupa 1. Sobra espaço.
    // Para ficar bonito, vamos tentar colocar Header sempre no início de um novo Slide.
    
    let bufferItems = [];
    
    for (let i = 0; i < allValidCards.length; i++) {
      const item = allValidCards[i];
      
      if (item.type === 'header') {
        // Se já tem coisas no buffer, fecha o slide anterior
        if (bufferItems.length > 0) closeCurrentSlide();
        
        // Cria o elemento de título
        const titleDiv = document.createElement('div');
        titleDiv.style.gridColumn = '1 / -1';
        titleDiv.style.marginBottom = '10px';
        titleDiv.innerHTML = `<div class="secao-titulo">${item.name}</div>`;
        bufferItems.push(titleDiv);
        
        // Força o fechamento do slide após o header? 
        // Não, vamos deixar o próximo card entrar junto.
        // Mas para garantir layout limpo, muitas vezes Header + 2 Cards é um slide.
        // Ou Header + 1 Card.
        // Vamos fechar o slide SO com o header se quisermos destaque total, 
        // mas o usuário quer 2 por aba.
        // Vamos deixar o buffer continuar.
      } else {
        // É um card
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = item.html;
        bufferItems.push(tempDiv.firstElementChild);
      }
      
      // Lógica de Fechamento do Slide:
      // Se temos 2 items REAIS (cards) no buffer (ignorando header na contagem de slots de grid?),
      // Na verdade, o grid é simples.
      // Se o buffer tem 3 elementos (1 Header + 2 Cards), fechamos.
      // Se o buffer tem 2 elementos (2 Cards), fechamos.
      // Se o buffer tem 1 Header e acabou a lista, fechamos.
      
      // Contar quantos CARDS reais estão no buffer
      const realCardsInBuffer = bufferItems.filter(el => !el.querySelector('.secao-titulo')).length;
      
      // Se tivermos 2 cards reais, fechamos o slide (independente se tem header ou não)
      if (realCardsInBuffer >= CONFIG.itemsPerSlide) {
        closeCurrentSlide(); // Isso limpa o buffer
      }
    }
    
    // Fecha o último slide restante
    if (bufferItems.length > 0) closeCurrentSlide();

    // Iniciar Rotação
    let currentSlideIndex = 0;
    const totalSlides = slideCount;
    
    if (totalSlides > 0) {
      setInterval(() => {
        currentSlideIndex = (currentSlideIndex + 1) % totalSlides;
        goToSlide(currentSlideIndex);
      }, CONFIG.rotateInterval);
    }

    // Remover loader
    setTimeout(() => {
      document.getElementById('loader').classList.add('hidden');
    }, 1500);
  }

  async function refreshAllCards() {
    dadosCache = {}; // Limpa cache para forçar nova leitura
    
    // Re-executa a lógica de criação para atualizar dados
    // Nota: Em produção, seria mais eficiente apenas atualizar os valores da tabela,
    // mas reconstruir garante consistência se um arquivo parou de responder.
    // Para evitar flicker, podemos apenas atualizar o innerHTML das tabelas existentes.
    
    const cards = document.querySelectorAll('.card');
    for (const card of cards) {
      const fileName = card.querySelector('.graph-placeholder')?.textContent.match(/Gráfico: (.*)/)?.[1]?.trim();
      if (fileName) {
        let graficoConfig = null;
        for (const pk in processosConfig) {
          const found = processosConfig[pk].graficos.find(g => g.file === fileName);
          if (found) { graficoConfig = found; break; }
        }
        
        if (graficoConfig) {
          const tabelaHtml = await renderTabela(graficoConfig);
          if (tabelaHtml) {
            const container = card.querySelector('.measurements-container');
            if (container) {
              container.innerHTML = `
                <div class="table-title">Últimas 24 Medições</div>
                ${tabelaHtml}
              `;
            }
          }
        }
      }
    }
    
    const agora = new Date();
    document.getElementById('ultima').innerText = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function goToSlide(index) {
    const track = document.getElementById('track-main');
    const dots = document.querySelectorAll('#nav-main .nav-dot');
    track.style.transform = `translateX(-${index * 100}%)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === index));
  }

  function updateClock() {
    const agora = new Date();
    document.getElementById('relogio').innerText = agora.toLocaleTimeString('pt-BR');
    document.getElementById('data').innerText = agora.toLocaleDateString('pt-BR');
    document.getElementById('ultima').innerText = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  async function init() {
    await initCarousel();
    updateClock();
    setInterval(updateClock, 1000);
    setInterval(refreshAllCards, CONFIG.refreshInterval);
  }

  window.onload = init;
</script>

</body>
</html>
