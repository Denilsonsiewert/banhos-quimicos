<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WEG Banhos Industriais | TV Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Paleta WEG TV */
            --weg-blue: #003f6f;
            --weg-blue-light: #0066cc;
            --weg-orange: #e67e22;
            --weg-orange-light: #ff8c42;
            --weg-dark: #1a2a3a;
            --weg-dark-light: #2c3e50;
            --weg-gray: #f8f9fa;
            --weg-gray-light: #e9ecef;
            --weg-gray-dark: #6c757d;
            --weg-white: #ffffff;
            --weg-shadow: 0 12px 40px rgba(0, 63, 111, 0.15);
            --weg-glow: 0 0 30px rgba(230, 126, 34, 0.4);
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100vh;
            overflow: hidden;
            font-feature-settings: "pnum" 1, "tnum" 1;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: var(--weg-white);
            display: flex;
            flex-direction: column;
            animation: ambient 20s ease-in-out infinite alternate;
        }

        @keyframes ambient {
            0% { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }
            50% { background: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 50%, #34495e 100%); }
            100% { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); }
        }

        /* Header - Sempre visível e grande */
        header {
            background: rgba(26, 42, 58, 0.95);
            backdrop-filter: blur(20px);
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--weg-shadow);
            border-bottom: 4px solid var(--weg-orange);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 2.4rem;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--weg-orange), var(--weg-orange-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 12px rgba(230, 126, 34, 0.5);
        }

        .logo i { font-size: 2.8rem; margin-right: 12px; }

        .title-block h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .info-pill {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 16px 28px;
            border-radius: 40px;
            font-family: 'SF Mono', Monaco, monospace;
            font-weight: 600;
            font-size: 1.3rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            min-width: 280px;
            text-align: center;
        }

        /* Main - Fullscreen */
        main {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .section-badge {
            background: linear-gradient(135deg, var(--weg-blue), var(--weg-blue-light));
            color: var(--weg-white);
            padding: 20px 32px;
            font-weight: 800;
            font-size: 1.6rem;
            width: fit-content;
            border-radius: 20px;
            margin-bottom: 32px;
            box-shadow: var(--weg-shadow);
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: badgeFloat 6s ease-in-out infinite;
        }

        @keyframes badgeFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .dashboard-scroll {
            flex: 1;
            overflow: hidden;
        }

        /* Card Fullscreen TV */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(30px);
            border-radius: 32px;
            box-shadow: var(--weg-shadow);
            height: 100%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            animation: cardEntry 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes cardEntry {
            0% { opacity: 0; transform: scale(0.95) translateY(50px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 48px;
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(248, 249, 250, 0.8));
            border-bottom: 4px solid var(--weg-blue);
        }

        .card-title {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--weg-blue);
            letter-spacing: -0.02em;
            text-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 70%;
        }

        .status {
            font-weight: 700;
            font-size: 1.4rem;
            padding: 16px 32px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            animation: statusPulse 2s infinite;
        }

        @keyframes statusPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .status-ok { background: linear-gradient(135deg, #d4edda, #c3e6cb); color: var(--success); }
        .status-warn { background: linear-gradient(135deg, #fff3cd, #ffeaa7); color: #856404; }
        .status-crit { background: linear-gradient(135deg, #f8d7da, #f5c6cb); color: var(--danger); }

        /* Charts Grid TV - Auto-adaptativo */
        .charts-grid {
            display: grid;
            height: calc(100% - 160px);
            grid-template-columns: repeat(auto-fit, minmax(50%, 1fr));
            grid-template-rows: 1fr;
            gap: 0;
            padding: 0;
        }

        /* Auto-adaptador: 1 gráfico = full width, 2+ = 50/50 */
        .charts-grid:has(.chart-card:nth-child(1):only-child) {
            grid-template-columns: 1fr;
        }

        .chart-card {
            background: transparent;
            border-radius: 0;
            border: none;
            box-shadow: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chart-title {
            background: rgba(0, 63, 111, 0.9);
            color: var(--weg-white);
            padding: 24px 32px;
            font-weight: 700;
            font-size: 1.4rem;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: none;
        }

        .chart-container {
            flex: 1;
            position: relative;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .chart-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: linear-gradient(135deg, #f8f9fa, #ffffff);
            opacity: 0;
            animation: fadeIn 1.5s ease-in-out forwards;
        }

        .chart-img[src] { opacity: 1; }

        @keyframes fadeIn {
            to { opacity: 1; transform: scale(1); }
        }

        /* Table Fullscreen */
        .table-wrap {
            height: 100%;
            overflow: hidden;
            padding: 0;
        }

        .custom-table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            font-size: 1.1rem;
            border-radius: 0;
        }

        .custom-table th,
        .custom-table td {
            padding: 16px 12px;
            text-align: center;
            border-right: 1px solid rgba(0, 63, 111, 0.15);
            border-bottom: 1px solid rgba(0, 63, 111, 0.15);
            vertical-align: middle;
        }

        .custom-table th {
            background: linear-gradient(135deg, var(--weg-blue), var(--weg-blue-light));
            color: var(--weg-white);
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        /* Navigation - Auto, sem interação */
        .nav-dots {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            width: fit-content;
            margin: 32px auto 0;
            box-shadow: var(--weg-shadow);
        }

        .dot {
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transition: all 0.5s ease;
            cursor: default; /* Remove pointer */
        }

        .dot.active {
            background: var(--weg-orange);
            transform: scale(1.6);
            box-shadow: var(--weg-glow);
            animation: dotPulse 1.5s infinite;
        }

        @keyframes dotPulse {
            0%, 100% { box-shadow: var(--weg-glow); }
            50% { box-shadow: 0 0 40px rgba(230, 126, 34, 0.8); }
        }

        /* Footer */
        footer {
            background: rgba(26, 42, 58, 0.95);
            backdrop-filter: blur(20px);
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 600;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
        }

        .pulse {
            display: inline-block;
            width: 16px;
            height: 16px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
            margin-right: 12px;
            box-shadow: 0 0 20px rgba(40, 167, 69, 0.8);
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
            100% { opacity: 0.4; transform: scale(1); }
        }

        /* Loader TV */
        .loader {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            font-size: 1.6rem;
            color: var(--weg-blue);
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(248,249,250,0.8));
        }

        .loader i {
            font-size: 4rem;
            color: var(--weg-orange);
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* TV Fullscreen Overrides */
        @media screen and (min-width: 1920px) {
            .card-title { font-size: 3.2rem; }
            .section-badge { font-size: 1.8rem; }
        }

        /* Kiosk Mode - Remove todos os cursores */
        * { cursor: none !important; }
        button, [onclick] { pointer-events: none !important; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-flask"></i>
            WEG<span>BANHOS</span>
        </div>
        <div class="title-block">
            <h1>Monitoramento Analítico</h1>
        </div>
        <div class="info-pill">
            <span id="clock-date"></span><br>
            <span id="clock-time"></span>
        </div>
    </header>

    <main>
        <div class="section-badge" id="current-section">Iniciando...</div>
        <div class="dashboard-scroll" id="dashboard-content"></div>
        <div class="nav-dots" id="nav-dots"></div>
    </main>

    <footer>
        <div>
            <span class="pulse"></span> 
            SISTEMA ONLINE
        </div>
        <div>
            Última sincronia: <span id="last-sync">--:--:--</span>
        </div>
    </footer>

    <script>
        const tabsConfig = [
            {
                section: "ESTANHAGEM ELETROLÍTICA",
                items: [
                    { title: "Desengraxante Químico", fileBase: "graf-des", status: "OK" },
                    { title: "Ativação - Tanque 5", fileBase: "graf-ativacao-tanque-5", status: "Verificar" },
                    { title: "Ativação - Tanque 6", fileBase: "graf-ativacao-tanque-6", status: "OK" },
                    { title: "Níquel WATT", fileBase: "graf-niquel-watt", status: "Estável" },
                    { title: "Estanhagem A", fileBase: "graf-estanhagem-a", status: "Vencido" },
                    { title: "Selante Protetivo", fileBase: "graf-selante", status: "OK" },
                    { title: "Estanhagem B", fileBase: "graf-estanhagem-b", status: "OK" }
                ]
            },
            {
                section: "NANOCERÂMICO",
                items: [
                    { title: "1º Desengraxante", fileBase: "graf-des1", status: "OK" },
                    { title: "2º Desengraxante", fileBase: "graf-des2", status: "OK" },
                    { title: "Decapante 1", fileBase: "graf-dec1", status: "Atenção" },
                    { title: "Decapante 2", fileBase: "graf-dec2", status: "OK" },
                    { title: "Nanocerâmico - Concentração", fileBase: "graf-nano", status: "Crítico" },
                    { title: "Nanocerâmico - Absorbância", fileBase: "graf-abso-nano", status: "OK" },
                    { title: "Nanocerâmico - pH", fileBase: "graf-ph-nano", status: "OK" },
                    { title: "Neutralizador", fileBase: "graf-neu", status: "OK" },
                    { title: "Selante Final", fileBase: "graf-sel", status: "OK" }
                ]
            }
        ];

        const COLS_PER_ROW = 12;
        let currentTabIdx = 0, currentItemIdx = 0, rotationTimer;

        function getStatusClass(status) {
            if (["OK", "Estável", "Em Conformidade"].includes(status)) return "ok";
            if (["Atenção", "Verificar", "Vencido"].includes(status)) return "warn";
            return "crit";
        }

        function generateTableHTML(labels, series1, series2) {
            if (!labels || !labels.length) return '';
            
            const row1Labels = labels.slice(0, COLS_PER_ROW);
            const row1Values = series1.slice(0, COLS_PER_ROW);
            const row2Labels = labels.slice(COLS_PER_ROW, COLS_PER_ROW * 2);
            const row2Values = series1.slice(COLS_PER_ROW, COLS_PER_ROW * 2);

            let html = `
                <div class="table-wrap">
                    <table class="custom-table">
                        <thead>
                            <tr><th colspan="${COLS_PER_ROW}">📊 REGISTRO ÚLTIMAS 24 ANÁLISES</th></tr>
                            <tr>${row1Labels.map(l => `<th>${l}</th>`).join('')}</tr>
                        </thead>
                        <tbody>
                            <tr>${row1Values.map(v => `<td>${v ?? '---'}</td>`).join('')}</tr>
                            <tr>${row2Labels.map(l => `<th>${l}</th>`).join('')}</tr>
                            <tr>${row2Values.map(v => `<td>${v ?? '---'}</td>`).join('')}</tr>
            `;

            if (series2) {
                const row2Series1 = series2.slice(0, COLS_PER_ROW);
                const row2Series2 = series2.slice(COLS_PER_ROW, COLS_PER_ROW * 2);
                html += `
                            <tr style="background: linear-gradient(90deg, #e3f2fd, #bbdefb);">
                                <th colspan="${COLS_PER_ROW}" style="font-size: 1.2rem;">
                                    <i class="fas fa-chart-line"></i> VALORES DE REFERÊNCIA
                                </th>
                            </tr>
                            <tr style="background: #e8f5e8;">
                                ${row2Series1.map(v => `<td><strong style="color: var(--success); font-size: 1.1rem;">${v ?? '---'}</strong></td>`).join('')}
                            </tr>
                            <tr style="background: #e8f5e8;">
                                ${row2Series2.map(v => `<td><strong style="color: var(--success); font-size: 1.1rem;">${v ?? '---'}</strong></td>`).join('')}
                            </tr>
                `;
            }

            html += '</tbody></table></div>';
            return html;
        }

        function loadCardData(fileBase) {
            const wrap = document.getElementById('charts-area');
            if (!wrap) return;

            wrap.innerHTML = `
                <div class="charts-grid">
                    <div class="chart-card">
                        <div class="loader">
                            <i class="fas fa-spinner"></i>
                            <div>Carregando análises em tempo real...</div>
                            <div style="font-size: 1.2rem; opacity: 0.7;">WEG - Qualidade Industrial</div>
                        </div>
                    </div>
                </div>
            `;

            fetch(`dados/${fileBase}.json?t=${Date.now()}`)
                .then(response => {
                    if (!response.ok) throw new Error();
                    return response.json();
                })
                .then(data => {
                    if (!wrap) return;
                    
                    wrap.innerHTML = '';
                    const charts = (data.charts && Array.isArray(data.charts) && data.charts.length > 0) 
                        ? data.charts 
                        : [{ title: null, labels: data.labels, series1: data.series1, series2: data.series2 }];
                    
                    charts.forEach((chart, idx) => {
                        const div = document.createElement('div');
                        div.className = 'chart-card';
                        const titleHtml = chart.title ? `<div class="chart-title">${chart.title}</div>` : '';
                        const imgSrc = `graficos/${fileBase}-${idx + 1}.png?t=${Date.now()}`;
                        const tableHtml = generateTableHTML(chart.labels, chart.series1, chart.series2);
                        
                        div.innerHTML = `
                            ${titleHtml}
                            <div class="chart-container">
                                <img src="${imgSrc}" class="chart-img" alt="Gráfico analítico" 
                                     onerror="this.parentElement.innerHTML='<div class=\"loader\"><i class=\"fas fa-exclamation-triangle\" style=\"color: var(--warning);\"></i><div>Dados temporariamente indisponíveis</div></div>'">
                            </div>
                            ${tableHtml}
                        `;
                        wrap.appendChild(div);
                    });
                })
                .catch(() => {
                    if (wrap) {
                        wrap.innerHTML = `
                            <div class="charts-grid">
                                <div class="chart-card">
                                    <div class="loader" style="background: linear-gradient(135deg, #fff3cd, #ffeaa7); color: #856404;">
                                        <i class="fas fa-exclamation-triangle" style="font-size: 5rem; color: var(--warning);"></i>
                                        <div style="font-size: 2rem;">Dados temporariamente indisponíveis</div>
                                        <div style="font-size: 1.2rem; opacity: 0.8;">Sincronização automática em 60s</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });
        }

        function renderCard(item) {
            const dash = document.getElementById('dashboard-content');
            if (!dash) return;

            dash.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">${item.title}</div>
                        <div class="status status-${getStatusClass(item.status)}">
                            <i class="fas fa-circle"></i>
                            ${item.status.toUpperCase()}
                        </div>
                    </div>
                    <div id="charts-area" style="height: calc(100% - 200px);"></div>
                </div>
            `;
            loadCardData(item.fileBase);
        }

        function updateDisplay() {
            const tab = tabsConfig[currentTabIdx];
            const item = tab.items[currentItemIdx];
            
            document.getElementById('current-section').textContent = tab.section;
            renderCard(item);

            const dots = document.getElementById('nav-dots');
            if (dots) {
                dots.innerHTML = '';
                tab.items.forEach((it, idx) => {
                    const dot = document.createElement('div');
                    dot.className = `dot ${idx === currentItemIdx ? 'active' : ''}`;
                    dots.appendChild(dot);
                });
            }
        }

        function nextItem() {
            const tab = tabsConfig[currentTabIdx];
            if (currentItemIdx + 1 < tab.items.length) {
                currentItemIdx++;
            } else {
                currentItemIdx = 0;
                currentTabIdx = (currentTabIdx + 1) % tabsConfig.length;
            }
            updateDisplay();
        }

        function resetRotation() {
            if (rotationTimer) clearInterval(rotationTimer);
            rotationTimer = setInterval(nextItem, 20000); // 20s para TV
        }

        function initClock() {
            function tick() {
                const now = new Date();
                document.getElementById('clock-date').textContent = now.toLocaleDateString('pt-BR', {
                    weekday: 'long',
                    day: '2-digit',
                    month: 'long',
                    year: 'numeric'
                });
                document.getElementById('clock-time').textContent = now.toLocaleTimeString('pt-BR', {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                });
            }
            tick();
            setInterval(tick, 1000);
        }

        function startPeriodicSync() {
            setInterval(() => {
                document.getElementById('last-sync').textContent = new Date().toLocaleTimeString('pt-BR', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
                
                const tab = tabsConfig[currentTabIdx];
                if (tab && tab.items[currentItemIdx]) {
                    loadCardData(tab.items[currentItemIdx].fileBase);
                }
            }, 60000);
        }

        // Inicialização automática
        window.onload = () => {
            document.body.style.opacity = '0';
            setTimeout(() => {
                initClock();
                updateDisplay();
                resetRotation();
                startPeriodicSync();
                document.body.style.opacity = '1';
                document.body.style.transition = 'opacity 1s ease-in';
            }, 500);
        };

        // Previne sleep/refresh
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                updateDisplay();
                resetRotation();
            }
        });

        // Keyboard navigation para debug (F5, ESC, etc)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F5' || e.key === 'F12') e.preventDefault();
        });
    </script>
</body>
</html>
