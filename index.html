<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WEG Banhos Industriais | Dashboard TV</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            /* Paleta WEG TV Dashboard */
            --weg-blue: #003f6f;
            --weg-blue-light: #0066cc;
            --weg-orange: #e67e22;
            --weg-orange-light: #f39c12;
            --weg-dark: #1a2a3a;
            --weg-dark-light: #2c3e50;
            --weg-gray-50: #f8fafc;
            --weg-gray-100: #f1f5f9;
            --weg-gray-200: #e2e8f0;
            --weg-gray-300: #cbd5e1;
            --weg-gray-400: #94a3b8;
            --weg-gray-500: #64748b;
            --weg-gray-600: #475569;
            --weg-gray-700: #334155;
            --weg-gray-800: #1e293b;
            --weg-gray-900: #0f172a;
            --success-500: #10b981;
            --success-600: #059669;
            --warning-500: #f59e0b;
            --warning-600: #d97706;
            --error-500: #ef4444;
            --error-600: #dc2626;
            --shadow-tv: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --shadow-glow: 0 0 40px rgba(230, 126, 34, 0.3);
            --border-radius-tv: 24px;
            --transition-tv: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--weg-gray-50) 0%, #e8f4fd 50%, #f0f8ff 100%);
            color: var(--weg-gray-900);
            display: flex;
            flex-direction: column;
            animation: ambientGlow 8s ease-in-out infinite alternate;
        }

        @keyframes ambientGlow {
            0% { filter: brightness(1) contrast(1); }
            100% { filter: brightness(1.02) contrast(1.05); }
        }

        /* Header TV Fullscreen */
        header {
            background: linear-gradient(135deg, var(--weg-dark) 0%, var(--weg-blue) 100%);
            color: white;
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 6px solid var(--weg-orange);
            box-shadow: var(--shadow-tv);
            position: relative;
            z-index: 100;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #ffffff 0%, #f0f9ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
        }

        .logo span {
            background: linear-gradient(135deg, var(--weg-orange) 0%, #ff8c42 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-title {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .info-pill {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            border-radius: 50px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-weight: 600;
            font-size: 1.1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        /* Main Content TV Optimized */
        main {
            flex: 1;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            gap: 2rem;
        }

        .section-badge {
            background: linear-gradient(135deg, var(--weg-blue) 0%, var(--weg-blue-light) 100%);
            color: white;
            padding: 1.25rem 2.5rem;
            font-weight: 800;
            font-size: 1.25rem;
            width: fit-content;
            border-radius: var(--border-radius-tv);
            box-shadow: var(--shadow-tv);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            animation: slideInDown 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes slideInDown {
            from { transform: translateY(-50px) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* TV Scroll - Disabled */
        .dashboard-scroll {
            flex: 1;
            overflow: hidden;
        }

        /* TV Cards - Fullscreen Focus */
        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(30px);
            border-radius: var(--border-radius-tv);
            box-shadow: var(--shadow-tv);
            margin-bottom: 2rem;
            border: 2px solid rgba(255, 255, 255, 0.4);
            overflow: hidden;
            transition: var(--transition-tv);
            animation: cardEnter 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .card.active {
            transform: scale(1.02);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.4), var(--shadow-glow);
        }

        @keyframes cardEnter {
            from { 
                transform: translateY(60px) scale(0.95); 
                opacity: 0; 
            }
            to { 
                transform: translateY(0) scale(1); 
                opacity: 1; 
            }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.5rem 3rem;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, var(--weg-gray-50) 100%);
            border-bottom: 4px solid var(--weg-blue);
            position: relative;
            flex-shrink: 0;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--weg-orange), transparent, var(--weg-blue));
            animation: shimmerHeader 3s infinite;
        }

        @keyframes shimmerHeader {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .card-title {
            font-size: 2.25rem;
            font-weight: 800;
            color: var(--weg-blue);
            letter-spacing: -0.03em;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Status TV - Larger & Brighter */
        .status {
            font-weight: 800;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-left: 6px solid;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: statusPulse 2s infinite;
        }

        @keyframes statusPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .status-ok { background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%); color: var(--success-600); border-left-color: var(--success-600); }
        .status-warn { background: linear-gradient(135deg, #fef3c7 0%, #fde047 100%); color: var(--warning-600); border-left-color: var(--warning-600); }
        .status-crit { background: linear-gradient(135deg, #fecaca 0%, #fca5a5 100%); color: var(--error-600); border-left-color: var(--error-600); }

        /* Charts Grid TV - Auto Adaptative */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2.5rem;
            padding: 3rem;
            flex: 1;
            align-content: start;
        }

        /* Auto adapt when 1 chart */
        .charts-grid.single-chart {
            grid-template-columns: 1fr;
            gap: 3rem;
            place-items: center;
        }

        .chart-card {
            background: white;
            border-radius: var(--border-radius-tv);
            border: 2px solid var(--weg-gray-200);
            overflow: hidden;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
            transition: var(--transition-tv);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chart-card.active {
            transform: scale(1.03);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.25);
        }

        .chart-title {
            background: linear-gradient(135deg, var(--weg-gray-100) 0%, var(--weg-gray-50) 100%);
            padding: 1.75rem 2rem;
            font-weight: 700;
            text-align: center;
            border-bottom: 2px solid var(--weg-gray-200);
            color: var(--weg-gray-800);
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .chart-img {
            width: 100%;
            height: 100%;
            max-height: 400px;
            object-fit: contain;
            background: linear-gradient(135deg, #fafbff 0%, #f0f9ff 100%);
            flex: 1;
            opacity: 0;
            animation: fadeInImage 1.5s ease-out forwards;
        }

        @keyframes fadeInImage {
            to { opacity: 1; }
        }

        /* Tables TV Optimized */
        .table-wrap {
            overflow-x: auto;
            padding: 0 3rem 3rem 3rem;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .custom-table {
            width: 100%;
            max-width: 1200px;
            border-collapse: collapse;
            font-size: 1rem;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        .custom-table th,
        .custom-table td {
            border: 1px solid var(--weg-gray-300);
            padding: 1.25rem 0.75rem;
            text-align: center;
            font-weight: 600;
        }

        .custom-table th {
            background: linear-gradient(135deg, var(--weg-blue) 0%, var(--weg-blue-light) 100%);
            color: white;
            font-weight: 800;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* Navigation - HIDDEN for TV */
        .nav-dots {
            display: none !important;
        }

        /* Footer TV */
        footer {
            background: linear-gradient(135deg, var(--weg-dark) 0%, var(--weg-gray-900) 100%);
            color: #e2e8f0;
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 600;
            border-top: 3px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Status Pulse TV */
        .pulse {
            display: inline-block;
            width: 14px;
            height: 14px;
            background: var(--success-500);
            border-radius: 50%;
            animation: pulseTV 2.5s infinite;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            margin-right: 1rem;
        }

        @keyframes pulseTV {
            0% { 
                transform: scale(0.9); 
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); 
            }
            70% { 
                transform: scale(1.1); 
                box-shadow: 0 0 0 20px rgba(16, 185, 129, 0); 
            }
            100% { 
                transform: scale(0.9); 
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); 
            }
        }

        /* Loader TV Enhanced */
        .loader {
            background: linear-gradient(135deg, var(--weg-gray-200) 0%, var(--weg-gray-100) 100%);
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            animation: pulsebg 2s infinite, shimmerTV 3s infinite;
            color: var(--weg-gray-600);
            font-size: 1.5rem;
            font-weight: 600;
        }

        .loader i {
            font-size: 4rem;
            color: var(--weg-blue);
        }

        @keyframes shimmerTV {
            0% { background-position: -300% 0; }
            100% { background-position: 300% 0; }
        }

        @keyframes pulsebg {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* TV Specific Optimizations */
        .status i, .card-title i {
            font-size: 1.5rem;
        }

        /* Focus for TV transitions */
        .card:focus-within, .chart-card:focus-within {
            outline: none;
            transform: scale(1.01);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">WEG<span>BANHOS</span></div>
        <div class="header-title">
            <i class="fas fa-chart-line" style="font-size: 2rem; margin-right: 1rem;"></i>
            CONTROLE ANALÍTICO · BANHOS QUÍMICOS
        </div>
        <div class="info-pill">
            <span id="clock-date"></span> <span id="clock-time"></span>
        </div>
    </header>

    <main>
        <div class="section-badge" id="current-section">Carregando...</div>
        <div class="dashboard-scroll" id="dashboard-content"></div>
    </main>

    <footer>
        <div>
            <span class="pulse"></span>
            CONECTADO EM TEMPO REAL
        </div>
        <div>
            Última sincronia: <span id="last-sync">--:--:--</span>
        </div>
    </footer>

    <script>
        // Configuração mantida 100%
        const tabsConfig = [
            {
                section: "ESTANHAGEM ELETROLÍTICA",
                items: [
                    { title: "Desengraxante Químico", fileBase: "graf-des", status: "OK" },
                    { title: "Ativação - Tanque 5", fileBase: "graf-ativacao-tanque-5", status: "Verificar" },
                    { title: "Ativação - Tanque 6", fileBase: "graf-ativacao-tanque-6", status: "OK" },
                    { title: "Níquel WATT", fileBase: "graf-niquel-watt", status: "Estável" },
                    { title: "Estanhagem A", fileBase: "graf-estanhagem-a", status: "Vencido" },
                    { title: "Selante Protetivo", fileBase: "graf-selante", status: "OK" },
                    { title: "Estanhagem B", fileBase: "graf-estanhagem-b", status: "OK" }
                ]
            },
            {
                section: "NANOCERÂMICO",
                items: [
                    { title: "1º Desengraxante", fileBase: "graf-des1", status: "OK" },
                    { title: "2º Desengraxante", fileBase: "graf-des2", status: "OK" },
                    { title: "Decapante 1", fileBase: "graf-dec1", status: "Atenção" },
                    { title: "Decapante 2", fileBase: "graf-dec2", status: "OK" },
                    { title: "Nanocerâmico - Concentração", fileBase: "graf-nano", status: "Crítico" },
                    { title: "Nanocerâmico - Absorbância", fileBase: "graf-abso-nano", status: "OK" },
                    { title: "Nanocerâmico - pH", fileBase: "graf-ph-nano", status: "OK" },
                    { title: "Neutralizador", fileBase: "graf-neu", status: "OK" },
                    { title: "Selante Final", fileBase: "graf-sel", status: "OK" }
                ]
            }
        ];

        const COLS_PER_ROW = 12;
        let currentTabIdx = 0;
        let currentItemIdx = 0;
        let rotationTimer;

        function getStatusClass(status) {
            if (["OK", "Estável", "Em Conformidade"].includes(status)) return "ok";
            if (["Atenção", "Verificar", "Vencido"].includes(status)) return "warn";
            return "crit";
        }

        function generateTableHTML(labels, series1, series2) {
            if (!labels || !labels.length) return '';
            
            const row1Labels = labels.slice(0, COLS_PER_ROW);
            const row1Values = series1.slice(0, COLS_PER_ROW);
            const row2Labels = labels.slice(COLS_PER_ROW, COLS_PER_ROW * 2);
            const row2Values = series1.slice(COLS_PER_ROW, COLS_PER_ROW * 2);
            
            let html = `
                <div class="table-wrap">
                    <table class="custom-table">
                        <thead>
                            <tr><th colspan="${COLS_PER_ROW}">📊 REGISTRO ÚLTIMAS 24 ANÁLISES</th></tr>
                            <tr>${row1Labels.map(l => `<th>${l}</th>`).join('')}</tr>
                        </thead>
                        <tbody>
                            <tr>${row1Values.map(v => `<td>${v ?? '---'}</td>`).join('')}</tr>
                            <tr>${row2Labels.map(l => `<th>${l}</th>`).join('')}</tr>
                            <tr>${row2Values.map(v => `<td>${v ?? '---'}</td>`).join('')}</tr>
            `;
            
            if (series2) {
                const row2Series1 = series2.slice(0, COLS_PER_ROW);
                const row2Series2 = series2.slice(COLS_PER_ROW, COLS_PER_ROW * 2);
                html += `
                            <tr style="background: linear-gradient(90deg, #e3f2fd 0%, #e8f5e8 100%);">
                                ${row2Series1.map(v => `<td><strong style="color: var(--weg-blue);">${v ?? '---'}</strong></td>`).join('')}
                            </tr>
                            <tr style="background: linear-gradient(90deg, #e3f2fd 0%, #e8f5e8 100%);">
                                ${row2Series2.map(v => `<td><strong style="color: var(--weg-blue);">${v ?? '---'}</strong></td>`).join('')}
                            </tr>
                `;
            }
            
            html += '</tbody></table></div>';
            return html;
        }

        function loadCardData(fileBase) {
            const wrapper = document.getElementById('charts-area');
            if (!wrapper) return;
            
            wrapper.innerHTML = `
                <div class="charts-grid single-chart">
                    <div class="chart-card">
                        <div class="loader">
                            <i class="fas fa-spinner fa-spin"></i>
                            <div>Sincronizando dados em tempo real...</div>
                            <div style="font-size: 1.1rem; opacity: 0.8;">⏱ ${new Date().toLocaleTimeString('pt-BR')}</div>
                        </div>
                    </div>
                </div>
            `;

            fetch(`dados/${fileBase}.json?t=${Date.now()}`)
                .then(response => {
                    if (!response.ok) throw new Error('Erro na requisição');
                    return response.json();
                })
                .then(data => {
                    if (!wrapper) return;
                    
                    wrapper.innerHTML = '';
                    const charts = (data.charts && Array.isArray(data.charts) && data.charts.length > 0) 
                        ? data.charts 
                        : [{ title: null, labels: data.labels, series1: data.series1, series2: data.series2 }];
                    
                    const grid = document.createElement('div');
                    grid.className = charts.length === 1 ? 'charts-grid single-chart' : 'charts-grid';

                    charts.forEach((chart, index) => {
                        const card = document.createElement('div');
                        card.className = 'chart-card';
                        const titleHtml = chart.title ? `<div class="chart-title">${chart.title}</div>` : '';
                        const imgSrc = `graficos/${fileBase}-${index + 1}.png?t=${Date.now()}`;
                        const tableHtml = generateTableHTML(chart.labels, chart.series1, chart.series2);
                        
                        card.innerHTML = `
                            ${titleHtml}
                            <img src="${imgSrc}" class="chart-img" alt="Gráfico analítico ${index + 1}" 
                                 onerror="this.parentNode.innerHTML='<div class=\"loader\"><i class=\"fas fa-chart-line\"></i><div>Gráfico temporariamente indisponível</div></div>'">
                            ${tableHtml}
                        `;
                        grid.appendChild(card);
                    });
                    
                    wrapper.appendChild(grid);
                    
                    // TV Focus Animation
                    setTimeout(() => {
                        grid.querySelectorAll('.chart-card').forEach((c, i) => {
                            setTimeout(() => c.classList.add('active'), i * 300);
                        });
                    }, 500);
                })
                .catch(() => {
                    if (wrapper) {
                        wrapper.innerHTML = `
                            <div class="charts-grid single-chart">
                                <div class="chart-card" style="justify-content: center; padding: 6rem 4rem; text-align: center;">
                                    <i class="fas fa-wifi" style="font-size: 6rem; color: var(--warning-500); margin-bottom: 2rem;"></i>
                                    <div style="font-size: 2.5rem; font-weight: 800; color: var(--weg-gray-700); margin-bottom: 1rem;">
                                        Dados em sincronização
                                    </div>
                                    <div style="font-size: 1.5rem; color: var(--weg-gray-500);">Nova tentativa automática em 60s</div>
                                </div>
                            </div>
                        `;
                    }
                });
        }

        function renderCard(item) {
            const dashboard = document.getElementById('dashboard-content');
            if (!dashboard) return;
            
            dashboard.innerHTML = `
                <div class="card active">
                    <div class="card-header">
                        <div class="card-title">
                            <i class="fas fa-vial"></i>
                            ${item.title}
                        </div>
                        <div class="status status-${getStatusClass(item.status)}">
                            <i class="fas ${getStatusClass(item.status) === 'ok' ? 'fa-check-circle' : 
                                         getStatusClass(item.status) === 'warn' ? 'fa-exclamation-triangle' : 'fa-times-circle'}"></i>
                            ${item.status}
                        </div>
                    </div>
                    <div id="charts-area" style="flex: 1; display: flex;">
                        <div class="charts-grid single-chart">
                            <div class="chart-card">
                                <div class="loader"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            loadCardData(item.fileBase);
        }

        function updateDisplay() {
            const tab = tabsConfig[currentTabIdx];
            const item = tab.items[currentItemIdx];
            
            document.getElementById('current-section').textContent = tab.section;
            renderCard(item);
        }

        function nextItem() {
            const tab = tabsConfig[currentTabIdx];
            if (currentItemIdx + 1 < tab.items.length) {
                currentItemIdx++;
            } else {
                currentItemIdx = 0;
                currentTabIdx = (currentTabIdx + 1) % tabsConfig.length;
            }
            updateDisplay();
        }

        function resetRotation() {
            if (rotationTimer) clearInterval(rotationTimer);
            rotationTimer = setInterval(nextItem, 20000); // 20s para TV
        }

        function initClock() {
            function tick() {
                const now = new Date();
                document.getElementById('clock-date').textContent = now.toLocaleDateString('pt-BR', {
                    weekday: 'short',
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric'
                });
                document.getElementById('clock-time').textContent = now.toLocaleTimeString('pt-BR', { 
                    hour: '2-digit', minute: '2-digit', second: '2-digit' 
                });
            }
            tick();
            setInterval(tick, 1000);
        }

        function startPeriodicSync() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('last-sync').textContent = now.toLocaleTimeString('pt-BR', {
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });
                
                const tab = tabsConfig[currentTabIdx];
                if (tab && tab.items[currentItemIdx]) {
                    loadCardData(tab.items[currentItemIdx].fileBase);
                }
            }, 60000);
        }

        // TV Fullscreen Init
        window.addEventListener('load', () => {
            document.body.classList.add('tv-mode');
            initClock();
            updateDisplay();
            resetRotation();
            startPeriodicSync();
            
            // TV Auto fullscreen
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
            document.documentElement.requestFullscreen().catch(() => {});
        });

        // Keyboard support for maintenance (optional)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextItem();
                resetRotation();
            }
        });
    </script>
</body>
</html>
