<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="300">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Banhos Químicos - JGS | WEG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --weg-blue: #00458F;
      --weg-blue-dark: #002A55;
      --weg-blue-light: #E8F0F8;
      --weg-gray-50: #FAFAFA;
      --weg-gray-100: #F5F5F5;
      --weg-gray-200: #E8E8E8;
      --weg-gray-400: #999999;
      --weg-gray-700: #333333;
      --weg-gray-900: #1A1A1A;
      --status-ok: #2E7D32;
      --status-warn: #F57C00;
      --status-crit: #C62828;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--weg-gray-50);
      color: var(--weg-gray-900);
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: white;
      border-bottom: 3px solid var(--weg-blue);
      padding: 12px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-badge {
      background: var(--weg-blue);
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: 1px;
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--weg-gray-900);
    }

    header h1 span {
      color: var(--weg-blue);
      font-weight: 800;
    }

    .clock-block {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    #relogio {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--weg-blue-dark);
      font-family: 'Courier New', monospace;
    }

    #data {
      font-size: 0.9rem;
      color: var(--weg-gray-400);
      font-weight: 600;
    }

    /* Layout Principal */
    main {
      flex: 1;
      padding: 20px 30px;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .secao-titulo {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--weg-blue-dark);
      text-transform: uppercase;
      margin-bottom: 15px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--weg-blue-light);
    }

    /* Carousel */
    .carousel-container {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
    }

    .carousel-track {
      display: flex;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .carousel-slide {
      min-width: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 10px;
    }

    /* Card */
    .card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--weg-gray-200);
    }

    .card-header {
      padding: 12px 16px;
      font-weight: 700;
      font-size: 0.95rem;
      color: white;
      background: var(--weg-blue);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-body {
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      flex: 1;
    }

    /* Gráfico - Maior Destaque */
    .graph-container {
      width: 100%;
      height: 280px;
      background: var(--weg-gray-100);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .graph-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      z-index: 2;
    }

    .graph-placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--weg-gray-400);
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* Tabela de Medições - Menor Destaque */
    .measurements-container {
      background: white;
      border-radius: var(--radius-sm);
      border: 1px solid var(--weg-gray-200);
      padding: 12px;
      flex-shrink: 0;
    }

    .table-title {
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--weg-blue-dark);
      margin-bottom: 8px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .analise-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 3px;
      table-layout: fixed;
    }

    .analise-table th {
      background: var(--weg-blue-light);
      color: var(--weg-blue-dark);
      font-weight: 700;
      font-size: 0.75rem;
      padding: 4px 2px;
      border-radius: 3px;
      text-align: center;
    }

    .analise-table td {
      background: var(--weg-gray-100);
      color: var(--weg-gray-900);
      font-weight: 600;
      font-size: 0.8rem;
      padding: 4px 2px;
      text-align: center;
      border-radius: 3px;
      border: 1px solid var(--weg-gray-200);
    }

    /* Status Colors - Sóbrio */
    .val-ok {
      background: #E8F5E9 !important;
      color: var(--status-ok) !important;
    }

    .val-warn {
      background: #FFF3E0 !important;
      color: var(--status-warn) !important;
    }

    .val-crit {
      background: #FFEBEE !important;
      color: var(--status-crit) !important;
    }

    .val-nodata {
      background: #F5F5F5 !important;
      color: #999999 !important;
    }

    /* Footer */
    footer {
      background: white;
      padding: 12px 30px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--weg-gray-400);
      border-top: 1px solid var(--weg-gray-200);
    }

    footer span {
      color: var(--weg-blue);
      font-weight: 700;
    }

    /* Navegação */
    .carousel-nav {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 15px;
    }

    .nav-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--weg-gray-300);
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid white;
      box-shadow: var(--shadow);
    }

    .nav-dot.active {
      background: var(--weg-blue);
      transform: scale(1.2);
    }

    /* Loader */
    .loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.5s ease;
    }

    .loader-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--weg-gray-200);
      border-top-color: var(--weg-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Responsividade */
    @media (max-width: 1200px) {
      .carousel-slide {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="loader-overlay" id="loader">
  <div class="spinner"></div>
  <div style="font-weight: 700; color: var(--weg-blue-dark)">Carregando Dashboard...</div>
</div>

<header>
  <div class="header-brand">
    <div class="logo-badge">WEG</div>
    <h1>Controle de Banhos Químicos &nbsp;<span>JGS</span></h1>
  </div>
  <div class="clock-block">
    <div id="relogio">--:--:--</div>
    <div id="data">--/--/----</div>
  </div>
</header>

<main>
  <div class="carousel-container">
    <div class="carousel-track" id="track-main"></div>
  </div>
  <div class="carousel-nav" id="nav-main"></div>
</main>

<footer>
  JGS - Controle de Qualidade & Processos | <span>WEG S.A.</span> | Última Sincronização: <span id="ultima">--:--</span>
</footer>

<script>
  const CONFIG = {
    rotateInterval: 20000,
    refreshInterval: 60000,
    itemsPerSlide: 2
  };

  // Mapeamento de arquivos para itens dos processos
  // Ajustado para corresponder aos arquivos reais no repositório
  const fileToItemMap = {
    // Estanhagem Eletrolítica
    'des': { processo: 0, itemIndex: 0, nome: 'Desengraxante Químico', ref: 26.0, tol: 3.9 },
    'ativacao-tanque-5': { processo: 0, itemIndex: 1, nome: 'Ativação — Tanque 5', ref: 8.5, tol: 1.28 },
    'ativacao-tanque-6': { processo: 0, itemIndex: 2, nome: 'Ativação — Tanque 6', ref: 8.5, tol: 1.28 },
    'niquel-watt': { processo: 0, itemIndex: 3, nome: 'Níquel WATT', ref: 45.0, tol: 6.75 },
    'estanhagem-a': { processo: 0, itemIndex: 4, nome: 'Estanhagem A', ref: 32.0, tol: 4.8 },
    'estanhagem-b': { processo: 0, itemIndex: 5, nome: 'Estanhagem B', ref: 31.5, tol: 4.73 },
    'selante': { processo: 0, itemIndex: 6, nome: 'Selante Protetivo', ref: 18.0, tol: 2.7 },
    
    // Processo Nanocerâmico
    'des1': { processo: 1, itemIndex: 0, nome: '1º Desengraxante', ref: 29.0, tol: 4.35 },
    'des2': { processo: 1, itemIndex: 1, nome: '2º Desengraxante', ref: 28.5, tol: 4.28 },
    'dec1': { processo: 1, itemIndex: 2, nome: 'Decapante 1', ref: 12.0, tol: 1.8 },
    'dec2': { processo: 1, itemIndex: 3, nome: 'Decapante 2', ref: 11.5, tol: 1.73 },
    'nano': { processo: 1, itemIndex: 4, nome: 'Nanocerâmico — Conc.', ref: 35.0, tol: 5.25 },
    'abso-nano': { processo: 1, itemIndex: 5, nome: 'Nanocerâmico — Abs.', ref: 1.2, tol: 0.18 },
    'ph-nano': { processo: 1, itemIndex: 6, nome: 'Nanocerâmico — pH', ref: 4.5, tol: 0.68 },
    'neu': { processo: 1, itemIndex: 7, nome: 'Neutralizador', ref: 7.0, tol: 1.05 },
    'sel': { processo: 1, itemIndex: 8, nome: 'Selante Final', ref: 22.0, tol: 3.3 }
  };

  const processosNomes = [
    'Estanhagem Eletrolítica',
    'Processo Nanocerâmico'
  ];

  // Cache dos dados carregados
  let dadosCache = {};

  // Carregar dados JSON da pasta dados (CORREÇÃO: caminho correto)
  async function carregarDadosJSON(fileName) {
    try {
      // CORREÇÃO: Caminho correto para a pasta "dados"
      const response = await fetch(`dados/graf-${fileName}.json?t=${Date.now()}`);
      if (!response.ok) {
        console.warn(`Arquivo não encontrado: dados/graf-${fileName}.json`);
        return null;
      }
      const data = await response.json();
      return data;
    } catch (error) {
      console.warn(`Erro ao carregar graf-${fileName}.json:`, error);
      return null;
    }
  }

  // Obter medições reais do JSON (CORREÇÃO: tratamento de #N/D)
  async function getMedicoesReal(fileName) {
    const dados = await carregarDadosJSON(fileName);
    if (!dados || !dados.charts || !dados.charts[0]) return [];

    const labels = dados.charts[0].labels || [];
    const series1 = dados.charts[0].series1 || [];
    
    // CORREÇÃO: Filtrar e processar últimos 24 valores
    const medicoes = [];
    const startIndex = Math.max(0, labels.length - 24);
    
    for (let i = startIndex; i < labels.length; i++) {
      const label = labels[i];
      const valorStr = series1[i] || '0';
      
      // CORREÇÃO: Tratar valores "#N/D" como dados ausentes
      let valor = 0;
      let hasData = true;
      
      if (valorStr === '#N/D' || valorStr === '#N/A' || valorStr === '' || valorStr === null) {
        hasData = false;
        valor = NaN;
      } else {
        valor = parseFloat(valorStr.replace(',', '.'));
        if (isNaN(valor)) {
          hasData = false;
        }
      }
      
      medicoes.push({
        data: label,
        valor: valor,
        hasData: hasData
      });
    }
    
    return medicoes;
  }

  // Classificar status (CORREÇÃO: considerar dados ausentes)
  function getStatusClass(valor, ref, tol, hasData) {
    if (!hasData || isNaN(valor)) return 'val-nodata';
    const diff = Math.abs(valor - ref);
    if (diff <= tol * 0.5) return 'val-ok'; // Normal
    if (diff <= tol) return 'val-warn'; // Alerta
    return 'val-crit'; // Crítico
  }

  // Renderizar tabela de medições com dados reais
  async function renderTabela(item, fileName) {
    let medicoes;
    
    // Verificar cache primeiro
    if (dadosCache[fileName]) {
      medicoes = dadosCache[fileName];
    } else {
      medicoes = await getMedicoesReal(fileName);
      dadosCache[fileName] = medicoes;
    }
    
    const colsPerRow = 12;
    let html = '<table class="analise-table">';

    for (let row = 0; row < 2; row++) {
      const start = row * colsPerRow;
      const end = start + colsPerRow;
      const chunk = medicoes.slice(start, end);

      if (chunk.length === 0) continue;

      // Linha de Datas
      html += '<tr>';
      chunk.forEach(m => html += `<th>${m.data}</th>`);
      html += '</tr>';

      // Linha de Valores
      html += '<tr>';
      chunk.forEach(m => {
        const cls = getStatusClass(m.valor, item.ref, item.tol, m.hasData);
        const displayValue = m.hasData ? m.valor.toFixed(2) : '---';
        html += `<td class="${cls}">${displayValue}</td>`;
      });
      html += '</tr>';
    }

    html += '</table>';
    return html;
  }

  // Criar card individual para um arquivo de gráfico específico
  async function criarCard(itemInfo, fileName) {
    const displayName = itemInfo.nome;

    // Renderizar tabela com dados reais
    const tabelaHtml = await renderTabela(itemInfo, fileName);

    // CORREÇÃO: Caminho correto para imagens PNG (com -1 no final)
    return `
      <div class="card">
        <div class="card-header">${displayName}</div>
        <div class="card-body">
          <div class="graph-container">
            <div class="graph-placeholder">📊 Gráfico: ${fileName}</div>
            <img src="graficos/graf-${fileName}-1.png?t=${Date.now()}"
                 onerror="this.style.display='none'"
                 onload="this.previousElementSibling.style.display='none'">
          </div>
          <div class="measurements-container">
            <div class="table-title">Últimas 24 Medições</div>
            ${tabelaHtml}
          </div>
        </div>
      </div>
    `;
  }

  // Inicializar carrossel unificado
  async function initCarousel() {
    const track = document.getElementById('track-main');
    const nav = document.getElementById('nav-main');

    let allSlides = [];
    let slideIndex = 0;

    // Processar cada processo
    for (let processoIndex = 0; processoIndex < processosNomes.length; processoIndex++) {
      const processoNome = processosNomes[processoIndex];
      const arquivosProcesso = Object.entries(fileToItemMap)
        .filter(([file, info]) => info.processo === processoIndex)
        .map(([file, info]) => ({ file, info }));

      const slidesCount = Math.ceil(arquivosProcesso.length / CONFIG.itemsPerSlide);

      for (let i = 0; i < slidesCount; i++) {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';

        // Adicionar título do processo apenas no primeiro slide
        if (i === 0) {
          const titleDiv = document.createElement('div');
          titleDiv.style.gridColumn = '1 / -1';
          titleDiv.style.marginBottom = '0';
          titleDiv.innerHTML = `<div class="secao-titulo">${processoNome}</div>`;
          slide.appendChild(titleDiv);
        }

        // Adicionar cards do slide
        const start = i * CONFIG.itemsPerSlide;
        const slideItems = arquivosProcesso.slice(start, start + CONFIG.itemsPerSlide);

        for (const { file, info } of slideItems) {
          const cardHtml = await criarCard(info, file);
          const cardDiv = document.createElement('div');
          cardDiv.innerHTML = cardHtml;
          slide.appendChild(cardDiv.firstElementChild);
        }

        track.appendChild(slide);
        allSlides.push(slide);

        // Criar dot de navegação
        const dot = document.createElement('div');
        dot.className = `nav-dot ${slideIndex === 0 ? 'active' : ''}`;
        dot.onclick = () => goToSlide(slideIndex);
        nav.appendChild(dot);

        slideIndex++;
      }
    }

    // Rotação automática
    let currentSlide = 0;
    setInterval(() => {
      currentSlide = (currentSlide + 1) % allSlides.length;
      goToSlide(currentSlide);
    }, CONFIG.rotateInterval);

    // Atualização automática dos dados a cada 60s
    setInterval(async () => {
      dadosCache = {}; // Limpar cache
      await refreshAllCards();
    }, CONFIG.refreshInterval);
  }

  // Função para atualizar todos os cards
  async function refreshAllCards() {
    // Re-carregar dados para todos os cards visíveis
    const cards = document.querySelectorAll('.card');
    for (const card of cards) {
      const fileName = card.querySelector('.graph-placeholder')?.textContent.match(/Gráfico: (.*)/)?.[1]?.trim();
      if (fileName) {
        // Re-renderizar apenas a tabela (otimização)
        const itemInfo = Object.values(fileToItemMap).find(item => 
          Object.entries(fileToItemMap).find(([key, val]) => val === item && key === fileName)
        );
        
        // Encontrar o itemInfo correto
        const fileKey = Object.keys(fileToItemMap).find(key => {
          const placeholder = card.querySelector('.graph-placeholder');
          return placeholder && placeholder.textContent.includes(key);
        });
        
        if (fileKey && fileToItemMap[fileKey]) {
          const tabelaHtml = await renderTabela(fileToItemMap[fileKey], fileKey);
          const container = card.querySelector('.measurements-container');
          if (container) {
            container.innerHTML = `
              <div class="table-title">Últimas 24 Medições</div>
              ${tabelaHtml}
            `;
          }
        }
      }
    }
    
    // Atualizar timestamp
    const agora = new Date();
    document.getElementById('ultima').innerText = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  // Navegar para slide
  function goToSlide(index) {
    const track = document.getElementById('track-main');
    const dots = document.querySelectorAll('#nav-main .nav-dot');
    track.style.transform = `translateX(-${index * 100}%)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === index));
  }

  // Atualizar relógio e data
  function updateClock() {
    const agora = new Date();
    document.getElementById('relogio').innerText = agora.toLocaleTimeString('pt-BR');
    document.getElementById('data').innerText = agora.toLocaleDateString('pt-BR');
    document.getElementById('ultima').innerText = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  // Inicializar
  async function init() {
    await initCarousel();
    updateClock();
    setInterval(updateClock, 1000);

    setTimeout(() => {
      document.getElementById('loader').classList.add('hidden');
    }, 2000);
  }

  window.onload = init;
</script>

</body>
</html>
