<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="300">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Banhos Químicos - JGS | WEG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --weg-blue: #00458F;
      --weg-blue-dark: #002A55;
      --weg-blue-light: #E8F0F8;
      --weg-gray-50: #FAFAFA;
      --weg-gray-100: #F5F5F5;
      --weg-gray-200: #E8E8E8;
      --weg-gray-400: #999999;
      --weg-gray-700: #333333;
      --weg-gray-900: #1A1A1A;
      --status-ok: #2E7D32;
      --status-warn: #F57C00;
      --status-crit: #C62828;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--weg-gray-50);
      color: var(--weg-gray-900);
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: white;
      border-bottom: 3px solid var(--weg-blue);
      padding: 12px 30px;
      display: flex;
      justify-content: space-between;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-badge {
      background: var(--weg-blue);
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 800;
      font-size: 1.3rem;
    }

    #relogio {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--weg-blue-dark);
      font-family: 'Courier New', monospace;
    }

    #data {
      font-size: 0.9rem;
      color: var(--weg-gray-400);
    }

    main {
      flex: 1;
      padding: 20px 30px;
      max-width: 1600px;
      margin: auto;
      width: 100%;
    }

    .secao-titulo {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--weg-blue-dark);
      text-transform: uppercase;
      border-bottom: 2px solid var(--weg-blue-light);
      margin-bottom: 10px;
      padding-bottom: 6px;
      grid-column: 1 / -1;
    }

    .carousel-container {
      overflow: hidden;
    }

    .carousel-track {
      display: flex;
      transition: transform 0.6s ease;
    }

    .carousel-slide {
      min-width: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 10px;
    }

    .card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--weg-gray-200);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-header {
      background: var(--weg-blue);
      color: white;
      padding: 12px 16px;
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    .card-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .graph-container {
      height: 280px;
      background: var(--weg-gray-100);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .graph-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .graph-placeholder {
      position: absolute;
      color: var(--weg-gray-400);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .measurements-container {
      border: 1px solid var(--weg-gray-200);
      padding: 10px;
      border-radius: var(--radius-sm);
    }

    .table-title {
      font-weight: 700;
      font-size: 0.8rem;
      text-align: center;
      color: var(--weg-blue-dark);
      margin-bottom: 6px;
    }

    table {
      width: 100%;
      border-spacing: 3px;
      font-size: 0.75rem;
      text-align: center;
    }

    th {
      background: var(--weg-blue-light);
      padding: 4px;
      border-radius: 3px;
    }

    td {
      background: var(--weg-gray-100);
      padding: 4px;
      border-radius: 3px;
      font-weight: 600;
    }

    .val-ok { background: #E8F5E9; color: var(--status-ok); }
    .val-warn { background: #FFF3E0; color: var(--status-warn); }
    .val-crit { background: #FFEBEE; color: var(--status-crit); }

    footer {
      background: white;
      padding: 12px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--weg-gray-400);
      border-top: 1px solid var(--weg-gray-200);
    }

    @media (max-width: 1200px) {
      .carousel-slide { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<header>
  <div class="header-brand">
    <div class="logo-badge">WEG</div>
    <h1>Controle de Banhos Químicos <span style="color:#00458F">JGS</span></h1>
  </div>
  <div>
    <div id="relogio">--:--:--</div>
    <div id="data">--/--/----</div>
  </div>
</header>

<main>
  <div class="carousel-container">
    <div class="carousel-track" id="track-main"></div>
  </div>
</main>

<footer>
  JGS - Controle de Qualidade & Processos | <span>WEG S.A.</span> |
  Última Sincronização: <span id="ultima">--:--</span>
</footer>

<script>
const CONFIG = { rotateInterval: 20000, itemsPerSlide: 2 };

const processos = [
  {
    nome: 'Estanhagem Eletrolítica',
    items: [
      { id:'des', nome:'Desengraxante Químico', files:['des'], ref:26, tol:3.9 },
      { id:'ativ5', nome:'Ativação — Tanque 5', files:['ativacao-tanque-5'], ref:8.5, tol:1.28 },
      { id:'ativ6', nome:'Ativação — Tanque 6', files:['ativacao-tanque-6'], ref:8.5, tol:1.28 }
    ]
  }
];

function getStatusClass(valor, ref, tol) {
  const d = Math.abs(valor - ref);
  if (d <= tol * 0.5) return 'val-ok';
  if (d <= tol) return 'val-warn';
  return 'val-crit';
}

async function carregarJSON(file) {
  try {
    const r = await fetch(`dados/graf-${file}.json?t=${Date.now()}`);
    const j = await r.json();
    const c = j.charts[0];
    const labels = c.labels.slice(-24);
    const valores = c.series1.slice(-24).map(v => parseFloat(v.replace(',', '.')));
    return labels.map((d,i)=>({data:d, valor:valores[i]}));
  } catch {
    return [];
  }
}

async function renderTabela(item, file) {
  const dados = await carregarJSON(file);
  if (!dados.length) return '<div style="text-align:center;color:#999">Sem dados</div>';

  let h = '<table>';
  for (let r = 0; r < 2; r++) {
    const p = dados.slice(r*12, r*12+12);
    h += '<tr>' + p.map(x=>`<th>${x.data}</th>`).join('') + '</tr>';
    h += '<tr>' + p.map(x=>`<td class="${getStatusClass(x.valor,item.ref,item.tol)}">${x.valor.toFixed(2)}</td>`).join('') + '</tr>';
  }
  return h + '</table>';
}

function criarCard(item, file) {
  const id = `tbl-${item.id}-${file}`;
  setTimeout(async ()=>{
    document.getElementById(id).innerHTML = await renderTabela(item, file);
  },0);

  return `
  <div class="card">
    <div class="card-header">${item.nome}</div>
    <div class="card-body">
      <div class="graph-container">
        <div class="graph-placeholder">📊 ${file}.png</div>
        <img src="graficos/graf-${file}.pngnts-container">
        <div class="table-title">Últimas 24 Medições</div>
        <div id="${id}">Carregando...</div>
      </div>
    </div>
  </div>`;
}

function init() {
  const track = document.getElementById('track-main');
  processos.forEach(p => {
    const slide = document.createElement('div');
    slide.className = 'carousel-slide';
    slide.innerHTML = `<div class="secao-titulo">${p.nome}</div>`;
    p.items.forEach(i =>
      i.files.forEach(f => slide.innerHTML += criarCard(i,f))
    );
    track.appendChild(slide);
  });

  setInterval(()=>{
    const d=new Date();
    relogio.innerText=d.toLocaleTimeString('pt-BR');
    data.innerText=d.toLocaleDateString('pt-BR');
    ultima.innerText=d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  },1000);
}

window.onload = init;
</script>

</body>
</html>
