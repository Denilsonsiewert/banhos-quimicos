<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="300">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Banhos Químicos - JGS | WEG</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --weg-blue: #00458F;
      --weg-blue-dark: #002A55;
      --weg-blue-light: #E8F0F8;
      --weg-gray-50: #FAFAFA;
      --weg-gray-100: #F5F5F5;
      --weg-gray-200: #E8E8E8;
      --weg-gray-400: #999999;
      --weg-gray-700: #333333;
      --weg-gray-900: #1A1A1A;
      --status-ok: #2E7D32;
      --status-warn: #F57C00;
      --status-crit: #1A1A1A;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-sm: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--weg-gray-50);
      color: var(--weg-gray-900);
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: white;
      border-bottom: 3px solid var(--weg-blue);
      padding: 12px 30px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .header-logo { justify-self: start; }
    .logo-weg { height: 50px; width: auto; object-fit: contain; }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--weg-gray-900);
      text-align: center;
      justify-self: center;
    }
    header h1 span { color: var(--weg-blue); font-weight: 900; }

    .header-clock {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    #relogio, #data {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--weg-blue-dark);
      font-family: 'Courier New', monospace;
    }

    main {
      flex: 1;
      padding: 30px 30px;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .secao-titulo {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--weg-blue-dark);
      text-transform: uppercase;
      margin-bottom: 20px;
      padding: 12px 20px;
      background: var(--weg-blue-light);
      border-radius: var(--radius-sm);
      text-align: center;
      width: 100%;
      letter-spacing: 0.5px;
      grid-column: 1 / -1;
    }

    .carousel-container {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      min-height: 500px; 
    }

    .carousel-track {
      display: flex;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      height: 100%;
    }

    .carousel-slide {
      min-width: 100%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-auto-rows: min-content;
      gap: 25px;
      padding: 15px;
      align-content: start;
    }

    .card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--weg-gray-200);
      height: 100%;
    }

    .card-header {
      padding: 14px 18px;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      background: var(--weg-blue);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
      line-height: 1.4;
    }

    .card-body {
      display: flex;
      flex-direction: column;
      padding: 18px;
      gap: 15px;
      flex: 1;
    }

    .graph-container {
      width: 100%;
      height: 300px;
      background: var(--weg-gray-100);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }

    .graph-container img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      z-index: 2;
    }

    .graph-placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--weg-gray-400);
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 1;
    }

    .measurements-container {
      background: white;
      border-radius: var(--radius-sm);
      border: 1px solid var(--weg-gray-200);
      padding: 15px;
      flex-shrink: 0;
    }

    .table-title {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--weg-blue-dark);
      margin-bottom: 12px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .analise-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 4px;
      table-layout: fixed;
    }

    .analise-table th {
      background: var(--weg-blue-light);
      color: var(--weg-blue-dark);
      font-weight: 700;
      font-size: 0.8rem;
      padding: 8px 4px;
      border-radius: 4px;
      text-align: center;
      white-space: nowrap;
    }

    .analise-table td {
      background: var(--weg-gray-100);
      color: var(--weg-gray-900);
      font-weight: 600;
      font-size: 0.85rem;
      padding: 8px 4px;
      text-align: center;
      border-radius: 4px;
      border: 1px solid var(--weg-gray-200);
    }

    .val-ok { background: #E8F5E9 !important; color: var(--status-ok) !important; }
    .val-warn { background: #FFF3E0 !important; color: var(--status-warn) !important; }
    .val-crit { background: #ECEFF1 !important; color: var(--status-crit) !important; }
    .val-nodata { background: #F5F5F5 !important; color: #999999 !important; }

    footer {
      background: white;
      padding: 15px 30px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--weg-gray-400);
      border-top: 1px solid var(--weg-gray-200);
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }
    footer span { color: var(--weg-blue); font-weight: 700; }

    .carousel-nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }
    .nav-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--weg-gray-300);
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid white;
      box-shadow: var(--shadow);
    }
    .nav-dot.active { background: var(--weg-blue); transform: scale(1.3); }

    .loader-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: white;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.5s ease;
    }
    .loader-overlay.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid var(--weg-gray-200);
      border-top-color: var(--weg-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 1200px) {
      .carousel-slide { grid-template-columns: 1fr; }
      header { padding: 10px 20px; grid-template-columns: 1fr; gap: 10px; }
      .header-logo, .header-clock { justify-self: center; }
      .logo-weg { height: 40px; }
      header h1 { font-size: 1.5rem; }
      #relogio, #data { font-size: 1.3rem; }
      main { padding: 20px 20px; }
    }
  </style>
</head>
<body>

<div class="loader-overlay" id="loader">
  <div class="spinner"></div>
  <div style="font-weight: 700; color: var(--weg-blue-dark)">Carregando Dashboard...</div>
</div>

<header>
  <div class="header-logo">
    <img src="logo-weg.png" alt="WEG" class="logo-weg" onerror="this.style.display='none'">
  </div>
  <h1>Controle de Banhos Químicos <span>JGS</span></h1>
  <div class="header-clock">
    <div id="relogio">--:--:--</div>
    <div id="data">--/--/----</div>
  </div>
</header>

<main>
  <div class="carousel-container">
    <div class="carousel-track" id="track-main"></div>
  </div>
  <div class="carousel-nav" id="nav-main"></div>
</main>

<footer>
  JGS - Controle de Qualidade & Processos | <span>WEG S.A.</span> | Última Sincronização: <span id="ultima">--:--</span>
</footer>

<script>
  const CONFIG = {
    rotateInterval: 20000,
    refreshInterval: 60000,
    itemsPerSlide: 2
  };

  // Configuração baseada nos arquivos reais da pasta dados/
  // jsonFile: nome do arquivo JSON (sem .json)
  // imageFile: nome do arquivo de imagem (sem graf- e sem -1.png)
  const processosConfig = {
    'estanhagem-eletrolitica': {
      nome: 'Estanhagem Eletrolítica',
      graficos: [
        { jsonFile: 'graf-des', imageFile: 'des', nome: 'Desengraxante Químico<br><span style="font-size:0.8em; font-weight:400;">CONCENTRAÇÃO DO BANHO EM ML/L</span>', ref: 26.0, tol: 3.9 },
        { jsonFile: 'graf-ativacao-tanque-5', imageFile: 'ativacao-tanque-5', nome: 'Ativação — Tanque 5<br><span style="font-size:0.8em; font-weight:400;">pH DO BANHO</span>', ref: 8.5, tol: 1.28 },
        { jsonFile: 'graf-ativacao-tanque-6', imageFile: 'ativacao-tanque-6', nome: 'Ativação — Tanque 6<br><span style="font-size:0.8em; font-weight:400;">CONCENTRAÇÃO DO BANHO EM ML/L</span>', ref: 8.5, tol: 1.28 },
        { jsonFile: 'graf-estanhagem-a', imageFile: 'estanhagem-a', nome: 'Estanhagem A<br><span style="font-size:0.8em; font-weight:400;">CONCENTRAÇÃO DE Sn° (g/L)</span>', ref: 32.0, tol: 4.8 },
        { jsonFile: 'graf-estanhagem-b', imageFile: 'estanhagem-b', nome: 'Estanhagem B<br><span style="font-size:0.8em; font-weight:400;">CONCENTRAÇÃO DE Sn° (g/L)</span>', ref: 31.5, tol: 4.73 },
        { jsonFile: 'graf-sel', imageFile: 'sel', nome: 'Selante Protetivo', ref: 18.0, tol: 2.7 }
      ]
    },
    'nanoceramico': {
      nome: 'Processo Nanocerâmico',
      graficos: [
        { jsonFile: 'graf-des1', imageFile: 'des1', nome: '1º Desengraxante', ref: 29.0, tol: 4.35 },
        { jsonFile: 'graf-des2', imageFile: 'des2', nome: '2º Desengraxante', ref: 28.5, tol: 4.28 },
        { jsonFile: 'graf-dec1', imageFile: 'dec1', nome: 'Decapante 1', ref: 12.0, tol: 1.8 },
        { jsonFile: 'graf-dec2', imageFile: 'dec2', nome: 'Decapante 2', ref: 11.5, tol: 1.73 },
        { jsonFile: 'graf-nano', imageFile: 'nano', nome: 'Nanocerâmico — Conc.', ref: 35.0, tol: 5.25 },
        { jsonFile: 'graf-abso-nano', imageFile: 'abso-nano', nome: 'Nanocerâmico — Abs.', ref: 1.2, tol: 0.18 },
        { jsonFile: 'graf-ph-nano', imageFile: 'ph-nano', nome: 'Nanocerâmico — pH', ref: 4.5, tol: 0.68 },
        { jsonFile: 'graf-neu', imageFile: 'neu', nome: 'Neutralizador', ref: 7.0, tol: 1.05 },
        { jsonFile: 'graf-sel', imageFile: 'sel', nome: 'Selante Final', ref: 22.0, tol: 3.3 }
      ]
    }
  };

  let dadosCache = {};

  function formatarData(dataStr) {
    if (!dataStr || dataStr.trim() === '' || dataStr.trim() === '#N/D') return '--/--';
    const cleanStr = dataStr.trim();
    let dataObj = null;
    
    if (cleanStr.includes('/')) {
      const partes = cleanStr.split('/');
      if (partes.length === 3) {
        const dia = parseInt(partes[0]);
        const mes = parseInt(partes[1]) - 1;
        let ano = parseInt(partes[2]);
        if (ano < 100) ano += 2000;
        dataObj = new Date(ano, mes, dia);
      }
    }
    
    if (!dataObj || isNaN(dataObj.getTime())) {
      dataObj = new Date(cleanStr);
    }
    
    if (isNaN(dataObj.getTime())) return cleanStr;
    
    const dia = dataObj.getDate().toString().padStart(2, '0');
    const mes = (dataObj.getMonth() + 1).toString().padStart(2, '0');
    return `${dia}/${mes}`;
  }

  async function carregarDadosJSON(jsonFileName) {
    try {
      const response = await fetch(`dados/${jsonFileName}.json?t=${Date.now()}`);
      if (!response.ok) return null;
      const data = await response.json();
      return data;
    } catch (error) {
      console.warn(`Falha ao carregar ${jsonFileName}.json:`, error);
      return null;
    }
  }

  async function getMedicoesReal(jsonFileName) {
    const dados = await carregarDadosJSON(jsonFileName);
    if (!dados) return null;

    const rawCharts = dados["charts"] || dados["charts "] || dados["charts  "];
    if (!rawCharts || !rawCharts[0]) return null;

    const chart = rawCharts[0];
    const labels = chart["labels"] || chart["labels "] || [];
    const series1 = chart["series1"] || chart["series1 "] || [];
    
    const medicoes = [];
    const startIndex = Math.max(0, labels.length - 24);
    
    for (let i = startIndex; i < labels.length; i++) {
      const label = labels[i];
      let valorStr = series1[i] || '0';
      valorStr = valorStr.trim();
      
      let valor = 0;
      let hasData = true;
      
      if (valorStr === '#N/D' || valorStr === '#N/A' || valorStr === '' || valorStr === null) {
        hasData = false;
        valor = NaN;
      } else {
        valor = parseFloat(valorStr.replace(',', '.'));
        if (isNaN(valor)) hasData = false;
      }
      
      medicoes.push({
        label,
        dataFormatada: formatarData(label),
        valor: valor,
        hasData: hasData
      });
    }
    
    return medicoes;
  }

  function getStatusClass(valor, ref, tol, hasData) {
    if (!hasData || isNaN(valor)) return 'val-nodata';
    const diff = Math.abs(valor - ref);
    if (diff <= tol * 0.5) return 'val-ok';
    if (diff <= tol) return 'val-warn';
    return 'val-crit';
  }

  async function renderTabela(graficoConfig) {
    let medicoes = dadosCache[graficoConfig.jsonFile];
    
    if (!medicoes) {
      medicoes = await getMedicoesReal(graficoConfig.jsonFile);
      if (!medicoes) return null;
      dadosCache[graficoConfig.jsonFile] = medicoes;
    }
    
    const colsPerRow = 12;
    let html = '<table class="analise-table">';

    for (let row = 0; row < 2; row++) {
      const start = row * colsPerRow;
      const end = start + colsPerRow;
      const chunk = medicoes.slice(start, end);

      if (chunk.length === 0) continue;

      html += '<tr>';
      chunk.forEach(m => html += `<th>${m.dataFormatada}</th>`);
      html += '</tr>';

      html += '<tr>';
      chunk.forEach(m => {
        const cls = getStatusClass(m.valor, graficoConfig.ref, graficoConfig.tol, m.hasData);
        const displayValue = m.hasData ? m.valor.toFixed(2) : '---';
        html += `<td class="${cls}">${displayValue}</td>`;
      });
      html += '</tr>';
    }
    html += '</table>';
    return html;
  }

  async function criarCardDOM(graficoConfig) {
    try {
      const tabelaHtml = await renderTabela(graficoConfig);
      
      if (tabelaHtml === null) {
        return null;
      }

      const card = document.createElement('div');
      card.className = 'card';
      
      const displayName = graficoConfig.nome;
      const imageFile = graficoConfig.imageFile;

      card.innerHTML = `
        <div class="card-header">${displayName}</div>
        <div class="card-body">
          <div class="graph-container">
            <div class="graph-placeholder">📊 Carregando Gráfico...</div>
            <img src="graficos/graf-${imageFile}-1.png?t=${Date.now()}"
                 onerror="this.style.display='none'"
                 onload="this.previousElementSibling.style.display='none'">
          </div>
          <div class="measurements-container">
            <div class="table-title">Últimas 24 Medições</div>
            ${tabelaHtml}
          </div>
        </div>
      `;
      return card;
    } catch (e) {
      console.error("Erro ao criar card:", e);
      return null;
    }
  }

  async function initCarousel() {
    const track = document.getElementById('track-main');
    const nav = document.getElementById('nav-main');
    
    track.innerHTML = '';
    nav.innerHTML = '';

    let allSlidesContent = [];

    for (const processoKey in processosConfig) {
      const processo = processosConfig[processoKey];
      
      const titleDiv = document.createElement('div');
      titleDiv.className = 'secao-titulo';
      titleDiv.textContent = processo.nome;
      
      let sectionCards = [];
      for (const graficoConfig of processo.graficos) {
        const cardElement = await criarCardDOM(graficoConfig);
        if (cardElement) {
          sectionCards.push(cardElement);
        }
      }

      if (sectionCards.length > 0) {
        allSlidesContent.push({ type: 'header', element: titleDiv });
        sectionCards.forEach(card => allSlidesContent.push({ type: 'card', element: card }));
      }
    }

    if (allSlidesContent.length === 0) {
      track.innerHTML = '<div style="padding:50px; text-align:center; width:100%;">Nenhum dado disponível ou erro de conexão com os arquivos JSON.</div>';
      document.getElementById('loader').classList.add('hidden');
      return;
    }

    let currentSlide = document.createElement('div');
    currentSlide.className = 'carousel-slide';
    let itemsInCurrentSlide = 0;
    let slideIndex = 0;
    
    const closeSlide = () => {
      if (currentSlide.children.length > 0) {
        track.appendChild(currentSlide);
        
        const dot = document.createElement('div');
        dot.className = `nav-dot ${slideIndex === 0 ? 'active' : ''}`;
        dot.onclick = () => goToSlide(slideIndex);
        nav.appendChild(dot);
        
        slideIndex++;
        
        currentSlide = document.createElement('div');
        currentSlide.className = 'carousel-slide';
        itemsInCurrentSlide = 0;
      }
    };

    for (let i = 0; i < allSlidesContent.length; i++) {
      const item = allSlidesContent[i];
      
      if (item.type === 'header') {
        if (itemsInCurrentSlide > 0) {
          closeSlide();
        }
        currentSlide.appendChild(item.element);
      } else {
        currentSlide.appendChild(item.element);
        itemsInCurrentSlide++;
        
        if (itemsInCurrentSlide >= CONFIG.itemsPerSlide) {
          closeSlide();
        }
      }
    }
    
    if (currentSlide.children.length > 0) {
      track.appendChild(currentSlide);
      const dot = document.createElement('div');
      dot.className = `nav-dot ${slideIndex === 0 ? 'active' : ''}`;
      dot.onclick = () => goToSlide(slideIndex);
      nav.appendChild(dot);
      slideIndex++;
    }

    let currentSlideIndex = 0;
    const totalSlides = slideIndex;
    
    if (totalSlides > 1) {
      setInterval(() => {
        currentSlideIndex = (currentSlideIndex + 1) % totalSlides;
        goToSlide(currentSlideIndex);
      }, CONFIG.rotateInterval);
    }

    setTimeout(() => {
      document.getElementById('loader').classList.add('hidden');
    }, 1000);
  }

  async function refreshAllCards() {
    dadosCache = {};
    
    const cards = document.querySelectorAll('.card');
    for (const card of cards) {
      const img = card.querySelector('img');
      if(img) {
          const src = img.getAttribute('src');
          const match = src.match(/graf-(.*)-1\.png/);
          if(match && match[1]) {
              const imageFile = match[1];
              let config = null;
              for(const pk in processosConfig) {
                  const found = processosConfig[pk].graficos.find(g => g.imageFile === imageFile);
                  if(found) { config = found; break; }
              }
              if(config) {
                  const tabelaHtml = await renderTabela(config);
                  if(tabelaHtml) {
                      const container = card.querySelector('.measurements-container');
                      if(container) {
                          container.innerHTML = `<div class="table-title">Últimas 24 Medições</div>${tabelaHtml}`;
                      }
                  }
              }
          }
      }
    }
    
    const agora = new Date();
    document.getElementById('ultima').innerText = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function goToSlide(index) {
    const track = document.getElementById('track-main');
    const dots = document.querySelectorAll('#nav-main .nav-dot');
    track.style.transform = `translateX(-${index * 100}%)`;
    dots.forEach((d, i) => d.classList.toggle('active', i === index));
  }

  function updateClock() {
    const agora = new Date();
    document.getElementById('relogio').innerText = agora.toLocaleTimeString('pt-BR');
    document.getElementById('data').innerText = agora.toLocaleDateString('pt-BR');
    document.getElementById('ultima').innerText = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  async function init() {
    try {
      await initCarousel();
      updateClock();
      setInterval(updateClock, 1000);
      setInterval(refreshAllCards, CONFIG.refreshInterval);
    } catch (error) {
      console.error("Erro fatal na inicialização:", error);
      document.getElementById('loader').innerHTML = `<div style="color:red; text-align:center">Erro ao carregar dashboard.<br>Verifique o Console (F12).</div>`;
    }
  }

  window.onload = init;
</script>

</body>
</html>
